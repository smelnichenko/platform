# CI: Lint Helm chart on push

when:
  - event: push
  - event: pull_request

clone:
  - name: git
    image: woodpeckerci/plugin-git
    settings:
      partial: false
      depth: 100

steps:
  - name: helm-lint
    image: alpine/helm:latest
    commands:
      - helm lint helm/schnappy/ --set site.dnsResolver=10.43.0.10
      - helm lint helm/schnappy-data/ --set postgres.password=test
      - helm lint helm/schnappy-auth/
      - helm lint helm/schnappy-observability/
      - helm lint helm/schnappy-sonarqube/

  - name: sonar
    image: git.pmon.dev/schnappy/sonar-scanner:latest
    commands:
      - '[ -n "$SONAR_TOKEN" ] && [ -n "$SONAR_HOST_URL" ] || { echo "Skipping SonarQube (no token or URL)"; exit 0; }'
      - sonar-scanner -Dsonar.qualitygate.wait=true
    depends_on: [helm-lint]
    backend_options:
      kubernetes:
        secrets:
          - name: woodpecker-ci-secrets
            key: sonar_token
            target:
              env: SONAR_TOKEN
          - name: woodpecker-ci-secrets
            key: sonar_host_url
            target:
              env: SONAR_HOST_URL
