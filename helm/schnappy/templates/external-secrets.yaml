{{- if .Values.vault.secretsEnabled }}
{{- if eq (.Values.mail.enabled | toString) "true" }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "schnappy.mail.secretName" . }}
  labels:
    {{- include "schnappy.monitor.labels" . | nindent 4 }}
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: {{ include "schnappy.mail.secretName" . }}
  data:
    - secretKey: MAIL_PASSWORD
      remoteRef:
        key: secret/data/schnappy/mail
        property: password
{{- end }}
{{- if or .Values.ai.apiKey .Values.ai.existingSecret }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "schnappy.ai.secretName" . }}
  labels:
    {{- include "schnappy.monitor.labels" . | nindent 4 }}
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: {{ include "schnappy.ai.secretName" . }}
  data:
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: secret/data/schnappy/ai
        property: api_key
{{- end }}
{{- if eq (.Values.webhook.enabled | toString) "true" }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "schnappy.webhook.secretName" . }}
  labels:
    {{- include "schnappy.monitor.labels" . | nindent 4 }}
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: {{ include "schnappy.webhook.secretName" . }}
  data:
    - secretKey: RESEND_WEBHOOK_SECRET
      remoteRef:
        key: secret/data/schnappy/webhook
        property: signing_secret
    - secretKey: RESEND_API_KEY
      remoteRef:
        key: secret/data/schnappy/webhook
        property: api_key
{{- end }}
{{- end }}
