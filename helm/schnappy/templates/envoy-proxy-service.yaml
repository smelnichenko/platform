{{- if eq (.Values.envoyGateway.enabled | toString) "true" }}
---
# ExternalName service to reference Envoy proxy in envoy-gateway-system namespace
# Needed because Traefik Ingress can't reference services in other namespaces
apiVersion: v1
kind: Service
metadata:
  name: {{ include "schnappy.fullname" . }}-envoy-proxy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
spec:
  type: ExternalName
  externalName: envoy-schnappy-schnappy-gw-85aa29de.envoy-gateway-system.svc.cluster.local
  ports:
    - port: 8080
      protocol: TCP
{{- end }}
