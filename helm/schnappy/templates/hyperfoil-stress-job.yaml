{{- if eq (.Values.hyperfoil.enabled | toString) "true" }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "schnappy.fullname" . }}-hyperfoil-stress
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
    app.kubernetes.io/component: hyperfoil-stress
spec:
  schedule: "0 0 31 2 *"
  suspend: true
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            {{- include "schnappy.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: hyperfoil-stress
            app.kubernetes.io/part-of: schnappy
        spec:
          serviceAccountName: {{ include "schnappy.fullname" . }}-hyperfoil
          imagePullSecrets:
            - name: forgejo-registry
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: hyperfoil
              image: {{ .Values.hyperfoil.image }}
              command: ['/bin/sh', '-c', '/benchmarks/run.sh; curl -sf -X POST http://localhost:15020/quitquitquit || true']
              resources:
                requests: { cpu: 500m, memory: 1Gi }
                limits: { cpu: 4000m, memory: 2Gi }
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              env:
                # Hyperfoil's CPU watchdog reads HOST-level CPU (all
                # cores on the node, not the pod cgroup). On a
                # single-node cluster the host easily hits 80% under
                # modest load + the production workload itself,
                # aborting the test after the first ramp. The
                # property name is `io.hyperfoil.cpu.usage.threshold`
                # (`cpu.threshold` alone is silently ignored).
                - name: JAVA_OPTS
                  value: "-Xmx1g -XX:+UseZGC -Dio.hyperfoil.cpu.usage.threshold=99"
                - name: MONITOR_URL
                  value: "http://{{ include "schnappy.fullname" . }}-monitor:8080"
                - name: CHAT_URL
                  value: "http://{{ include "schnappy.fullname" . }}-chat:8080"
                - name: CHESS_URL
                  value: "http://{{ include "schnappy.fullname" . }}-chess:8080"
                - name: KEYCLOAK_URL
                  value: "https://{{ .Values.keycloak.hostname }}"
                {{- if .Values.hyperfoil.clientSecretName }}
                - name: K6_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.hyperfoil.clientSecretName }}
                      key: CLIENT_SECRET
                {{- end }}
                {{- if .Values.hyperfoil.reportsUrl }}
                - name: REPORTS_URL
                  value: {{ .Values.hyperfoil.reportsUrl | quote }}
                {{- end }}
                {{- if .Values.minio.existingSecret }}
                - name: MINIO_USER
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.minio.existingSecret }}
                      key: MINIO_ROOT_USER
                - name: MINIO_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.minio.existingSecret }}
                      key: MINIO_ROOT_PASSWORD
                {{- end }}
              volumeMounts:
                - name: benchmarks
                  mountPath: /benchmarks
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: benchmarks
              configMap:
                name: {{ include "schnappy.fullname" . }}-hyperfoil-stress
                defaultMode: 0755
            - name: tmp
              emptyDir: {}
          restartPolicy: Never
{{- end }}
