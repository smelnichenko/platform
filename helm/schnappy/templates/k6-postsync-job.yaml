{{- if eq (.Values.smokeTest.enabled | toString) "true" }}
apiVersion: batch/v1
kind: Job
metadata:
  name: schnappy-k6-postsync
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/component: k6-smoke
        app.kubernetes.io/part-of: schnappy
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 12345
        runAsGroup: 12345
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: k6
          image: {{ .Values.smokeTest.image }}
          command: ['k6', 'run', '--no-usage-report', '--out', 'experimental-prometheus-rw', '/scripts/smoke-test.js']
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          env:
            - name: K6_DNS
              value: "ttl=5s,select=first,policy=preferIPv4"
            - name: K6_PROMETHEUS_RW_SERVER_URL
              value: "http://schnappy-mimir.schnappy.svc:9009/api/v1/push"
            - name: K6_PROMETHEUS_RW_TREND_STATS
              value: "p(95),p(99),avg,min,max,med"
            - name: BASE_URL
              value: {{ .Values.smokeTest.baseUrl | quote }}
            - name: KEYCLOAK_URL
              value: "https://{{ .Values.keycloak.hostname }}"
            - name: KEYCLOAK_PUBLIC_URL
              value: "https://{{ .Values.keycloak.hostname }}"
            {{- if .Values.smokeTest.clientSecretName }}
            - name: K6_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.smokeTest.clientSecretName }}
                  key: CLIENT_SECRET
            {{- end }}
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: schnappy-k6-smoke
      restartPolicy: Never
{{- end }}
