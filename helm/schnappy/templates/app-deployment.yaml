{{- if ne (.Values.monitor.enabled | toString) "false" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "schnappy.monitor.serviceName" . }}
  labels:
    {{- include "schnappy.monitor.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.app.replicas }}
  selector:
    matchLabels:
      {{- include "schnappy.monitor.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "schnappy.monitor.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/part-of: schnappy
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/api/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      serviceAccountName: {{ include "schnappy.fullname" . }}-monitor
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: forgejo-registry
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.37
          command: ['sh', '-c', 'until nc -z {{ include "schnappy.postgres.serviceName" . }} 5432; do echo waiting; sleep 2; done']
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
      containers:
        - name: app
          image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}"
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: config
              mountPath: /app/config
            - name: tmp
              mountPath: /tmp
          env:
            - name: SPRING_CONFIG_LOCATION
              value: "classpath:/,file:/app/config/"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.postgres.secretName" . }}
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.postgres.secretName" . }}
                  key: POSTGRES_PASSWORD
            - name: JAVA_OPTS
              value: {{ .Values.app.javaOpts | default "-Xmx1536m" | quote }}
            {{- if or .Values.redis.password .Values.redis.existingSecret }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.redis.secretName" . }}
                  key: REDIS_PASSWORD
            {{- end }}
            {{- if or .Values.ai.apiKey .Values.ai.existingSecret }}
            - name: AI_ENABLED
              value: "true"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.ai.secretName" . }}
                  key: ANTHROPIC_API_KEY
            {{- end }}
            {{- if eq (.Values.mail.enabled | toString) "true" }}
            - name: MAIL_ENABLED
              value: "true"
            - name: MAIL_HOST
              value: {{ .Values.mail.host | quote }}
            - name: MAIL_PORT
              value: {{ .Values.mail.port | quote }}
            - name: MAIL_USERNAME
              value: {{ .Values.mail.username | quote }}
            - name: MAIL_FROM
              value: {{ .Values.mail.fromAddress | quote }}
            - name: APP_URL
              value: {{ .Values.mail.appUrl | quote }}
            {{- if or .Values.mail.password .Values.mail.existingSecret }}
            - name: MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.mail.secretName" . }}
                  key: MAIL_PASSWORD
            {{- end }}
            {{- end }}
            {{- if eq (.Values.webhook.enabled | toString) "true" }}
            - name: RESEND_WEBHOOK_ENABLED
              value: "true"
            - name: RESEND_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.webhook.secretName" . }}
                  key: RESEND_WEBHOOK_SECRET
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.webhook.secretName" . }}
                  key: RESEND_API_KEY
            {{- end }}
            {{- if eq (.Values.minio.enabled | toString) "true" }}
            - name: MINIO_ENABLED
              value: "true"
            - name: MINIO_ENDPOINT
              value: "http://{{ include "schnappy.fullname" . }}-minio:9000"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.minio.secretName" . }}
                  key: MINIO_ROOT_USER
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.minio.secretName" . }}
                  key: MINIO_ROOT_PASSWORD
            - name: MINIO_BUCKET
              value: {{ .Values.minio.bucket | default "email-attachments" | quote }}
            {{- end }}
            {{- if eq (.Values.chat.e2eEnabled | toString) "true" }}
            - name: CHAT_E2E_ENABLED
              value: "true"
            {{- end }}
            {{- if ne (.Values.kafka.enabled | toString) "false" }}
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "{{ include "schnappy.kafka.serviceName" . }}:9092"
            {{- end }}
            {{- if ne (.Values.scylla.enabled | toString) "false" }}
            - name: SCYLLA_CONTACT_POINTS
              value: {{ include "schnappy.scylla.serviceName" . }}
            - name: SCYLLA_PORT
              value: "9042"
            - name: SCYLLA_DATACENTER
              value: "datacenter1"
            {{- end }}
            {{- if eq (.Values.captcha.enabled | toString) "true" }}
            - name: CAPTCHA_ENABLED
              value: "true"
            {{- end }}
            {{- if eq (.Values.chess.enabled | toString) "true" }}
            - name: CHESS_ENABLED
              value: "true"
            {{- end }}
            {{- if eq (.Values.tracing.enabled | toString) "true" }}
            - name: MANAGEMENT_TRACING_SAMPLING_PROBABILITY
              value: {{ .Values.tracing.samplingProbability | default "0.1" | quote }}
            - name: MANAGEMENT_OTLP_TRACING_ENDPOINT
              value: {{ .Values.tracing.tempoEndpoint | default "http://schnappy-tempo.schnappy.svc:4317" | quote }}
            - name: MANAGEMENT_OTLP_TRACING_TRANSPORT
              value: grpc
            - name: SPRING_APPLICATION_NAME
              value: monitor
            {{- end }}
            - name: REGISTRATION_APPROVAL_MODE
              value: {{ .Values.auth.registrationApproval.mode | default "ai" | quote }}
            {{- if .Values.auth.registrationApproval.criteria }}
            - name: REGISTRATION_APPROVAL_CRITERIA
              value: {{ .Values.auth.registrationApproval.criteria | quote }}
            {{- end }}
            - name: REGISTRATION_APPROVAL_DEFAULT_GROUP
              value: {{ .Values.auth.registrationApproval.defaultGroup | default "Users" | quote }}
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /api/actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
      volumes:
        - name: config
          configMap:
            name: {{ include "schnappy.fullname" . }}-app-config
        - name: tmp
          emptyDir: {}
{{- end }}
