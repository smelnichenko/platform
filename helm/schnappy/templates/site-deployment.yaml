{{- if .Values.site.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "schnappy.site.serviceName" . }}
  labels:
    {{- include "schnappy.site.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.site.replicas }}
  selector:
    matchLabels:
      {{- include "schnappy.site.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "schnappy.site.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/part-of: schnappy
    spec:
      serviceAccountName: {{ include "schnappy.fullname" . }}-site
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: forgejo-registry
      containers:
        - name: site
          image: "{{ .Values.site.image.repository }}:{{ .Values.site.image.tag }}"
          imagePullPolicy: {{ .Values.site.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: API_BACKEND_HOST
              value: "{{ include "schnappy.monitor.serviceName" . }}"
            - name: DNS_RESOLVER
              value: "{{ required "site.dnsResolver is required" .Values.site.dnsResolver }}"
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
            - name: games-conf
              mountPath: /etc/nginx/games.conf
              subPath: games.conf
              readOnly: true
          resources:
            {{- toYaml .Values.site.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: nginx-conf
          emptyDir: {}
        - name: games-conf
          configMap:
            name: {{ include "schnappy.fullname" . }}-site-games
{{- end }}
