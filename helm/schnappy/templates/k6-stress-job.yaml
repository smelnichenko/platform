{{- if eq (.Values.loadTest.enabled | toString) "true" }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "schnappy.fullname" . }}-k6-stress
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
    app.kubernetes.io/component: k6-load
spec:
  schedule: "0 0 31 2 *"
  suspend: true
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      ttlSecondsAfterFinished: 86400
      completions: {{ .Values.loadTest.stressWorkers | default 3 }}
      parallelism: {{ .Values.loadTest.stressWorkers | default 3 }}
      template:
        metadata:
          labels:
            {{- include "schnappy.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: k6-load
            app.kubernetes.io/part-of: schnappy
        spec:
          securityContext:
            runAsNonRoot: true
            runAsUser: 12345
            runAsGroup: 12345
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: k6
              image: {{ .Values.loadTest.image | default .Values.smokeTest.image }}
              command: ['k6', 'run', '--out', 'experimental-prometheus-rw', '/scripts/stress-test.js']
              resources:
                requests: { cpu: 500m, memory: 128Mi }
                limits: { cpu: 2000m, memory: 512Mi }
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
              env:
                - name: BASE_URL
                  value: {{ .Values.loadTest.baseUrl | default (printf "http://%s-gateway:8080" (include "schnappy.fullname" .)) | quote }}
                - name: KEYCLOAK_URL
                  value: "http://{{ include "schnappy.keycloak.serviceName" . }}:8080"
                - name: K6_PROMETHEUS_RW_SERVER_URL
                  value: "http://{{ include "schnappy.prometheus.serviceName" . }}:9090/api/v1/write"
                - name: K6_PROMETHEUS_RW_TREND_AS_NATIVE_HISTOGRAM
                  value: "true"
                {{- if .Values.smokeTest.clientSecretName }}
                - name: K6_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.smokeTest.clientSecretName }}
                      key: CLIENT_SECRET
                {{- end }}
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
          volumes:
            - name: scripts
              configMap:
                name: {{ include "schnappy.fullname" . }}-k6-stress
          restartPolicy: Never
{{- end }}
