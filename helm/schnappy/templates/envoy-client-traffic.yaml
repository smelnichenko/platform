{{- if eq (.Values.envoyGateway.enabled | toString) "true" }}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: {{ include "schnappy.fullname" . }}-client-traffic
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ include "schnappy.fullname" . }}-gw
  clientIPDetection:
    xForwardedFor:
      numTrustedHops: 1
{{- end }}
