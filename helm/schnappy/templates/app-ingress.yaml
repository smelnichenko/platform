{{- if .Values.app.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "schnappy.fullname" . }}-app
  labels:
    {{- include "schnappy.monitor.labels" . | nindent 4 }}
  {{- $annotations := dict }}
  {{- if and .Values.app.ingress.tls .Values.app.ingress.tls.enabled }}
  {{- $_ := set $annotations "cert-manager.io/cluster-issuer" (.Values.app.ingress.tls.clusterIssuer | default "letsencrypt-prod") }}
  {{- end }}
  {{- if .Values.app.ingress.annotations }}
  {{- $annotations = merge $annotations .Values.app.ingress.annotations }}
  {{- end }}
  {{- if $annotations }}
  annotations:
    {{- toYaml $annotations | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.app.ingress.className }}
  ingressClassName: {{ .Values.app.ingress.className }}
  {{- end }}
  {{- if and .Values.app.ingress.tls .Values.app.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.app.ingress.host }}
      {{- if .Values.app.ingress.tls.secretName }}
      secretName: {{ .Values.app.ingress.tls.secretName }}
      {{- end }}
  {{- end }}
  rules:
    - {{ if .Values.app.ingress.host }}host: {{ .Values.app.ingress.host }}{{ end }}
      http:
        paths:
          # API routes — go through Envoy Gateway, Spring Cloud Gateway, or direct
          - path: /api
            pathType: Prefix
            backend:
              service:
                {{- if eq (.Values.envoyGateway.enabled | toString) "true" }}
                name: {{ include "schnappy.fullname" . }}-envoy-proxy
                port:
                  number: 8080
                {{- else if eq (.Values.gateway.enabled | toString) "true" }}
                name: {{ include "schnappy.gateway.serviceName" . }}
                port:
                  number: {{ .Values.gateway.service.port }}
                {{- else }}
                name: {{ include "schnappy.monitor.serviceName" . }}
                port:
                  number: {{ .Values.app.service.port }}
                {{- end }}
          # WebSocket routes
          - path: /ws
            pathType: Prefix
            backend:
              service:
                {{- if eq (.Values.envoyGateway.enabled | toString) "true" }}
                name: {{ include "schnappy.fullname" . }}-envoy-proxy
                port:
                  number: 8080
                {{- else if eq (.Values.gateway.enabled | toString) "true" }}
                name: {{ include "schnappy.gateway.serviceName" . }}
                port:
                  number: {{ .Values.gateway.service.port }}
                {{- else }}
                name: {{ include "schnappy.monitor.serviceName" . }}
                port:
                  number: {{ .Values.app.service.port }}
                {{- end }}
          {{- if .Values.site.enabled }}
          # All other routes go to site
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "schnappy.site.serviceName" . }}
                port:
                  number: {{ .Values.site.service.port }}
          {{- else }}
          # No frontend, serve API at root
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "schnappy.monitor.serviceName" . }}
                port:
                  number: {{ .Values.app.service.port }}
          {{- end }}
{{- end }}
