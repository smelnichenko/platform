{{- if eq (.Values.hyperfoil.enabled | toString) "true" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "schnappy.fullname" . }}-hyperfoil-stress
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
data:
  run.sh: |
    #!/bin/sh

    echo "Fetching token from ${KEYCLOAK_URL}..."
    for i in 1 2 3; do
      TOKEN_JSON=$(curl -s --max-time 10 -X POST "${KEYCLOAK_URL}/realms/schnappy/protocol/openid-connect/token" \
        -d "client_id=k6-smoke&client_secret=${K6_CLIENT_SECRET}&grant_type=client_credentials") && break
      echo "Attempt $i failed, retrying in 3s..."
      sleep 3
    done
    [ -z "$TOKEN_JSON" ] && { echo "ERROR: Failed to fetch token from Keycloak after 3 attempts"; exit 1; }
    ACCESS_TOKEN=$(echo "$TOKEN_JSON" | sed 's/.*"access_token":"\([^"]*\)".*/\1/')
    if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "$TOKEN_JSON" ]; then
      echo "ERROR: Failed to extract access_token from: ${TOKEN_JSON}"; exit 1;
    fi

    PAYLOAD=$(echo "$ACCESS_TOKEN" | cut -d. -f2)
    MOD=$(( ${#PAYLOAD} % 4 ))
    if [ "$MOD" -eq 2 ]; then PAYLOAD="${PAYLOAD}=="; elif [ "$MOD" -eq 3 ]; then PAYLOAD="${PAYLOAD}="; fi
    JSON=$(echo "$PAYLOAD" | base64 -d 2>/dev/null)
    USER_UUID=$(echo "$JSON" | sed 's/.*"sub":"\([^"]*\)".*/\1/')
    USER_EMAIL=$(echo "$JSON" | sed 's/.*"email":"\([^"]*\)".*/\1/')
    [ -z "$USER_EMAIL" ] || [ "$USER_EMAIL" = "$JSON" ] && USER_EMAIL="k6-smoke@pmon.dev"

    echo "Token acquired: UUID=${USER_UUID}, email=${USER_EMAIL}"

    MONITOR_HOST=$(echo "$MONITOR_URL" | sed 's|http://||')
    CHAT_HOST=$(echo "$CHAT_URL" | sed 's|http://||')
    CHESS_HOST=$(echo "$CHESS_URL" | sed 's|http://||')

    cp /benchmarks/stress-test.hf.yaml /tmp/benchmark.yaml
    sed -i "s|__MONITOR_URL__|${MONITOR_URL}|g" /tmp/benchmark.yaml
    sed -i "s|__CHAT_URL__|${CHAT_URL}|g" /tmp/benchmark.yaml
    sed -i "s|__CHESS_URL__|${CHESS_URL}|g" /tmp/benchmark.yaml
    sed -i "s|__MONITOR_HOST__|${MONITOR_HOST}|g" /tmp/benchmark.yaml
    sed -i "s|__CHAT_HOST__|${CHAT_HOST}|g" /tmp/benchmark.yaml
    sed -i "s|__CHESS_HOST__|${CHESS_HOST}|g" /tmp/benchmark.yaml
    sed -i "s|__UUID__|${USER_UUID}|g" /tmp/benchmark.yaml
    sed -i "s|__EMAIL__|${USER_EMAIL}|g" /tmp/benchmark.yaml
    awk -v token="$ACCESS_TOKEN" '{gsub(/__TOKEN__/, token); print}' /tmp/benchmark.yaml > /tmp/benchmark2.yaml
    mv /tmp/benchmark2.yaml /tmp/benchmark.yaml

    /deployment/bin/run.sh -o /tmp/report /tmp/benchmark.yaml || true

    echo "=== HYPERFOIL STRESS RESULTS ==="
    # Hyperfoil -o writes a single HTML file, not a directory
    if [ -f /tmp/report ]; then
      mkdir -p /tmp/report-dir
      mv /tmp/report /tmp/report-dir/index.html
      echo "Report generated successfully (single file)"
    elif [ -f /tmp/report/index.html ]; then
      mv /tmp/report /tmp/report-dir
      echo "Report generated successfully (directory)"
    fi

    # Upload report to MinIO
    if [ -f /tmp/report-dir/index.html ] && [ -n "$MINIO_USER" ]; then
      export MC_CONFIG_DIR=/tmp/.mc
      mc alias set minio http://{{ .Values.hyperfoil.minioEndpoint | default (printf "%s-minio:9000" (include "schnappy.fullname" .)) }} "$MINIO_USER" "$MINIO_PASSWORD" --api S3v4
      mc mb --ignore-existing minio/hyperfoil-reports
      mc anonymous set download minio/hyperfoil-reports

      REPORT_DIR="stress/$(date -u +%Y-%m-%d_%H%M%S)"
      echo "Uploading report to minio/hyperfoil-reports/${REPORT_DIR}/"
      mc cp --recursive /tmp/report-dir/ "minio/hyperfoil-reports/${REPORT_DIR}/"

      # Generate index page listing all reports
      echo "Generating index page..."
      {
        echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Hyperfoil Reports</title>'
        echo '<style>body{font-family:sans-serif;max-width:800px;margin:2em auto;padding:0 1em}table{border-collapse:collapse;width:100%}th,td{text-align:left;padding:8px 12px;border-bottom:1px solid #ddd}th{background:#f5f5f5}a{color:#0366d6}</style>'
        echo '</head><body><h1>Hyperfoil Reports</h1><table><tr><th>Type</th><th>Date</th><th>Link</th></tr>'
        for type in load stress; do
          mc ls "minio/hyperfoil-reports/${type}/" 2>/dev/null | while read -r line; do
            dir=$(echo "$line" | awk '{print $NF}' | sed 's|/$||')
            [ -n "$dir" ] && echo "<tr><td>${type}</td><td>${dir}</td><td><a href=\"${type}/${dir}/index.html\">View Report</a></td></tr>"
          done
        done
        echo '</table></body></html>'
      } > /tmp/index.html
      mc cp /tmp/index.html minio/hyperfoil-reports/index.html
      echo ""
      echo "============================================"
      echo "Report: ${REPORTS_URL}/${REPORT_DIR}/index.html"
      echo "All:    ${REPORTS_URL}/"
      echo "============================================"
    fi

  stress-test.hf.yaml: |
    name: schnappy-stress
    http:
      - host: __MONITOR_URL__
        sharedConnections: 5000
      - host: __CHAT_URL__
        sharedConnections: 2500
      - host: __CHESS_URL__
        sharedConnections: 2500

    phases:
      - rate100:
          constantRate:
            usersPerSec: 100
            duration: 60s
            maxSessions: 300
            scenario: &scenario
              - setup:
                  - set: { var: token, value: __TOKEN__ }
                  - set: { var: uuid, value: __UUID__ }
                  - set: { var: email, value: __EMAIL__ }
              - requests:
                  - httpRequest:
                      GET: /api/health
                      authority: __MONITOR_HOST__
                  - httpRequest:
                      GET: /api/monitor/pages
                      authority: __MONITOR_HOST__
                      headers:
                        authorization: "Bearer ${token}"
                        x-user-uuid: ${uuid}
                        x-user-email: ${email}
                  - httpRequest:
                      GET: /api/rss/feeds
                      authority: __MONITOR_HOST__
                      headers:
                        authorization: "Bearer ${token}"
                        x-user-uuid: ${uuid}
                        x-user-email: ${email}
                  - httpRequest:
                      GET: /api/chat/channels
                      authority: __CHAT_HOST__
                      headers:
                        authorization: "Bearer ${token}"
                        x-user-uuid: ${uuid}
                        x-user-email: ${email}
                  - httpRequest:
                      GET: /api/chess/games
                      authority: __CHESS_HOST__
                      headers:
                        authorization: "Bearer ${token}"
                        x-user-uuid: ${uuid}
                        x-user-email: ${email}
                  - httpRequest:
                      GET: /api/inbox/emails
                      authority: __MONITOR_HOST__
                      headers:
                        authorization: "Bearer ${token}"
                        x-user-uuid: ${uuid}
                        x-user-email: ${email}

      - rate200:
          constantRate:
            usersPerSec: 200
            duration: 60s
            maxSessions: 600
            scenario: *scenario
          startAfter: rate100

      - rate300:
          constantRate:
            usersPerSec: 300
            duration: 60s
            maxSessions: 900
            scenario: *scenario
          startAfter: rate200

      - rate400:
          constantRate:
            usersPerSec: 400
            duration: 60s
            maxSessions: 1200
            scenario: *scenario
          startAfter: rate300

      - rate500:
          constantRate:
            usersPerSec: 500
            duration: 60s
            maxSessions: 1500
            scenario: *scenario
          startAfter: rate400

      - rate600:
          constantRate:
            usersPerSec: 600
            duration: 60s
            maxSessions: 2000
            scenario: *scenario
          startAfter: rate500

      - rate700:
          constantRate:
            usersPerSec: 700
            duration: 60s
            maxSessions: 2500
            scenario: *scenario
          startAfter: rate600

      - rate800:
          constantRate:
            usersPerSec: 800
            duration: 60s
            maxSessions: 3000
            scenario: *scenario
          startAfter: rate700

      - rate900:
          constantRate:
            usersPerSec: 900
            duration: 60s
            maxSessions: 3500
            scenario: *scenario
          startAfter: rate800

      - rate1000:
          constantRate:
            usersPerSec: 1000
            duration: 60s
            maxSessions: 4000
            scenario: *scenario
          startAfter: rate900
{{- end }}
