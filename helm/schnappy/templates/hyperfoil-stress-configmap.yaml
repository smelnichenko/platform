{{- if eq (.Values.hyperfoil.enabled | toString) "true" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "schnappy.fullname" . }}-hyperfoil-stress
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
data:
  run.sh: |
    #!/bin/sh
    set -e

    # Get token from Keycloak (client_credentials grant)
    TOKEN_JSON=$(curl -sf -X POST "${KEYCLOAK_URL}/realms/schnappy/protocol/openid-connect/token" \
      -d "client_id=k6-smoke&client_secret=${K6_CLIENT_SECRET}&grant_type=client_credentials")
    ACCESS_TOKEN=$(echo "$TOKEN_JSON" | sed 's/.*"access_token":"\([^"]*\)".*/\1/')

    # Decode JWT payload → extract sub + email for gateway headers
    PAYLOAD=$(echo "$ACCESS_TOKEN" | cut -d. -f2)
    PAD=$(( 4 - ${#PAYLOAD} % 4 ))
    [ "$PAD" -lt 4 ] && PAYLOAD="${PAYLOAD}$(printf '%0.s=' $(seq 1 $PAD))"
    JSON=$(echo "$PAYLOAD" | base64 -d 2>/dev/null)
    USER_UUID=$(echo "$JSON" | sed 's/.*"sub":"\([^"]*\)".*/\1/')
    USER_EMAIL=$(echo "$JSON" | sed 's/.*"email":"\([^"]*\)".*/\1/')
    [ -z "$USER_EMAIL" ] && USER_EMAIL="k6-smoke@pmon.dev"

    echo "Token acquired: UUID=${USER_UUID}"

    /deployment/bin/run.sh \
      -PMONITOR_URL="${MONITOR_URL}" \
      -PCHAT_URL="${CHAT_URL}" \
      -PTOKEN="${ACCESS_TOKEN}" \
      -PUUID="${USER_UUID}" \
      -PEMAIL="${USER_EMAIL}" \
      /benchmarks/stress-test.hf.yaml

  stress-test.hf.yaml: |
    name: schnappy-stress
    http:
      - host: !param MONITOR_URL http://schnappy-monitor:8080
        sharedConnections: 500
      - host: !param CHAT_URL http://schnappy-chat:8080
        sharedConnections: 100

    phases:
      - ramp50:
          increasingRate:
            initialUsersPerSec: 10
            targetUsersPerSec: 50
            duration: 30s
            maxSessions: 2000
            forks:
              stress: &stress-scenario
                scenario:
                  - setup:
                      - set: { var: token, value: !param TOKEN _ }
                      - set: { var: uuid, value: !param UUID _ }
                      - set: { var: email, value: !param EMAIL _ }
                  - health:
                      - httpRequest:
                          GET: /api/health
                          authority: !param MONITOR_URL http://schnappy-monitor:8080
                  - pages:
                      - httpRequest:
                          GET: /api/monitor/pages
                          authority: !param MONITOR_URL http://schnappy-monitor:8080
                          headers:
                            authorization: "Bearer ${token}"
                            x-user-uuid: ${uuid}
                            x-user-email: ${email}
                  - feeds:
                      - httpRequest:
                          GET: /api/rss/feeds
                          authority: !param MONITOR_URL http://schnappy-monitor:8080
                          headers:
                            authorization: "Bearer ${token}"
                            x-user-uuid: ${uuid}
                            x-user-email: ${email}
                  - channels:
                      - httpRequest:
                          GET: /api/chat/channels
                          authority: !param CHAT_URL http://schnappy-chat:8080
                          headers:
                            authorization: "Bearer ${token}"
                            x-user-uuid: ${uuid}
                            x-user-email: ${email}
                  - inbox:
                      - httpRequest:
                          GET: /api/inbox/emails
                          authority: !param MONITOR_URL http://schnappy-monitor:8080
                          headers:
                            authorization: "Bearer ${token}"
                            x-user-uuid: ${uuid}
                            x-user-email: ${email}

      - sustain50:
          constantRate:
            usersPerSec: 50
            duration: 60s
            maxSessions: 2000
            forks:
              stress: *stress-scenario

      - ramp100:
          increasingRate:
            initialUsersPerSec: 50
            targetUsersPerSec: 100
            duration: 30s
            maxSessions: 2000
            forks:
              stress: *stress-scenario

      - sustain100:
          constantRate:
            usersPerSec: 100
            duration: 60s
            maxSessions: 2000
            forks:
              stress: *stress-scenario

      - ramp200:
          increasingRate:
            initialUsersPerSec: 100
            targetUsersPerSec: 200
            duration: 30s
            maxSessions: 2000
            forks:
              stress: *stress-scenario

      - sustain200:
          constantRate:
            usersPerSec: 200
            duration: 60s
            maxSessions: 2000
            forks:
              stress: *stress-scenario

      - ramp500:
          increasingRate:
            initialUsersPerSec: 200
            targetUsersPerSec: 500
            duration: 30s
            maxSessions: 2000
            forks:
              stress: *stress-scenario

      - sustain500:
          constantRate:
            usersPerSec: 500
            duration: 60s
            maxSessions: 2000
            forks:
              stress: *stress-scenario

      - cooldown:
          decreasingRate:
            initialUsersPerSec: 500
            targetUsersPerSec: 0
            duration: 60s
            maxSessions: 2000
            forks:
              stress: *stress-scenario
{{- end }}
