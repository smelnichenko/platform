{{- if eq (.Values.hyperfoil.enabled | toString) "true" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "schnappy.fullname" . }}-hyperfoil-stress
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
data:
  run.sh: |
    #!/bin/sh

    echo "Fetching token from ${KEYCLOAK_URL}..."
    for i in 1 2 3; do
      TOKEN_JSON=$(curl -s --max-time 10 -X POST "${KEYCLOAK_URL}/realms/schnappy/protocol/openid-connect/token" \
        -d "client_id=k6-smoke&client_secret=${K6_CLIENT_SECRET}&grant_type=client_credentials") && break
      echo "Attempt $i failed, retrying in 3s..."
      sleep 3
    done
    [ -z "$TOKEN_JSON" ] && { echo "ERROR: Failed to fetch token from Keycloak after 3 attempts"; exit 1; }
    ACCESS_TOKEN=$(echo "$TOKEN_JSON" | sed 's/.*"access_token":"\([^"]*\)".*/\1/')
    if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "$TOKEN_JSON" ]; then
      echo "ERROR: Failed to extract access_token from: ${TOKEN_JSON}"; exit 1;
    fi

    PAYLOAD=$(echo "$ACCESS_TOKEN" | cut -d. -f2)
    MOD=$(( ${#PAYLOAD} % 4 ))
    if [ "$MOD" -eq 2 ]; then PAYLOAD="${PAYLOAD}=="; elif [ "$MOD" -eq 3 ]; then PAYLOAD="${PAYLOAD}="; fi
    JSON=$(echo "$PAYLOAD" | base64 -d 2>/dev/null)
    USER_UUID=$(echo "$JSON" | sed 's/.*"sub":"\([^"]*\)".*/\1/')
    USER_EMAIL=$(echo "$JSON" | sed 's/.*"email":"\([^"]*\)".*/\1/')
    [ -z "$USER_EMAIL" ] || [ "$USER_EMAIL" = "$JSON" ] && USER_EMAIL="k6-smoke@pmon.dev"

    echo "Token acquired: UUID=${USER_UUID}, email=${USER_EMAIL}"

    cp /benchmarks/stress-test.hf.yaml /tmp/benchmark.yaml
    sed -i "s|__MONITOR_URL__|${MONITOR_URL}|g" /tmp/benchmark.yaml
    sed -i "s|__UUID__|${USER_UUID}|g" /tmp/benchmark.yaml
    sed -i "s|__EMAIL__|${USER_EMAIL}|g" /tmp/benchmark.yaml
    awk -v token="$ACCESS_TOKEN" '{gsub(/__TOKEN__/, token); print}' /tmp/benchmark.yaml > /tmp/benchmark2.yaml
    mv /tmp/benchmark2.yaml /tmp/benchmark.yaml

    /deployment/bin/run.sh -o /tmp/report /tmp/benchmark.yaml || true

    echo "=== HYPERFOIL STRESS RESULTS ==="
    ls -lh /tmp/report/ 2>/dev/null

  stress-test.hf.yaml: |
    name: schnappy-stress
    http:
      host: __MONITOR_URL__
      sharedConnections: 500

    phases:
      - ramp50:
          increasingRate:
            initialUsersPerSec: 10
            targetUsersPerSec: 50
            duration: 30s
            maxSessions: 2000
            scenario: &scenario
              - setup:
                  - set: { var: token, value: __TOKEN__ }
                  - set: { var: uuid, value: __UUID__ }
                  - set: { var: email, value: __EMAIL__ }
              - health:
                  - httpRequest:
                      GET: /api/health
              - pages:
                  - httpRequest:
                      GET: /api/monitor/pages
                      headers:
                        authorization: "Bearer ${token}"
                        x-user-uuid: ${uuid}
                        x-user-email: ${email}
              - feeds:
                  - httpRequest:
                      GET: /api/rss/feeds
                      headers:
                        authorization: "Bearer ${token}"
                        x-user-uuid: ${uuid}
                        x-user-email: ${email}
              - inbox:
                  - httpRequest:
                      GET: /api/inbox/emails
                      headers:
                        authorization: "Bearer ${token}"
                        x-user-uuid: ${uuid}
                        x-user-email: ${email}

      - sustain50:
          constantRate:
            usersPerSec: 50
            duration: 60s
            maxSessions: 2000
            startAfter: ramp50
            scenario: *scenario

      - ramp100:
          increasingRate:
            initialUsersPerSec: 50
            targetUsersPerSec: 100
            duration: 30s
            maxSessions: 2000
            startAfter: sustain50
            scenario: *scenario

      - sustain100:
          constantRate:
            usersPerSec: 100
            duration: 60s
            maxSessions: 2000
            startAfter: ramp100
            scenario: *scenario

      - ramp200:
          increasingRate:
            initialUsersPerSec: 100
            targetUsersPerSec: 200
            duration: 30s
            maxSessions: 2000
            startAfter: sustain100
            scenario: *scenario

      - sustain200:
          constantRate:
            usersPerSec: 200
            duration: 60s
            maxSessions: 2000
            startAfter: ramp200
            scenario: *scenario

      - ramp500:
          increasingRate:
            initialUsersPerSec: 200
            targetUsersPerSec: 500
            duration: 30s
            maxSessions: 2000
            startAfter: sustain200
            scenario: *scenario

      - sustain500:
          constantRate:
            usersPerSec: 500
            duration: 60s
            maxSessions: 2000
            startAfter: ramp500
            scenario: *scenario

      - cooldown:
          decreasingRate:
            initialUsersPerSec: 500
            targetUsersPerSec: 0
            duration: 60s
            maxSessions: 2000
            startAfter: sustain500
            scenario: *scenario
{{- end }}
