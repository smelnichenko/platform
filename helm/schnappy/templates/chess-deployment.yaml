{{- if eq (.Values.chessService.enabled | toString) "true" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "schnappy.chess.serviceName" . }}
  labels:
    {{- include "schnappy.chess.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.chessService.replicas }}
  selector:
    matchLabels:
      {{- include "schnappy.chess.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "schnappy.chess.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/part-of: schnappy
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/api/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      serviceAccountName: {{ include "schnappy.fullname" . }}-chess
      imagePullSecrets:
        - name: forgejo-registry
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: chess
          image: "{{ .Values.chessService.image.repository }}:{{ .Values.chessService.image.tag }}"
          imagePullPolicy: {{ .Values.chessService.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          env:
            - name: JAVA_OPTS
              value: {{ .Values.chessService.javaOpts | default "-Xmx512m" | quote }}
            - name: DB_HOST
              value: {{ include "schnappy.postgres.serviceName" . }}
            - name: SPRING_DATASOURCE_HIKARI_DATA-SOURCE-PROPERTIES
              value: "sslmode=require"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.fullname" . }}-postgres-chess
                  key: DB_NAME
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.fullname" . }}-postgres-chess
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.fullname" . }}-postgres-chess
                  key: DB_PASSWORD
            - name: VALKEY_HOST
              value: {{ include "schnappy.valkey.serviceName" . }}
            {{- if or .Values.valkey.password .Values.valkey.existingSecret }}
            - name: VALKEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.valkey.secretName" . }}
                  key: VALKEY_PASSWORD
            {{- end }}
            {{- if eq (.Values.tracing.enabled | toString) "true" }}
            - name: MANAGEMENT_TRACING_SAMPLING_PROBABILITY
              value: {{ .Values.tracing.samplingProbability | default "0.1" | quote }}
            - name: MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT
              value: {{ .Values.tracing.tempoEndpoint | default "http://schnappy-tempo.schnappy-infra.svc:4317" | quote }}
            - name: MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_TRANSPORT
              value: {{ .Values.tracing.tempoTransport | default "grpc" | quote }}
            - name: MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_TIMEOUT
              value: {{ .Values.tracing.exporterTimeout | default "30s" | quote }}
            - name: MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_CONNECT_TIMEOUT
              value: {{ .Values.tracing.exporterConnectTimeout | default "30s" | quote }}
            - name: MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_SCHEDULE_DELAY
              value: {{ .Values.tracing.scheduleDelay | default "1s" | quote }}
            - name: MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_MAX_QUEUE_SIZE
              value: {{ .Values.tracing.maxQueueSize | default "8192" | quote }}
            - name: MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_MAX_BATCH_SIZE
              value: {{ .Values.tracing.maxBatchSize | default "2048" | quote }}
            - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
              value: "health,prometheus,env,configprops"
            - name: MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED
              value: "false"
            - name: SPRING_APPLICATION_NAME
              value: chess
            {{- end }}
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "{{ include "schnappy.kafka.serviceName" . }}:9092"
          resources:
            {{- toYaml .Values.chessService.resources | nindent 12 }}
          # 5-minute startup budget. Until startupProbe succeeds, kubelet
          # holds off on liveness/readiness so a slow Spring Boot boot
          # (DB+Kafka init) doesn't trigger a CrashLoop.
          startupProbe:
            httpGet:
              path: /api/actuator/health/liveness
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/actuator/health/liveness
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/actuator/health/readiness
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
