{{- if and .Values.ai.apiKey (not .Values.ai.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "schnappy.ai.secretName" . }}
  labels:
    {{- include "schnappy.monitor.labels" . | nindent 4 }}
type: Opaque
stringData:
  ANTHROPIC_API_KEY: {{ .Values.ai.apiKey | quote }}
{{- end }}
