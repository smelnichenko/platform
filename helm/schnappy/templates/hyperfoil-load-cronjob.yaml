{{- if eq (.Values.hyperfoil.enabled | toString) "true" }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "schnappy.fullname" . }}-hyperfoil-load
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
    app.kubernetes.io/component: hyperfoil-load
spec:
  schedule: {{ .Values.hyperfoil.load.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            {{- include "schnappy.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: hyperfoil-load
            app.kubernetes.io/part-of: schnappy
        spec:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: hyperfoil
              image: {{ .Values.hyperfoil.image }}
              command: ['/bin/sh', '/benchmarks/run.sh']
              resources:
                requests: { cpu: 500m, memory: 256Mi }
                limits: { cpu: 2000m, memory: 512Mi }
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              env:
                - name: JAVA_OPTS
                  value: "-Xmx256m -XX:+UseZGC"
                - name: MONITOR_URL
                  value: "http://{{ include "schnappy.fullname" . }}-monitor:8080"
                - name: CHAT_URL
                  value: "http://{{ include "schnappy.fullname" . }}-chat:8080"
                - name: CHESS_URL
                  value: "http://{{ include "schnappy.fullname" . }}-chess:8080"
                - name: KEYCLOAK_URL
                  value: "http://{{ include "schnappy.keycloak.serviceName" . }}:8080"
                {{- if .Values.smokeTest.clientSecretName }}
                - name: K6_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.smokeTest.clientSecretName }}
                      key: CLIENT_SECRET
                {{- end }}
                {{- if .Values.minio.existingSecret }}
                - name: MINIO_USER
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.minio.existingSecret }}
                      key: MINIO_ROOT_USER
                - name: MINIO_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.minio.existingSecret }}
                      key: MINIO_ROOT_PASSWORD
                {{- end }}
              volumeMounts:
                - name: benchmarks
                  mountPath: /benchmarks
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: benchmarks
              configMap:
                name: {{ include "schnappy.fullname" . }}-hyperfoil-load
                defaultMode: 0755
            - name: tmp
              emptyDir: {}
          restartPolicy: Never
{{- end }}
