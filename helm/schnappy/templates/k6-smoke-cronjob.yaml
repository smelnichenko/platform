{{- if eq (.Values.smokeTest.enabled | toString) "true" }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "schnappy.fullname" . }}-k6-smoke
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
    app.kubernetes.io/component: k6-smoke
spec:
  schedule: {{ .Values.smokeTest.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            {{- include "schnappy.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: k6-smoke
            app.kubernetes.io/part-of: schnappy
            istio.io/dataplane-mode: none
        spec:
          securityContext:
            runAsNonRoot: true
            runAsUser: 12345
            runAsGroup: 12345
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: k6
              image: {{ .Values.smokeTest.image }}
              command: ['k6', 'run', '--out', 'experimental-prometheus-rw', '/scripts/smoke-test.js']
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
              env:
                - name: BASE_URL
                  value: {{ .Values.smokeTest.baseUrl | default (printf "https://%s" .Values.app.ingress.host) | quote }}
                - name: KEYCLOAK_URL
                  value: "http://{{ include "schnappy.keycloak.serviceName" . }}:8080"
                - name: KEYCLOAK_PUBLIC_URL
                  value: "https://{{ .Values.keycloak.hostname | default "auth.pmon.dev" }}"
                - name: K6_PROMETHEUS_RW_SERVER_URL
                  value: "http://{{ include "schnappy.victoriametrics.serviceName" . }}:8428/api/v1/write"
                - name: K6_PROMETHEUS_RW_TREND_AS_NATIVE_HISTOGRAM
                  value: "true"
                {{- if .Values.smokeTest.clientSecretName }}
                - name: K6_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.smokeTest.clientSecretName }}
                      key: CLIENT_SECRET
                {{- end }}
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
          volumes:
            - name: scripts
              configMap:
                name: {{ include "schnappy.fullname" . }}-k6-smoke
          restartPolicy: Never
{{- end }}
