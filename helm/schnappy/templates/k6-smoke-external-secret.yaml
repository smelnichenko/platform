{{- if and (eq (.Values.smokeTest.enabled | toString) "true") .Values.vault.secretsEnabled .Values.smokeTest.clientSecretName }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.smokeTest.clientSecretName }}
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: {{ .Values.smokeTest.clientSecretName }}
  data:
    - secretKey: CLIENT_SECRET
      remoteRef:
        key: secret/data/schnappy/k6-smoke
        property: client_secret
{{- end }}
