{{- if .Values.site.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "schnappy.fullname" . }}-site-games
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
data:
  games.conf: |
    {{- if .Values.games }}
    {{- range .Values.games }}
    # SPA route for /{{ .path | default .name }} (React handles auth check)
    location = /{{ .path | default .name }} {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        include /etc/nginx/security-headers.conf;
        try_files /index.html =404;
    }

    # Game files — proxy to {{ .name }} service
    location /{{ .path | default .name }}/ {
        proxy_pass http://{{ include "schnappy.fullname" $ }}-{{ .name }}.{{ $.Release.Namespace }}.svc.cluster.local;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        include /etc/nginx/security-headers-base.conf;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Content-Security-Policy "default-src 'self'; frame-src 'self' https://auth.pmon.dev; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' blob: data:; font-src 'self'; connect-src 'self' https://auth.pmon.dev;" always;
    }
    {{- end }}
    {{- else }}
    # No games configured
    {{- end }}
{{- end }}
