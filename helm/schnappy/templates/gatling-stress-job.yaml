{{- if eq (.Values.gatling.enabled | toString) "true" }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "schnappy.fullname" . }}-gatling-stress
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
    app.kubernetes.io/component: gatling-stress
spec:
  schedule: {{ .Values.gatling.stress.schedule | quote }}
  suspend: {{ .Values.gatling.stress.suspend | default true }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            {{- include "schnappy.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: gatling-stress
            app.kubernetes.io/part-of: schnappy
        spec:
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: gatling
              image: {{ .Values.gatling.image.repository }}:{{ .Values.gatling.image.tag }}
              args:
                - "io.gatling.app.Gatling"
                - "-s"
                - "io.schnappy.loadtest.StressSimulation"
                - "-rf"
                - "/tmp/results"
                - "-nr"
              resources:
                requests: { cpu: 1000m, memory: 1Gi }
                limits: { cpu: 4000m, memory: 2Gi }
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
              env:
                - name: MONITOR_URL
                  value: "http://{{ include "schnappy.fullname" . }}-monitor:8080"
                - name: CHAT_URL
                  value: "http://{{ include "schnappy.fullname" . }}-chat:8080"
                - name: CHESS_URL
                  value: "http://{{ include "schnappy.fullname" . }}-chess:8080"
                - name: KEYCLOAK_URL
                  value: "http://{{ include "schnappy.keycloak.serviceName" . }}:8080"
                - name: GRAPHITE_HOST
                  value: "{{ include "schnappy.victoriametrics.serviceName" . }}"
                - name: GRAPHITE_PORT
                  value: "2003"
                - name: CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "schnappy.fullname" . }}-gatling
                      key: CLIENT_SECRET
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir: {}
          restartPolicy: Never
{{- end }}
