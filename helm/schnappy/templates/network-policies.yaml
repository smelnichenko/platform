      ports:
        - protocol: TCP
          port: 8080
    # Allow Prometheus scraping
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 8080
    {{- if eq (.Values.hyperfoil.enabled | toString) "true" }}
    # Allow from Hyperfoil load/stress tests
    - from:
        - podSelector:
            matchLabels:
              {{- include "schnappy.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: hyperfoil-load
        - podSelector:
            matchLabels:
              {{- include "schnappy.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: hyperfoil-stress
      ports:
        - protocol: TCP
          port: 8080
    {{- end }}
  egress:
    # DNS
    - ports:
        - protocol: UDP
          port: 53
