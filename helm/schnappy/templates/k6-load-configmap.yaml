{{- if eq (.Values.loadTest.enabled | toString) "true" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "schnappy.fullname" . }}-k6-load
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
data:
  load-test.js: |
    import http from 'k6/http';
    import { check, group, sleep } from 'k6';

    export const options = {
      stages: [
        { duration: '1m', target: 25 },
        { duration: '3m', target: 50 },
        { duration: '1m', target: 50 },
        { duration: '1m', target: 0 },
      ],
      thresholds: {
        http_req_duration: ['p(95)<500', 'p(99)<2000'],
        http_req_failed: ['rate<0.01'],
        checks: ['rate>0.99'],
      },
    };

    const BASE_URL = __ENV.BASE_URL || 'https://pmon.dev';
    const KEYCLOAK_URL = __ENV.KEYCLOAK_URL || 'https://auth.pmon.dev';

    function getToken() {
      const clientSecret = __ENV.K6_CLIENT_SECRET;
      if (!clientSecret) return null;
      const res = http.post(
        `${KEYCLOAK_URL}/realms/schnappy/protocol/openid-connect/token`,
        { client_id: 'k6-smoke', client_secret: clientSecret, grant_type: 'client_credentials' },
        { tags: { name: 'token' } },
      );
      if (res.status !== 200) return null;
      return res.json('access_token');
    }

    export default function () {
      const token = getToken();
      const auth = token ? { headers: { Authorization: `Bearer ${token}` } } : {};

      group('health', () => {
        const r = http.get(`${BASE_URL}/api/health`);
        check(r, { 'health 200': (r) => r.status === 200 });
      });
      sleep(Math.random() + 1);

      group('pages', () => {
        const r = http.get(`${BASE_URL}/api/monitor/pages`, auth);
        check(r, { 'pages 200': (r) => r.status === 200 });
      });
      sleep(Math.random() + 1);

      group('rss-feeds', () => {
        const r = http.get(`${BASE_URL}/api/rss/feeds`, auth);
        check(r, { 'feeds 200': (r) => r.status === 200 });
      });
      sleep(Math.random() + 1);

      group('channels', () => {
        const r = http.get(`${BASE_URL}/api/chat/channels`, auth);
        check(r, { 'channels 200': (r) => r.status === 200 });
      });
      sleep(Math.random() + 1);

      group('inbox', () => {
        const r = http.get(`${BASE_URL}/api/inbox/emails`, auth);
        check(r, { 'inbox 200': (r) => r.status === 200 });
      });
      sleep(Math.random() + 1);
    }
{{- end }}
