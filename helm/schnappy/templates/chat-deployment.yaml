{{- if eq (.Values.chatService.enabled | toString) "true" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "schnappy.chat.serviceName" . }}
  labels:
    {{- include "schnappy.chat.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.chatService.replicas }}
  selector:
    matchLabels:
      {{- include "schnappy.chat.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "schnappy.chat.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/part-of: schnappy
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/api/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      serviceAccountName: {{ include "schnappy.fullname" . }}-chat
      imagePullSecrets:
        - name: forgejo-registry
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.37
          command: ['sh', '-c', 'until nc -z {{ include "schnappy.postgres.serviceName" . }} 5432; do echo waiting; sleep 2; done']
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
      containers:
        - name: chat
          image: "{{ .Values.chatService.image.repository }}:{{ .Values.chatService.image.tag }}"
          imagePullPolicy: {{ .Values.chatService.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          env:
            - name: JAVA_OPTS
              value: {{ .Values.chatService.javaOpts | default "-Xmx512m" | quote }}
            - name: DB_HOST
              value: {{ include "schnappy.postgres.serviceName" . }}
            - name: DB_NAME
              value: "monitor_chat"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.postgres.secretName" . }}
                  key: POSTGRES_USER
                  optional: true
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.postgres.secretName" . }}
                  key: POSTGRES_PASSWORD
            - name: REDIS_HOST
              value: {{ include "schnappy.redis.serviceName" . }}
            {{- if or .Values.redis.password .Values.redis.existingSecret }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.redis.secretName" . }}
                  key: REDIS_PASSWORD
            {{- end }}
            {{- if eq (.Values.tracing.enabled | toString) "true" }}
            - name: MANAGEMENT_TRACING_SAMPLING_PROBABILITY
              value: {{ .Values.tracing.samplingProbability | default "0.1" | quote }}
            - name: MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT
              value: {{ .Values.tracing.tempoEndpoint | default "http://schnappy-tempo.schnappy.svc:4318/v1/traces" | quote }}
            - name: MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED
              value: "false"
            - name: SPRING_APPLICATION_NAME
              value: chat
            {{- end }}
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "{{ include "schnappy.kafka.serviceName" . }}:9092"
            - name: SCYLLA_HOST
              value: {{ include "schnappy.scylla.serviceName" . }}
            - name: SCYLLA_PORT
              value: "9042"
            - name: SCYLLA_DATACENTER
              value: {{ .Values.scylla.datacenter | default "datacenter1" | quote }}
            - name: SCYLLA_KEYSPACE
              value: {{ .Values.scylla.keyspace | default "chat" | quote }}
            - name: CHAT_E2E_ENABLED
              value: {{ .Values.chat.e2eEnabled | default false | toString | quote }}
          resources:
            {{- toYaml .Values.chatService.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /api/actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/actuator/health/readiness
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
