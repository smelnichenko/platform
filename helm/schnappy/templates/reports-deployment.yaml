{{- if .Values.reports.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "schnappy.fullname" . }}-reports
  labels:
    {{- include "schnappy.reports.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "schnappy.reports.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "schnappy.reports.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/part-of: schnappy
      annotations:
        sidecar.istio.io/inject: "false"
        checksum/config: {{ include (print $.Template.BasePath "/reports-configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "schnappy.fullname" . }}-reports
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx
          image: {{ .Values.reports.image }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: tmp
              mountPath: /tmp
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits: { cpu: 100m, memory: 32Mi }
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: {{ include "schnappy.fullname" . }}-reports
        - name: tmp
          emptyDir: {}
{{- end }}
