{{- $root := . -}}
{{- range .Values.games }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "schnappy.fullname" $root }}-{{ .name }}
  labels:
    {{- include "schnappy.labels" $root | nindent 4 }}
    app.kubernetes.io/component: {{ .name }}
spec:
  replicas: {{ .replicas | default $root.Values.gameDefaults.replicas }}
  selector:
    matchLabels:
      {{- include "schnappy.selectorLabels" $root | nindent 6 }}
      app.kubernetes.io/component: {{ .name }}
  template:
    metadata:
      labels:
        {{- include "schnappy.selectorLabels" $root | nindent 8 }}
        app.kubernetes.io/part-of: schnappy
        app.kubernetes.io/component: {{ .name }}
    spec:
      serviceAccountName: {{ include "schnappy.fullname" $ }}-game-{{ .name }}
      containers:
        - name: game
          image: "{{ .image.repository }}:{{ .image.tag }}"
          imagePullPolicy: {{ .image.pullPolicy | default $root.Values.gameDefaults.pullPolicy }}
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .resources | nindent 12 }}
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /var/cache/nginx
            - name: run
              mountPath: /var/run
      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
        - name: run
          emptyDir: {}
{{- end }}
