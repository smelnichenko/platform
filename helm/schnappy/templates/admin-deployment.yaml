{{- if eq (.Values.admin.enabled | toString) "true" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "schnappy.admin.serviceName" . }}
  labels:
    {{- include "schnappy.admin.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.admin.replicas }}
  selector:
    matchLabels:
      {{- include "schnappy.admin.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "schnappy.admin.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/part-of: schnappy
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.37
          command: ['sh', '-c', 'until nc -z {{ include "schnappy.postgres.serviceName" . }} 5432; do echo waiting; sleep 2; done']
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
      containers:
        - name: admin
          image: "{{ .Values.admin.image.repository }}:{{ .Values.admin.image.tag }}"
          imagePullPolicy: {{ .Values.admin.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          env:
            - name: JAVA_OPTS
              value: {{ .Values.admin.javaOpts | default "-Xmx512m" | quote }}
            - name: DB_HOST
              value: {{ include "schnappy.postgres.serviceName" . }}
            - name: DB_NAME
              value: "monitor_admin"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.postgres.secretName" . }}
                  key: POSTGRES_USER
                  optional: true
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.postgres.secretName" . }}
                  key: POSTGRES_PASSWORD
            - name: REDIS_HOST
              value: {{ include "schnappy.redis.serviceName" . }}
            {{- if or .Values.redis.password .Values.redis.existingSecret }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.redis.secretName" . }}
                  key: REDIS_PASSWORD
            {{- end }}
            - name: REGISTRATION_APPROVAL_MODE
              value: {{ .Values.auth.registrationApproval.mode | default "ai" | quote }}
            - name: REGISTRATION_APPROVAL_CRITERIA
              value: {{ .Values.auth.registrationApproval.criteria | default "" | quote }}
            - name: REGISTRATION_APPROVAL_DEFAULT_GROUP
              value: {{ .Values.auth.registrationApproval.defaultGroup | default "Users" | quote }}
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "{{ include "schnappy.kafka.serviceName" . }}:9092"
            {{- if eq (.Values.mail.enabled | toString) "true" }}
            - name: MAIL_ENABLED
              value: "true"
            - name: MAIL_FROM
              value: {{ .Values.mail.fromAddress | default "noreply@example.com" | quote }}
            - name: APP_URL
              value: {{ .Values.mail.appUrl | default "http://localhost:3000" | quote }}
            - name: SPRING_MAIL_HOST
              value: {{ .Values.mail.host | default "smtp.gmail.com" | quote }}
            - name: SPRING_MAIL_PORT
              value: {{ .Values.mail.port | default "587" | quote }}
            - name: SPRING_MAIL_USERNAME
              value: {{ .Values.mail.username | default "resend" | quote }}
            - name: SPRING_MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.mail.secretName" . }}
                  key: MAIL_PASSWORD
            {{- end }}
            {{- if eq (.Values.ai.enabled | toString) "true" }}
            - name: AI_ENABLED
              value: "true"
            - name: AI_MODEL
              value: {{ .Values.ai.model | default "claude-sonnet-4-5-20250929" | quote }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.ai.secretName" . }}
                  key: ANTHROPIC_API_KEY
            {{- end }}
            {{- if eq (.Values.captcha.enabled | toString) "true" }}
            - name: CAPTCHA_ENABLED
              value: "true"
            {{- end }}
            {{- if eq (.Values.keycloak.clients.adminService.enabled | toString) "true" }}
            - name: KEYCLOAK_ADMIN_ENABLED
              value: "true"
            - name: KEYCLOAK_SERVER_URL
              value: "http://{{ include "schnappy.keycloak.serviceName" . }}:8080"
            - name: KEYCLOAK_REALM
              value: "schnappy"
            - name: KEYCLOAK_CLIENT_ID
              value: "admin-service"
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.keycloak.secretName" . }}
                  key: ADMIN_SERVICE_CLIENT_SECRET
            {{- end }}
          resources:
            {{- toYaml .Values.admin.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /api/actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/actuator/health/readiness
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
