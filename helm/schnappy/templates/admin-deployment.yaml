{{- if eq (.Values.admin.enabled | toString) "true" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "schnappy.admin.serviceName" . }}
  labels:
    {{- include "schnappy.admin.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.admin.replicas }}
  selector:
    matchLabels:
      {{- include "schnappy.admin.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "schnappy.admin.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/part-of: schnappy
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/api/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      serviceAccountName: {{ include "schnappy.fullname" . }}-admin
      imagePullSecrets:
        - name: forgejo-registry
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: admin
          image: "{{ .Values.admin.image.repository }}:{{ .Values.admin.image.tag }}"
          imagePullPolicy: {{ .Values.admin.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          env:
            - name: JAVA_OPTS
              value: {{ .Values.admin.javaOpts | default "-Xmx512m" | quote }}
            - name: DB_HOST
              value: {{ include "schnappy.postgres.serviceName" . }}
            - name: SPRING_DATASOURCE_HIKARI_DATA-SOURCE-PROPERTIES
              value: "sslmode=require"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.fullname" . }}-postgres-admin
                  key: DB_NAME
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.fullname" . }}-postgres-admin
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.fullname" . }}-postgres-admin
                  key: DB_PASSWORD
            - name: VALKEY_HOST
              value: {{ include "schnappy.valkey.serviceName" . }}
            {{- if or .Values.valkey.password .Values.valkey.existingSecret }}
            - name: VALKEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.valkey.secretName" . }}
                  key: VALKEY_PASSWORD
            {{- end }}
            {{- if eq (.Values.tracing.enabled | toString) "true" }}
            - name: MANAGEMENT_TRACING_SAMPLING_PROBABILITY
              value: {{ .Values.tracing.samplingProbability | default "0.1" | quote }}
            - name: MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT
              value: {{ .Values.tracing.tempoEndpoint | default "http://schnappy-tempo.schnappy-infra.svc:4317" | quote }}
            - name: MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_TRANSPORT
              value: {{ .Values.tracing.tempoTransport | default "grpc" | quote }}
            - name: MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_TIMEOUT
              value: {{ .Values.tracing.exporterTimeout | default "30s" | quote }}
            - name: MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_CONNECT_TIMEOUT
              value: {{ .Values.tracing.exporterConnectTimeout | default "30s" | quote }}
            - name: MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_SCHEDULE_DELAY
              value: {{ .Values.tracing.scheduleDelay | default "1s" | quote }}
            - name: MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_MAX_QUEUE_SIZE
              value: {{ .Values.tracing.maxQueueSize | default "8192" | quote }}
            - name: MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_MAX_BATCH_SIZE
              value: {{ .Values.tracing.maxBatchSize | default "2048" | quote }}
            - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
              value: "health,prometheus,env,configprops"
            - name: MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED
              value: "false"
            - name: SPRING_APPLICATION_NAME
              value: admin
            {{- end }}
            - name: REGISTRATION_APPROVAL_MODE
              value: {{ .Values.auth.registrationApproval.mode | default "ai" | quote }}
            - name: REGISTRATION_APPROVAL_CRITERIA
              value: {{ .Values.auth.registrationApproval.criteria | default "" | quote }}
            - name: REGISTRATION_APPROVAL_DEFAULT_GROUP
              value: {{ .Values.auth.registrationApproval.defaultGroup | default "Users" | quote }}
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "{{ include "schnappy.kafka.serviceName" . }}:9092"
            {{- if eq (.Values.mail.enabled | toString) "true" }}
            - name: MAIL_ENABLED
              value: "true"
            - name: MAIL_FROM
              value: {{ .Values.mail.fromAddress | default "noreply@example.com" | quote }}
            - name: APP_URL
              value: {{ .Values.mail.appUrl | default "http://localhost:3000" | quote }}
            - name: SPRING_MAIL_HOST
              value: {{ .Values.mail.host | default "smtp.gmail.com" | quote }}
            - name: SPRING_MAIL_PORT
              value: {{ .Values.mail.port | default "587" | quote }}
            - name: SPRING_MAIL_USERNAME
              value: {{ .Values.mail.username | default "resend" | quote }}
            - name: SPRING_MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.mail.secretName" . }}
                  key: MAIL_PASSWORD
            {{- end }}
            {{- if eq (.Values.ai.enabled | toString) "true" }}
            - name: AI_ENABLED
              value: "true"
            - name: AI_MODEL
              value: {{ .Values.ai.model | default "claude-sonnet-4-5-20250929" | quote }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.ai.secretName" . }}
                  key: ANTHROPIC_API_KEY
            {{- end }}
            {{- if eq (.Values.captcha.enabled | toString) "true" }}
            - name: CAPTCHA_ENABLED
              value: "true"
            {{- end }}
            {{- if eq (.Values.keycloak.clients.adminService.enabled | toString) "true" }}
            - name: KEYCLOAK_ADMIN_ENABLED
              value: "true"
            - name: KEYCLOAK_SERVER_URL
              value: "https://{{ .Values.keycloak.hostname }}"
            - name: KEYCLOAK_REALM
              value: "schnappy"
            - name: KEYCLOAK_CLIENT_ID
              value: "admin-service"
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.keycloak.secretName" . }}
                  key: ADMIN_SERVICE_CLIENT_SECRET
            {{- end }}
            {{- if eq (.Values.realtime.enabled | toString) "true" }}
            # admin mints Centrifugo channel sub-tokens; same HS256
            # secret Centrifugo uses to verify on SUBSCRIBE.
            - name: CENTRIFUGO_SUB_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.centrifugo.secretName" . }}
                  key: CENTRIFUGO_SUB_TOKEN_SECRET
            # Chat and chess Spring services use /api as the context-path,
            # so the /internal endpoints sit at /api/internal/*.
            - name: CHAT_INTERNAL_URL
              value: "http://{{ include "schnappy.fullname" . }}-chat:8080/api"
            - name: CHESS_INTERNAL_URL
              value: "http://{{ include "schnappy.fullname" . }}-chess:8080/api"
            {{- end }}
          resources:
            {{- toYaml .Values.admin.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /api/actuator/health/liveness
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/actuator/health/liveness
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/actuator/health/readiness
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
