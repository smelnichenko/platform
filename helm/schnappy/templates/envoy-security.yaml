{{- if eq (.Values.envoyGateway.enabled | toString) "true" }}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: {{ include "schnappy.fullname" . }}-jwt
  namespace: {{ .Release.Namespace }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ include "schnappy.fullname" . }}-gw
  jwt:
    optional: true
    providers:
      - name: keycloak
        audiences: []
        remoteJWKS:
          uri: http://{{ include "schnappy.keycloak.serviceName" . }}.{{ .Release.Namespace }}.svc.cluster.local:8080/realms/schnappy/protocol/openid-connect/certs
          backendRefs:
            - group: ""
              kind: Service
              name: {{ include "schnappy.keycloak.serviceName" . }}
              namespace: {{ .Release.Namespace }}
              port: 8080
        claimToHeaders:
          - claim: sub
            header: X-User-UUID
          - claim: email
            header: X-User-Email
{{- end }}
