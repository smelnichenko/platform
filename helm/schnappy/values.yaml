# Core application services chart
nameOverride: schnappy

# Plan 067 — when true, the chart emits the preview HTTPRoute on
# `<ingress.host>` against the prod Istio gateway, and a pre-delete
# Job that prunes per-PR shared-resource artifacts (Kafka topics,
# Scylla keyspace, MinIO bucket, Keycloak client). Set per-Application
# by the schnappy-pr-envs ApplicationSet.
previewMode: false
previewNumber: ""
previewSourceRepo: ""
preview:
  # Namespace where the shared Kafka cluster (KafkaTopic CRs) lives.
  sharedNamespace: schnappy-production

# Optional: where the preview HTTPRoute attaches (default = the same
# Istio gateway used by prod). Override per-cluster if you have a
# dedicated preview gateway.
ingress:
  host: ""
  gatewayName: schnappy-istio-gateway
  gatewayNamespace: istio-system

vault:
  secretsEnabled: false
  secretPathPrefix: "secret/data/schnappy"

networkPolicies:
  enabled: true

prometheus:
  enabled: true

alerts:
  enabled: false

# Frontend
site:
  enabled: true
  dnsResolver: ""
  image:
    repository: git.pmon.dev/schnappy/site
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests: { memory: "64Mi", cpu: "50m" }
    limits: { memory: "128Mi", cpu: "200m" }
  service:
    type: ClusterIP
    port: 8080

# Game (Godot web export)
games: []
gameDefaults:
  pullPolicy: IfNotPresent
  replicas: 1
  port: 8080
  resources:
    requests: { cpu: 25m, memory: 32Mi }
    limits: { cpu: 100m, memory: 64Mi }

# Backend API
app:
  image:
    repository: git.pmon.dev/schnappy/monitor
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  javaOpts: "-Xmx1536m"
  hikari:
    minimumIdle: 2
    maximumPoolSize: 25
    idleTimeout: 300000
    maxLifetime: 1200000
    connectionTimeout: 20000
  resources:
    requests: { memory: "512Mi", cpu: "250m" }
    limits: { memory: "2Gi", cpu: "2500m" }
  service:
    type: ClusterIP
    port: 8080
  ingress:
    # Production uses Istio HTTPRoute (schnappy-mesh chart); keep this off.
    enabled: false

# Authentication
auth:
  existingSecret: ""
  tokenExpiration: 1h
  registrationEnabled: true
  registrationApproval:
    mode: ai
    criteria: ""
    defaultGroup: Users

# Monitor configuration
monitor:
  enabled: true
  http:
    connectTimeout: 10s
    readTimeout: 30s
    userAgent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:134.0) Gecko/20100101 Firefox/134.0"

# Mail (optional)
mail:
  enabled: false
  host: smtp.gmail.com
  port: 587
  username: ""
  password: ""
  existingSecret: ""
  fromAddress: "noreply@example.com"
  appUrl: "http://localhost:3000"

# AI (optional)
ai:
  enabled: false
  apiKey: ""
  existingSecret: ""
  model: "claude-sonnet-4-5-20250929"

# Webhook (Resend inbound email)
webhook:
  enabled: false
  signingSecret: ""
  apiKey: ""
  existingSecret: ""

# API Gateway

# Admin / User Service
admin:
  enabled: false
  image:
    repository: git.pmon.dev/schnappy/admin
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  javaOpts: "-Xmx512m"
  resources:
    requests: { memory: "256Mi", cpu: "100m" }
    limits: { memory: "1Gi", cpu: "2000m" }
  service:
    type: ClusterIP
    port: 8080

# Chat microservice
chatService:
  enabled: false
  image:
    repository: git.pmon.dev/schnappy/chat
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  javaOpts: "-Xmx512m"
  resources:
    requests: { memory: "256Mi", cpu: "100m" }
    limits: { memory: "1Gi", cpu: "2000m" }
  service:
    type: ClusterIP
    port: 8080

# Chess microservice
chessService:
  enabled: false
  image:
    repository: git.pmon.dev/schnappy/chess
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  javaOpts: "-Xmx512m"
  resources:
    requests: { memory: "256Mi", cpu: "100m" }
    limits: { memory: "1Gi", cpu: "2000m" }
  service:
    type: ClusterIP
    port: 8080


chat:
  e2eEnabled: false

captcha:
  enabled: true

chess:
  enabled: false

# Cross-chart references (for secret/service name resolution and configmap)
postgres:
  database: monitor
valkey: {}
minio: {}
alertmanager: {}
kafka:
  enabled: true
strimzi:
  enabled: false
cnpg:
  enabled: false
scyllaOperator:
  enabled: false
keycloak:
  enabled: false
  hostname: auth.pmon.dev
  clients:
    adminService:
      enabled: false
# Distributed tracing (OTLP → Tempo)
tracing:
  enabled: false
  # HTTP/protobuf OTLP (port 4318). gRPC was tested but its SDK sender
  # is also OkHttp-based, so the readTimeout bug applies equally.
  # The actual fix is the build.gradle swap from
  # opentelemetry-exporter-sender-okhttp to -sender-jdk; see app
  # repos. HTTP wins on debug-ability at our trace volume.
  tempoEndpoint: "http://schnappy-tempo.schnappy-infra.svc:4318/v1/traces"
  tempoTransport: "http"
  samplingProbability: "0.1"
  exporterTimeout: "30s"
  exporterConnectTimeout: "30s"
  # BatchSpanProcessor schedule delay (was 5s default). Smaller value
  # → more frequent, smaller batches → lower per-export latency.
  scheduleDelay: "1s"

# k6 smoke tests (PostSync hook + daily CronJob)
smokeTest:
  enabled: true
  image: grafana/k6:1.7.1
  schedule: "0 6 * * *"
  baseUrl: ""                # Defaults to https://<app.ingress.host>
  clientSecretName: ""       # k8s Secret with CLIENT_SECRET key (for authenticated tests)
# Hyperfoil load/stress tests (bypass Envoy, hit backends directly)
hyperfoil:
  enabled: false
  image: git.pmon.dev/schnappy/hyperfoil:latest
  reportsUrl: ""             # URL for report links in logs (e.g. https://reports.pmon.dev)
  clientSecretName: ""       # ExternalSecret name for Keycloak service account
  load:
    schedule: "0 3 * * *"

scylla:
  enabled: true
  datacenter: datacenter1
  keyspace: chat
