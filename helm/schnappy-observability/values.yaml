# Monitoring and logging chart
nameOverride: schnappy

vault:
  secretsEnabled: false
  secretPathPrefix: "secret/data/schnappy"

networkPolicies:
  enabled: true

gateway:
  enabled: false
  name: ""
  namespace: ""
  hosts:
    grafana: ""
    logs: ""
    reports: ""

# ClickHouse — log storage backend (Plan 065). Replaces ELK in
# steady state; both can be on simultaneously during the cutover.
clickhouse:
  enabled: false
  image: clickhouse/clickhouse-server:24.8-alpine
  password: ""
  existingSecret: ""
  resources:
    requests: { cpu: "100m", memory: "512Mi" }
    limits:   { cpu: "2",    memory: "2Gi" }
  storage:
    size: 20Gi
    storageClass: ""
  retention:
    days: 30
  # Grafana plugin install — toggled here so a single chart value
  # controls both the datasource emit and the plugin presence.
  installGrafanaPlugin: true
  # Plan 066 — events database fed by Kafka. Disabled by default;
  # enable in tandem with the schnappy-realtime chart.
  events:
    enabled: false
    retentionDays: 180
    kafka:
      bootstrapServers: "schnappy-kafka-bootstrap:9092"
      consumerGroup: "clickhouse-events"
      numConsumers: 2
      topics:
        - events.chat.messages
        - events.chess.moves
        - events.notifications

# Fluent-bit log shipper. ELK was retired (Plan 065); fluentbit
# now talks only to ClickHouse.
fluentbit:
  enabled: false
  image: cr.fluentbit.io/fluent/fluent-bit:4.2.3.1
  resources:
    requests: { memory: "128Mi", cpu: "50m" }
    limits: { memory: "256Mi", cpu: "200m" }

# Prometheus (scraping via ServiceMonitors, deployed separately via kube-prometheus-stack)
prometheus:
  enabled: false
  scrapeInterval: 15s
  woodpecker:
    enabled: false
  forgejo:
    enabled: false

# Grafana Mimir (long-term metrics storage via MinIO S3)
mimir:
  enabled: false
  image: grafana/mimir:2.17.8
  retention: 90d
  minioSecret: schnappy-minio
  resources:
    requests: { memory: "512Mi", cpu: "200m" }
    limits: { memory: "2Gi", cpu: "2000m" }
  storage: 5Gi
  storageClassName: ""

# Grafana Tempo (distributed tracing)
tempo:
  enabled: false
  image: grafana/tempo:2.7.2
  retention: 336h
  minioSecret: schnappy-minio
  resources:
    requests: { memory: 256Mi, cpu: 100m }
    limits: { memory: 1Gi, cpu: 1000m }
  storage: 2Gi
  storageClassName: ""

# Alertmanager
alertmanager:
  enabled: false
  image: prom/alertmanager:v0.31.1
  alertEmailTo: ""
  alertEmailFrom: "alerts@pmon.dev"
  smtp:
    host: smtp.resend.com
    port: "587"
    username: resend
  webhookSecret: ""
  existingSecret: ""
  groupWait: 30s
  groupInterval: 5m
  repeatInterval: 4h
  resources:
    requests: { memory: "128Mi", cpu: "25m" }
    limits: { memory: "256Mi", cpu: "200m" }
  storage:
    size: 1Gi
    storageClass: ""

# kube-state-metrics
kubeStateMetrics:
  enabled: false
  image: registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.18.0
  resources:
    requests: { memory: "64Mi", cpu: "25m" }
    limits: { memory: "256Mi", cpu: "200m" }

# Grafana
grafana:
  enabled: false
  image: grafana/grafana:12.4.2
  adminUser: admin
  adminPassword: ""
  existingSecret: ""
  resources:
    requests: { memory: "128Mi", cpu: "100m" }
    limits: { memory: "256Mi", cpu: "500m" }
  storage:
    size: 1Gi
    storageClass: ""
  service:
    type: ClusterIP
    port: 3000
  ingress:
    enabled: false
    className: ""
    host: ""
    tls:
      enabled: false
      secretName: ""
      clusterIssuer: "letsencrypt-prod"
  oauth:
    enabled: false
    name: "Forgejo"
    authUrl: ""
    tokenUrl: ""
    apiUrl: ""
    scopes: "openid profile email"
    autoLogin: false

# Hyperfoil report server (Nginx → MinIO proxy)
reports:
  enabled: false
  image: nginx:1.28.3-alpine
  ingress:
    enabled: false
    host: reports.local
    tls:
      enabled: false
      clusterIssuer: letsencrypt-dns
      secretName: ""

# Runbooks server (Nginx serving bundled .md files from chart)
# The runbook_url annotation on each alert points at this service; on-call
# can open it from an alert email without logging into Forgejo.
runbooks:
  enabled: false
  image: nginx:1.27-alpine

# Cross-chart references
app:
  service:
    port: 8080
