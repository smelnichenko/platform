# Monitoring and logging chart
nameOverride: schnappy

vault:
  secretsEnabled: false

networkPolicies:
  enabled: true

# ELK Stack
elk:
  enabled: false
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.8
    replicas: 1
    javaOpts: "-Xms1g -Xmx1g"
    password: ""
    existingSecret: ""
    resources:
      requests: { memory: "2Gi", cpu: "500m" }
      limits: { memory: "4Gi", cpu: "4000m" }
    storage:
      size: 50Gi
      storageClass: ""
    retention:
      days: 30
  kibana:
    image: docker.elastic.co/kibana/kibana:8.19.8
    replicas: 1
    resources:
      requests: { memory: "256Mi", cpu: "100m" }
      limits: { memory: "512Mi", cpu: "1000m" }
    ingress:
      enabled: false
      className: traefik
      host: "logs.pmon.dev"
      tls:
        enabled: false
        secretName: ""
        clusterIssuer: "letsencrypt-prod"
  fluentbit:
    image: cr.fluentbit.io/fluent/fluent-bit:4.2.3
    resources:
      requests: { memory: "128Mi", cpu: "50m" }
      limits: { memory: "256Mi", cpu: "200m" }

# Prometheus
prometheus:
  enabled: false
  image: prom/prometheus:latest
  retention: 15d
  scrapeInterval: 15s
  vault:
    enabled: false
  woodpecker:
    enabled: false
  forgejo:
    enabled: false
  resources:
    requests: { memory: "256Mi", cpu: "100m" }
    limits: { memory: "512Mi", cpu: "500m" }
  storage:
    size: 2Gi
    storageClass: ""

# Alertmanager
alertmanager:
  enabled: false
  image: prom/alertmanager:v0.28.1
  alertEmailTo: ""
  alertEmailFrom: "alerts@pmon.dev"
  webhookSecret: ""
  existingSecret: ""
  groupWait: 30s
  groupInterval: 5m
  repeatInterval: 4h
  resources:
    requests: { memory: "128Mi", cpu: "25m" }
    limits: { memory: "256Mi", cpu: "200m" }
  storage:
    size: 1Gi
    storageClass: ""

# kube-state-metrics
kubeStateMetrics:
  enabled: false
  image: registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.15.0
  resources:
    requests: { memory: "64Mi", cpu: "25m" }
    limits: { memory: "256Mi", cpu: "200m" }

# Grafana
grafana:
  enabled: false
  image: grafana/grafana:latest
  adminUser: admin
  adminPassword: ""
  existingSecret: ""
  resources:
    requests: { memory: "128Mi", cpu: "100m" }
    limits: { memory: "256Mi", cpu: "500m" }
  storage:
    size: 1Gi
    storageClass: ""
  service:
    type: ClusterIP
    port: 3000
  ingress:
    enabled: false
    className: ""
    host: ""
    tls:
      enabled: false
      secretName: ""
      clusterIssuer: "letsencrypt-prod"
  oauth:
    enabled: false
    name: "Forgejo"
    authUrl: ""
    tokenUrl: ""
    apiUrl: ""
    scopes: "openid profile email"
    autoLogin: false

# Cross-chart references
app:
  service:
    port: 8080
