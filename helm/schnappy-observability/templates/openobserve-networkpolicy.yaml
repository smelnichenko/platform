{{- if and .Values.openobserve.enabled .Values.networkPolicies.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "schnappy.openobserve.serviceName" . }}
  labels:
    {{- include "schnappy.openobserve.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "schnappy.openobserve.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Istio gateway / browser via mesh + Fluent-bit ingest
    - from: []
      ports:
        - { protocol: TCP, port: 5080 }
  egress:
    - ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
    # OIDC discovery to Keycloak
    - to:
        - ipBlock: { cidr: 0.0.0.0/0 }
      ports:
        - { protocol: TCP, port: 443 }
{{- end }}
