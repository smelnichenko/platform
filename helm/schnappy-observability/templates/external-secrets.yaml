{{- if .Values.vault.secretsEnabled }}
{{- if and .Values.grafana.enabled .Values.grafana.existingSecret }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "schnappy.grafana.secretName" . }}
  labels:
    {{- include "schnappy.grafana.labels" . | nindent 4 }}
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: {{ include "schnappy.grafana.secretName" . }}
  data:
    - secretKey: admin-user
      remoteRef:
        key: secret/data/schnappy/grafana
        property: admin_user
    - secretKey: admin-password
      remoteRef:
        key: secret/data/schnappy/grafana
        property: admin_password
    {{- if eq (.Values.grafana.oauth.enabled | toString) "true" }}
    - secretKey: oauth-client-id
      remoteRef:
        key: secret/data/schnappy/grafana
        property: oauth_client_id
    - secretKey: oauth-client-secret
      remoteRef:
        key: secret/data/schnappy/grafana
        property: oauth_client_secret
    {{- end }}
{{- end }}
{{- if and (eq (.Values.elk.enabled | toString) "true") .Values.elk.elasticsearch.existingSecret }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "schnappy.elasticsearch.secretName" . }}
  labels:
    {{- include "schnappy.elasticsearch.labels" . | nindent 4 }}
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: {{ include "schnappy.elasticsearch.secretName" . }}
  data:
    - secretKey: ELASTICSEARCH_PASSWORD
      remoteRef:
        key: secret/data/schnappy/elasticsearch
        property: password
    - secretKey: KIBANA_PASSWORD
      remoteRef:
        key: secret/data/schnappy/elasticsearch
        property: kibana_password
{{- end }}
{{- if eq (.Values.alertmanager.enabled | toString) "true" }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "schnappy.alertmanager.secretName" . }}
  labels:
    {{- include "schnappy.alertmanager.labels" . | nindent 4 }}
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: {{ include "schnappy.alertmanager.secretName" . }}
  data:
    - secretKey: ALERTMANAGER_WEBHOOK_SECRET
      remoteRef:
        key: secret/data/schnappy/alertmanager
        property: webhook_secret
{{- end }}
{{- end }}
