{{- if and .Values.openobserve.enabled .Values.gateway.enabled }}
# Mask brief OO actix stalls (compaction, sled flush) at the Istio
# layer so fluent-bit and other clients don't see 503s. OO is a
# single-replica StatefulSet; without these, every periodic flush
# raises a flurry of "upstream connect error" lines in log output.
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: {{ include "schnappy.openobserve.serviceName" . }}
  labels:
    {{- include "schnappy.openobserve.labels" . | nindent 4 }}
spec:
  host: {{ include "schnappy.openobserve.serviceName" . }}.{{ .Release.Namespace }}.svc.cluster.local
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
        connectTimeout: 5s
      http:
        # OO defaults to actix's ~5s keep-alive. Keep client-side
        # idleTimeout below that so Envoy doesn't reuse a connection
        # the server already half-closed.
        idleTimeout: 4s
        h2UpgradePolicy: DO_NOT_UPGRADE
        maxRequestsPerConnection: 100
    outlierDetection:
      # OO has 1 replica — don't eject the only host on transient 5xx.
      consecutive5xxErrors: 0
      interval: 30s
      baseEjectionTime: 30s
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: {{ include "schnappy.openobserve.serviceName" . }}-internal
  labels:
    {{- include "schnappy.openobserve.labels" . | nindent 4 }}
spec:
  hosts:
    - {{ include "schnappy.openobserve.serviceName" . }}.{{ .Release.Namespace }}.svc.cluster.local
  http:
    - retries:
        # Retry brief 5xx (actix worker compaction stalls) at the
        # proxy layer so fluent-bit's POSTs never see the blip.
        attempts: 3
        perTryTimeout: 5s
        retryOn: connect-failure,reset,refused-stream,503
      route:
        - destination:
            host: {{ include "schnappy.openobserve.serviceName" . }}.{{ .Release.Namespace }}.svc.cluster.local
            port:
              number: 5080
{{- end }}
