{{- if .Values.clickhouse.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "schnappy.fullname" . }}-clickhouse
  labels:
    {{- include "schnappy.clickhouse.labels" . | nindent 4 }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "schnappy.clickhouse.serviceName" . }}-init
  labels:
    {{- include "schnappy.clickhouse.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 10
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        {{- include "schnappy.clickhouse.selectorLabels" . | nindent 8 }}
        job-component: clickhouse-init
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "schnappy.fullname" . }}-clickhouse
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: init
          image: {{ .Values.clickhouse.image }}
          env:
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.clickhouse.secretName" . }}
                  key: CLICKHOUSE_PASSWORD
          command:
            - sh
            - -c
            - |
              set -eo pipefail
              HOST="{{ include "schnappy.clickhouse.serviceName" . }}"
              # Wait for server to accept queries.
              for i in $(seq 1 60); do
                if clickhouse-client --host "$HOST" --user schnappy --password "$CLICKHOUSE_PASSWORD" --query "SELECT 1" >/dev/null 2>&1; then break; fi
                sleep 2
              done

              cp /sql/logs-schema.sql /tmp/logs-schema.sql
              sed -i "s/__TTL_DAYS__/{{ .Values.clickhouse.retention.days | default 30 }}/g" /tmp/logs-schema.sql
              # --multiquery makes clickhouse-client execute every
              # ;-separated statement in the file. Failures abort.
              clickhouse-client --host "$HOST" --user schnappy --password "$CLICKHOUSE_PASSWORD" --multiquery < /tmp/logs-schema.sql

              {{- if eq (.Values.clickhouse.events.enabled | toString) "true" }}
              cp /sql/events-schema.sql /tmp/events-schema.sql
              sed -i \
                -e "s/__KAFKA_BROKERS__/{{ .Values.clickhouse.events.kafka.bootstrapServers }}/g" \
                -e "s/__KAFKA_TOPICS__/{{ .Values.clickhouse.events.kafka.topics | join "," }}/g" \
                -e "s/__KAFKA_GROUP__/{{ .Values.clickhouse.events.kafka.consumerGroup }}/g" \
                -e "s/__KAFKA_NUM_CONS__/{{ .Values.clickhouse.events.kafka.numConsumers | default 2 }}/g" \
                -e "s/__EVT_TTL_DAYS__/{{ .Values.clickhouse.events.retentionDays | default 180 }}/g" \
                /tmp/events-schema.sql
              clickhouse-client --host "$HOST" --user schnappy --password "$CLICKHOUSE_PASSWORD" --multiquery < /tmp/events-schema.sql
              {{- end }}

              # Tell the istio sidecar to exit so the Job pod can
              # reach Completed (sidecar would otherwise stay running
              # forever, holding the pod at 2/2 Running and the Job at
              # PodInitializing). Best-effort: not fatal if it fails.
              wget -q -O- --post-data='' http://localhost:15020/quitquitquit || true
          volumeMounts:
            - { name: sql, mountPath: /sql, readOnly: true }
            - { name: tmp, mountPath: /tmp }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
      volumes:
        - name: sql
          configMap:
            name: {{ include "schnappy.clickhouse.serviceName" . }}-config
            items:
              - { key: logs-schema.sql, path: logs-schema.sql }
              {{- if eq (.Values.clickhouse.events.enabled | toString) "true" }}
              - { key: events-schema.sql, path: events-schema.sql }
              {{- end }}
        - name: tmp
          emptyDir: {}
{{- end }}
