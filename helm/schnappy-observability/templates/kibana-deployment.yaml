{{- if eq (.Values.elk.enabled | toString) "true" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "schnappy.kibana.serviceName" . }}
  labels:
    {{- include "schnappy.kibana.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.elk.kibana.replicas }}
  selector:
    matchLabels:
      {{- include "schnappy.kibana.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "schnappy.kibana.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/part-of: schnappy
    spec:
      serviceAccountName: {{ include "schnappy.fullname" . }}-kibana
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: init-config
          image: {{ .Values.elk.kibana.image }}
          command: ["sh", "-c"]
          args:
            - |
              cp -a /usr/share/kibana/config/* /config-writable/ 2>/dev/null || true
              cp /config-source/kibana.yml /config-writable/kibana.yml
          volumeMounts:
            - name: config-source
              mountPath: /config-source
            - name: config
              mountPath: /config-writable
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      containers:
        - name: kibana
          image: {{ .Values.elk.kibana.image }}
          env:
            - name: ELASTICSEARCH_USERNAME
              value: "kibana_system"
            - name: ELASTICSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.elasticsearch.secretName" . }}
                  key: KIBANA_PASSWORD
          ports:
            - containerPort: 5601
              name: http
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /usr/share/kibana/config
            - name: tmp
              mountPath: /tmp
            - name: kibana-data
              mountPath: /usr/share/kibana/data
          resources:
            {{- toYaml .Values.elk.kibana.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /api/status
              port: 5601
            initialDelaySeconds: 120
            periodSeconds: 20
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/status
              port: 5601
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: kibana-data
          emptyDir: {}
        - name: config
          emptyDir: {}
        - name: config-source
          configMap:
            name: {{ include "schnappy.fullname" . }}-kibana-config
{{- end }}
