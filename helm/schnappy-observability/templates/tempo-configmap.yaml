{{- if eq (.Values.tempo.enabled | toString) "true" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "schnappy.fullname" . }}-tempo-config
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
    app.kubernetes.io/component: tempo
data:
  tempo.yaml: |
    stream_over_http_enabled: true

    server:
      http_listen_port: 3200
      # Default 4MB recv-size truncates trace batches under stress —
      # apps then retry, OkHttp times out at 10s, ERROR-spam in logs.
      grpc_server_max_recv_msg_size: 16777216
      grpc_server_max_send_msg_size: 16777216
      http_server_read_timeout: 30s
      http_server_write_timeout: 30s

    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
              # HTTP receiver doesn't expose a body-size knob; use
              # server.http_server_read_timeout above for HTTP traffic.
              max_recv_msg_size_mib: 16
            http:
              endpoint: 0.0.0.0:4318
        zipkin:
          endpoint: 0.0.0.0:9411

    ingester:
      max_block_duration: 5m

    compactor:
      compaction:
        block_retention: {{ .Values.tempo.retention | default "336h" }}

    metrics_generator:
      registry:
        external_labels:
          source: tempo
      storage:
        path: /data/generator/wal
        remote_write:
          - url: http://{{ include "schnappy.fullname" . }}-mimir:9009/api/v1/push
            send_exemplars: true
      traces_storage:
        path: /data/generator/traces

    storage:
      trace:
        backend: s3
        wal:
          path: /data/wal
        s3:
          bucket: tempo-traces
          endpoint: {{ .Values.tempo.minioEndpoint | default (printf "%s-minio.%s.svc:9000" (include "schnappy.fullname" .) .Release.Namespace) }}
          access_key: ${MINIO_ROOT_USER}
          secret_key: ${MINIO_ROOT_PASSWORD}
          insecure: true
          forcepathstyle: true

    overrides:
      defaults:
        metrics_generator:
          processors:
            - service-graphs
            - span-metrics
{{- end }}
