{{- if and .Values.openobserve.enabled .Values.vault.secretsEnabled .Values.openobserve.externalSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "schnappy.openobserve.secretName" . }}
  labels:
    {{- include "schnappy.openobserve.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.openobserve.externalSecret.refreshInterval | quote }}
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: {{ include "schnappy.openobserve.secretName" . }}
  data:
    - secretKey: ZO_ROOT_USER_EMAIL
      remoteRef:
        key: {{ .Values.vault.secretPathPrefix }}/openobserve
        property: root_user_email
    - secretKey: ZO_ROOT_USER_PASSWORD
      remoteRef:
        key: {{ .Values.vault.secretPathPrefix }}/openobserve
        property: root_user_password
{{- end }}
