{{- if .Values.victoriametrics.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "schnappy.victoriametrics.serviceName" . }}
  labels:
    {{- include "schnappy.victoriametrics.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "schnappy.victoriametrics.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "schnappy.victoriametrics.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/part-of: schnappy
    spec:
      serviceAccountName: {{ include "schnappy.fullname" . }}-victoriametrics
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: victoriametrics
          image: {{ .Values.victoriametrics.image }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          args:
            - '-promscrape.config=/etc/victoriametrics/prometheus.yml'
            - '-storageDataPath=/data'
            - '-retentionPeriod={{ .Values.victoriametrics.retention }}'
            - '-httpListenAddr=:8428'
            {{- if .Values.victoriametrics.graphiteEnabled }}
            - '-graphiteListenAddr=:2003'
            {{- end }}
          ports:
            - containerPort: 8428
              name: http
            {{- if .Values.victoriametrics.graphiteEnabled }}
            - containerPort: 2003
              name: graphite
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/victoriametrics
            - name: data
              mountPath: /data
            {{- if .Values.victoriametrics.vault.enabled }}
            - name: vault-ca
              mountPath: /vault/tls
            - name: vault-metrics-token
              mountPath: /var/run/secrets/vault-metrics
            {{- end }}
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.victoriametrics.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8428
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8428
            initialDelaySeconds: 5
            periodSeconds: 5
        {{- if eq (.Values.alertmanager.enabled | toString) "true" }}
        - name: vmalert
          image: {{ .Values.victoriametrics.vmalertImage | default "victoriametrics/vmalert:v1.117.1" }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          args:
            - '-datasource.url=http://localhost:8428'
            - '-remoteRead.url=http://localhost:8428'
            - '-remoteWrite.url=http://localhost:8428'
            - '-notifier.url=http://{{ include "schnappy.alertmanager.serviceName" . }}:9093'
            - '-rule=/etc/vmalert/rules/*.yml'
            - '-httpListenAddr=:8880'
          ports:
            - containerPort: 8880
              name: vmalert
          volumeMounts:
            - name: rules
              mountPath: /etc/vmalert/rules
            - name: tmp-vmalert
              mountPath: /tmp
          resources:
            requests: { cpu: 25m, memory: 32Mi }
            limits: { cpu: 200m, memory: 128Mi }
          livenessProbe:
            httpGet:
              path: /health
              port: 8880
            initialDelaySeconds: 5
            periodSeconds: 10
        {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "schnappy.fullname" . }}-victoriametrics-config
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "schnappy.fullname" . }}-victoriametrics
        {{- if .Values.victoriametrics.vault.enabled }}
        - name: vault-ca
          secret:
            secretName: vault-ca-{{ include "schnappy.fullname" . }}
        - name: vault-metrics-token
          secret:
            secretName: vault-metrics-secret
            items:
              - key: token
                path: token
        {{- end }}
        - name: tmp
          emptyDir: {}
        {{- if eq (.Values.alertmanager.enabled | toString) "true" }}
        - name: rules
          configMap:
            name: {{ include "schnappy.fullname" . }}-victoriametrics-rules
        - name: tmp-vmalert
          emptyDir: {}
        {{- end }}
{{- end }}
