{{- if .Values.clickhouse.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "schnappy.clickhouse.serviceName" . }}-config
  labels:
    {{- include "schnappy.clickhouse.labels" . | nindent 4 }}
data:
  config.xml: |-
    {{ .Files.Get "files/clickhouse-config.xml" | nindent 4 }}
  users.xml: |-
    {{ .Files.Get "files/clickhouse-users.xml" | nindent 4 }}
  logs-schema.sql: |-
    {{ .Files.Get "files/clickhouse-logs-schema.sql" | nindent 4 }}
  {{- if eq (.Values.clickhouse.events.enabled | toString) "true" }}
  events-schema.sql: |-
    {{ .Files.Get "files/clickhouse-events-schema.sql" | nindent 4 }}
  {{- end }}
{{- end }}
