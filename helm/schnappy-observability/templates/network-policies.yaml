{{- if .Values.networkPolicies.enabled -}}
{{- if eq (.Values.mimir.enabled | toString) "true" }}
# Mimir network policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "schnappy.fullname" . }}-mimir
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "schnappy.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mimir
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Prometheus remote_write + Grafana queries
    - ports:
        - protocol: TCP
          port: 9009
  egress:
    # DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Mimir → MinIO (S3 block storage)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: schnappy
              app.kubernetes.io/component: minio
      ports:
        - protocol: TCP
          port: 9000
---
{{- end }}
{{- if eq (.Values.tempo.enabled | toString) "true" }}
# Tempo network policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "schnappy.fullname" . }}-tempo
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "schnappy.tempo.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # OTLP from apps + Zipkin from Istio proxies + HTTP from Grafana
    - ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 9411
        - protocol: TCP
          port: 3200
  egress:
    # DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Tempo → MinIO (S3 trace storage)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: schnappy
              app.kubernetes.io/component: minio
      ports:
        - protocol: TCP
          port: 9000
    # Tempo metrics_generator → Mimir (remote_write span metrics)
    - to:
        - podSelector:
            matchLabels:
              {{- include "schnappy.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: mimir
      ports:
        - protocol: TCP
          port: 9009
---
{{- end }}
{{- if eq (.Values.alertmanager.enabled | toString) "true" }}
# Alertmanager network policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "schnappy.fullname" . }}-alertmanager
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "schnappy.alertmanager.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Prometheus + kubelet probes
    - ports:
        - protocol: TCP
          port: 9093
  egress:
    # DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Alertmanager → SMTP (email alerts)
    - ports:
        - protocol: TCP
          port: 587
---
{{- end }}
{{- if eq (.Values.kubeStateMetrics.enabled | toString) "true" }}
# kube-state-metrics network policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "schnappy.fullname" . }}-kube-state-metrics
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "schnappy.kubeStateMetrics.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # VictoriaMetrics scraping + kubelet probes
    - ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8081
  egress:
    # DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # kube-state-metrics → Kubernetes API
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
---
{{- end }}
{{- if .Values.grafana.enabled }}
# Grafana network policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "schnappy.fullname" . }}-grafana
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "schnappy.grafana.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 3000
  egress:
    # DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Grafana → Mimir (datasource)
    {{- if eq (.Values.mimir.enabled | toString) "true" }}
    - to:
        - podSelector:
            matchLabels:
              {{- include "schnappy.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: mimir
      ports:
        - protocol: TCP
          port: 9009
    {{- end }}
    # Grafana → Tempo (tracing datasource)
    {{- if eq (.Values.tempo.enabled | toString) "true" }}
    - to:
        - podSelector:
            matchLabels:
              {{- include "schnappy.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: tempo
      ports:
        - protocol: TCP
          port: 3200
    {{- end }}
    # Grafana → Keycloak (OAuth2 SSO)
    {{- if eq (.Values.grafana.oauth.enabled | toString) "true" }}
    - to:
        - podSelector:
            matchLabels:
              {{- include "schnappy.keycloak.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8080
    {{- end }}
{{- end }}
{{- if eq (.Values.elk.enabled | toString) "true" }}
---
# Elasticsearch network policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "schnappy.fullname" . }}-elasticsearch
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "schnappy.elasticsearch.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from app
    - from:
        - podSelector:
            matchLabels:
              {{- include "schnappy.monitor.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 9200
    # Allow from Kibana
    - from:
        - podSelector:
            matchLabels:
              {{- include "schnappy.kibana.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 9200
    # Allow from Fluent-bit
    - from:
        - podSelector:
            matchLabels:
              {{- include "schnappy.fluentbit.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 9200
    # Allow from ES ILM job
    - from:
        - podSelector:
            matchLabels:
              {{- include "schnappy.esIlmJob.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 9200
  egress:
    # DNS only — Elasticsearch doesn't initiate external connections
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# Kibana network policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "schnappy.fullname" . }}-kibana
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "schnappy.kibana.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 5601
  egress:
    # DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Kibana → Elasticsearch
    - to:
        - podSelector:
            matchLabels:
              {{- include "schnappy.elasticsearch.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 9200
---
# Fluent-bit network policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "schnappy.fullname" . }}-fluentbit
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "schnappy.fluentbit.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    # DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Fluent-bit → Elasticsearch
    - to:
        - podSelector:
            matchLabels:
              {{- include "schnappy.elasticsearch.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 9200
    # Fluent-bit → Kubernetes API (metadata enrichment)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
{{- end }}
---
# ES ILM job network policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "schnappy.fullname" . }}-es-ilm-job
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "schnappy.esIlmJob.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    # DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # ILM job → Elasticsearch
    - to:
        - podSelector:
            matchLabels:
              {{- include "schnappy.elasticsearch.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 9200
---
{{- end }}
{{- if and .Values.networkPolicies.enabled .Values.reports.enabled }}
---
# Reports server (Nginx → MinIO proxy) network policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "schnappy.fullname" . }}-reports
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "schnappy.reports.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from Traefik ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Reports → MinIO (S3 proxy)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: schnappy
              app.kubernetes.io/component: minio
      ports:
        - protocol: TCP
          port: 9000
{{- end }}
