{{- if .Values.networkPolicies.enabled -}}
{{- if .Values.victoriametrics.enabled }}
# VictoriaMetrics network policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "schnappy.fullname" . }}-victoriametrics
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "schnappy.victoriametrics.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- if .Values.grafana.enabled }}
    - from:
        - podSelector:
            matchLabels:
              {{- include "schnappy.grafana.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8428
    {{- end }}
    # k6 tests remote write
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: schnappy
              app.kubernetes.io/component: k6-smoke
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: schnappy
              app.kubernetes.io/component: k6-load
      ports:
        - protocol: TCP
          port: 8428
  egress:
    # DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # VictoriaMetrics → App (scrape)
    - to:
        - podSelector:
            matchLabels:
              {{- include "schnappy.monitor.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8080
    # VictoriaMetrics → Woodpecker (scrape)
    {{- if eq (.Values.victoriametrics.woodpecker.enabled | toString) "true" }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: woodpecker
      ports:
        - protocol: TCP
          port: 80
    {{- end }}
    # VictoriaMetrics → Forgejo (scrape)
    {{- if eq (.Values.victoriametrics.forgejo.enabled | toString) "true" }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: forgejo
      ports:
        - protocol: TCP
          port: 3000
    {{- end }}
    # VictoriaMetrics → Alertmanager
    {{- if eq (.Values.alertmanager.enabled | toString) "true" }}
    - to:
        - podSelector:
            matchLabels:
              {{- include "schnappy.alertmanager.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 9093
    {{- end }}
    # VictoriaMetrics → kube-state-metrics (scrape)
    {{- if eq (.Values.kubeStateMetrics.enabled | toString) "true" }}
    - to:
        - podSelector:
            matchLabels:
              {{- include "schnappy.kubeStateMetrics.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8080
    {{- end }}
---
{{- end }}
{{- if and .Values.victoriametrics.enabled (eq (.Values.alertmanager.enabled | toString) "true") }}
# Alertmanager network policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "schnappy.fullname" . }}-alertmanager
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "schnappy.alertmanager.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # VictoriaMetrics + kubelet probes
    - ports:
        - protocol: TCP
          port: 9093
  egress:
    # DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Alertmanager → App (webhook)
    - to:
        - podSelector:
            matchLabels:
              {{- include "schnappy.monitor.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8080
---
{{- end }}
{{- if and .Values.victoriametrics.enabled (eq (.Values.kubeStateMetrics.enabled | toString) "true") }}
# kube-state-metrics network policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "schnappy.fullname" . }}-kube-state-metrics
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "schnappy.kubeStateMetrics.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # VictoriaMetrics scraping + kubelet probes
    - ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8081
  egress:
    # DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # kube-state-metrics → Kubernetes API
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
---
{{- end }}
{{- if .Values.grafana.enabled }}
# Grafana network policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "schnappy.fullname" . }}-grafana
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "schnappy.grafana.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 3000
  egress:
    # DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Grafana → Prometheus (datasource)
    {{- if .Values.victoriametrics.enabled }}
    - to:
        - podSelector:
            matchLabels:
              {{- include "schnappy.victoriametrics.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8428
    {{- end }}
    # Grafana → Keycloak (OAuth2 SSO)
    {{- if eq (.Values.grafana.oauth.enabled | toString) "true" }}
    - to:
        - podSelector:
            matchLabels:
              {{- include "schnappy.keycloak.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8080
    {{- end }}
{{- end }}
{{- if eq (.Values.elk.enabled | toString) "true" }}
---
# Elasticsearch network policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "schnappy.fullname" . }}-elasticsearch
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "schnappy.elasticsearch.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from app
    - from:
        - podSelector:
            matchLabels:
              {{- include "schnappy.monitor.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 9200
    # Allow from Kibana
    - from:
        - podSelector:
            matchLabels:
              {{- include "schnappy.kibana.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 9200
    # Allow from Fluent-bit
    - from:
        - podSelector:
            matchLabels:
              {{- include "schnappy.fluentbit.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 9200
    # Allow from ES ILM job
    - from:
        - podSelector:
            matchLabels:
              {{- include "schnappy.esIlmJob.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 9200
  egress:
    # DNS only — Elasticsearch doesn't initiate external connections
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# Kibana network policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "schnappy.fullname" . }}-kibana
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "schnappy.kibana.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 5601
  egress:
    # DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Kibana → Elasticsearch
    - to:
        - podSelector:
            matchLabels:
              {{- include "schnappy.elasticsearch.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 9200
---
# Fluent-bit network policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "schnappy.fullname" . }}-fluentbit
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "schnappy.fluentbit.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    # DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Fluent-bit → Elasticsearch
    - to:
        - podSelector:
            matchLabels:
              {{- include "schnappy.elasticsearch.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 9200
    # Fluent-bit → Kubernetes API (metadata enrichment)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
{{- end }}
---
# ES ILM job network policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "schnappy.fullname" . }}-es-ilm-job
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "schnappy.esIlmJob.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    # DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # ILM job → Elasticsearch
    - to:
        - podSelector:
            matchLabels:
              {{- include "schnappy.elasticsearch.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 9200
---
{{- end }}
