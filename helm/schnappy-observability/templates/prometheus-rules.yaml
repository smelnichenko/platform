{{- if and (eq (.Values.prometheus.enabled | toString) "true") (eq (.Values.alertmanager.enabled | toString) "true") }}
{{- $fn := include "schnappy.fullname" . }}
{{- $ns := .Release.Namespace }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ $fn }}-alerts
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
spec:
  groups:
    - name: infra-watchdog
      rules:
        - alert: Watchdog
          expr: vector(1)
          labels:
            severity: none
          annotations:
            runbook_url: "https://runbooks.pmon.dev/Watchdog"
            summary: "Watchdog alert (always firing)"
            description: "Dead man's switch. If not firing, the alerting pipeline is broken."

    - name: infra-elk
      rules:
        - alert: ElasticsearchDown
          expr: kube_pod_status_ready{namespace="{{ $ns }}", condition="true", pod=~"{{ $fn }}-elasticsearch-\\d+$"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            runbook_url: "https://runbooks.pmon.dev/ElasticsearchDown"
            summary: "Elasticsearch {{ "{{" }} $labels.pod {{ "}}" }} is down"
        - alert: FluentbitDown
          expr: kube_pod_status_ready{namespace="{{ $ns }}", condition="true", pod=~"{{ $fn }}-fluentbit-.*"} == 0
          for: 10m
          labels:
            severity: warning
          annotations:
            runbook_url: "https://runbooks.pmon.dev/FluentbitDown"
            summary: "Fluent-bit {{ "{{" }} $labels.pod {{ "}}" }} is down"
        - alert: KibanaDown
          expr: kube_pod_status_ready{namespace="{{ $ns }}", condition="true", pod=~"{{ $fn }}-kibana-.*"} == 0
          for: 10m
          labels:
            severity: warning
          annotations:
            runbook_url: "https://runbooks.pmon.dev/KibanaDown"
            summary: "Kibana {{ "{{" }} $labels.pod {{ "}}" }} is down"

    - name: infra-certificates
      rules:
        - alert: CertExpiringIn30Days
          expr: certmanager_certificate_expiration_timestamp_seconds - time() < 30 * 24 * 3600
          for: 1h
          labels:
            severity: warning
          annotations:
            runbook_url: "https://runbooks.pmon.dev/CertExpiringIn30Days"
            summary: "Certificate {{ "{{" }} $labels.namespace {{ "}}" }}/{{ "{{" }} $labels.name {{ "}}" }} expiring in less than 30 days"
        - alert: CertExpiringIn7Days
          expr: certmanager_certificate_expiration_timestamp_seconds - time() < 7 * 24 * 3600
          for: 30m
          labels:
            severity: critical
          annotations:
            runbook_url: "https://runbooks.pmon.dev/CertExpiringIn7Days"
            summary: "Certificate {{ "{{" }} $labels.namespace {{ "}}" }}/{{ "{{" }} $labels.name {{ "}}" }} expiring in less than 7 days"

    - name: infra-pvc
      rules:
        - alert: PVCUsageHigh
          expr: kubelet_volume_stats_used_bytes{namespace="{{ $ns }}"} / kubelet_volume_stats_capacity_bytes{namespace="{{ $ns }}"} > 0.8
          for: 10m
          labels:
            severity: warning
          annotations:
            runbook_url: "https://runbooks.pmon.dev/PVCUsageHigh"
            summary: "PVC {{ "{{" }} $labels.persistentvolumeclaim {{ "}}" }} usage high"
        - alert: PVCUsageCritical
          expr: kubelet_volume_stats_used_bytes{namespace="{{ $ns }}"} / kubelet_volume_stats_capacity_bytes{namespace="{{ $ns }}"} > 0.9
          for: 5m
          labels:
            severity: critical
          annotations:
            runbook_url: "https://runbooks.pmon.dev/PVCUsageCritical"
            summary: "PVC {{ "{{" }} $labels.persistentvolumeclaim {{ "}}" }} usage critical"

    - name: infra-vault
      rules:
        - alert: VaultSealed
          expr: probe_http_status_code{job="blackbox-vault"} == 503 or probe_success{job="blackbox-vault"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            runbook_url: "https://runbooks.pmon.dev/VaultSealed"
            summary: "Vault at {{ "{{" }} $labels.instance {{ "}}" }} is sealed or unreachable"
            description: "Pi Vault returned 503 (sealed) or was unreachable for 2m. ESO will fail to refresh any ExternalSecret."

    - name: infra-eso
      rules:
        - alert: ClusterSecretStoreNotReady
          expr: external_secrets_cluster_secret_store_condition{condition="Ready", status="true"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            runbook_url: "https://runbooks.pmon.dev/ClusterSecretStoreNotReady"
            summary: "ClusterSecretStore {{ "{{" }} $labels.name {{ "}}" }} not Ready"
            description: "ESO cannot reach its backing store. All ExternalSecrets sourced from it will stop refreshing."
        - alert: ExternalSecretSyncFailing
          expr: sum by (namespace, name) (rate(externalsecret_sync_calls_error[10m])) > 0
          for: 15m
          labels:
            severity: warning
          annotations:
            runbook_url: "https://runbooks.pmon.dev/ExternalSecretSyncFailing"
            summary: "ExternalSecret {{ "{{" }} $labels.namespace {{ "}}" }}/{{ "{{" }} $labels.name {{ "}}" }} sync failing"

    - name: infra-argocd
      rules:
        - alert: ArgoCDAppDegraded
          expr: argocd_app_info{health_status="Degraded"} == 1
          for: 15m
          labels:
            severity: warning
          annotations:
            runbook_url: "https://runbooks.pmon.dev/ArgoCDAppDegraded"
            summary: "ArgoCD app {{ "{{" }} $labels.name {{ "}}" }} Degraded"
            description: "Application has been Degraded for 15m. Check resource tree for the failing child."
        - alert: ArgoCDAppOutOfSync
          expr: argocd_app_info{sync_status!="Synced"} == 1
          for: 30m
          labels:
            severity: warning
          annotations:
            runbook_url: "https://runbooks.pmon.dev/ArgoCDAppOutOfSync"
            summary: "ArgoCD app {{ "{{" }} $labels.name {{ "}}" }} OutOfSync 30m+"

    - name: infra-velero
      rules:
        - alert: VeleroBSLUnavailable
          expr: velero_backup_last_status{schedule!=""} == 0 or absent(velero_backup_last_successful_timestamp{schedule="velero-schnappy-daily"} > time() - 30 * 3600)
          for: 10m
          labels:
            severity: critical
          annotations:
            runbook_url: "https://runbooks.pmon.dev/VeleroBSLUnavailable"
            summary: "Velero daily backup missing or failed"
            description: "No successful schnappy-daily backup in the last 30h."
        - alert: VeleroBackupFailing
          expr: increase(velero_backup_failure_total[1h]) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            runbook_url: "https://runbooks.pmon.dev/VeleroBackupFailing"
            summary: "Velero backup failed"

    - name: infra-public-urls
      rules:
        - alert: PublicEndpointDown
          expr: probe_success{job="blackbox-public"} == 0
          for: 3m
          labels:
            severity: critical
          annotations:
            runbook_url: "https://runbooks.pmon.dev/PublicEndpointDown"
            summary: "Public URL {{ "{{" }} $labels.instance {{ "}}" }} is down"
            description: "Blackbox probe failed for 3m. Check gateway, route binding, upstream."
        - alert: PublicEndpointSlow
          expr: probe_duration_seconds{job="blackbox-public"} > 3
          for: 10m
          labels:
            severity: warning
          annotations:
            runbook_url: "https://runbooks.pmon.dev/PublicEndpointSlow"
            summary: "Public URL {{ "{{" }} $labels.instance {{ "}}" }} slow"
            description: "End-to-end probe > 3s for 10m."
        - alert: PublicSSLCertExpiringSoon
          expr: (probe_ssl_earliest_cert_expiry{job="blackbox-public"} - time()) / 86400 < 14
          for: 1h
          labels:
            severity: warning
          annotations:
            runbook_url: "https://runbooks.pmon.dev/PublicSSLCertExpiringSoon"
            summary: "Public cert at {{ "{{" }} $labels.instance {{ "}}" }} expiring soon"
            description: "Serving cert < 14d from expiry."

    - name: infra-certmanager
      rules:
        - alert: CertManagerRenewalFailing
          expr: certmanager_certificate_ready_status{condition="False"} == 1
          for: 1h
          labels:
            severity: critical
          annotations:
            runbook_url: "https://runbooks.pmon.dev/CertManagerRenewalFailing"
            summary: "cert-manager failed to renew {{ "{{" }} $labels.namespace {{ "}}" }}/{{ "{{" }} $labels.name {{ "}}" }}"
            description: "Certificate not Ready for 1h. ACME challenge, DNS-01 webhook, or CA issuer may be broken."
        - alert: CertManagerOrderFailing
          expr: increase(certmanager_http_acme_client_request_count{status=~"4..|5.."}[30m]) > 5
          for: 30m
          labels:
            severity: warning
          annotations:
            runbook_url: "https://runbooks.pmon.dev/CertManagerOrderFailing"
            summary: "cert-manager ACME requests failing"

    - name: infra-prometheus
      rules:
        - alert: PrometheusTargetMissing
          expr: up == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            runbook_url: "https://runbooks.pmon.dev/PrometheusTargetMissing"
            summary: "Target {{ "{{" }} $labels.job {{ "}}" }}/{{ "{{" }} $labels.instance {{ "}}" }} is down"
        - alert: PrometheusRuleFailures
          expr: increase(prometheus_rule_evaluation_failures_total[10m]) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            runbook_url: "https://runbooks.pmon.dev/PrometheusRuleFailures"
            summary: "Prometheus rule evaluation failing"
            description: "A rule is returning errors — invalid expression or missing series."
        - alert: PrometheusNotificationsFailing
          expr: rate(alertmanager_notifications_failed_total[10m]) > 0
          for: 10m
          labels:
            severity: critical
          annotations:
            runbook_url: "https://runbooks.pmon.dev/PrometheusNotificationsFailing"
            summary: "Alertmanager notifications failing ({{ "{{" }} $labels.integration {{ "}}" }})"
            description: "SMTP or webhook delivery is erroring. Check secrets, network, credentials."
        - alert: PrometheusScrapeDurationSlow
          expr: scrape_duration_seconds > 10
          for: 15m
          labels:
            severity: warning
          annotations:
            runbook_url: "https://runbooks.pmon.dev/PrometheusScrapeDurationSlow"
            summary: "Slow scrape: {{ "{{" }} $labels.job {{ "}}" }}/{{ "{{" }} $labels.instance {{ "}}" }}"

    - name: ci-woodpecker
      rules:
        - alert: WoodpeckerBuildFailed
          # Woodpecker increments this counter when a pipeline ends in a
          # failure state. Any non-zero increase in the last 5min fires.
          expr: increase(woodpecker_pipeline_count{status="failure"}[5m]) > 0
          labels:
            severity: warning
          annotations:
            runbook_url: "https://runbooks.pmon.dev/WoodpeckerBuildFailed"
            summary: "Woodpecker build failed (repo {{ "{{" }} $labels.repo {{ "}}" }})"
            description: "A pipeline on {{ "{{" }} $labels.repo {{ "}}" }} ended in failure. Check ci.pmon.dev."
        - alert: WoodpeckerScrapeDown
          expr: up{job="woodpecker-server-metrics"} == 0
          for: 10m
          labels:
            severity: warning
          annotations:
            runbook_url: "https://runbooks.pmon.dev/WoodpeckerScrapeDown"
            summary: "Cannot scrape Woodpecker metrics endpoint"
            description: "Build-failure alerts are silent until this resolves. Check the bearer token + the woodpecker-server-metrics Service."
{{- end }}
