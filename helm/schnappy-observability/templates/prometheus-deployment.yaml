{{- if .Values.prometheus.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "schnappy.prometheus.serviceName" . }}
  labels:
    {{- include "schnappy.prometheus.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "schnappy.prometheus.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "schnappy.prometheus.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/part-of: schnappy
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: prometheus
          image: {{ .Values.prometheus.image }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          args:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--storage.tsdb.path=/prometheus'
            - '--storage.tsdb.retention.time={{ .Values.prometheus.retention }}'
            - '--web.enable-remote-write-receiver'
          ports:
            - containerPort: 9090
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
            {{- if eq (.Values.alertmanager.enabled | toString) "true" }}
            - name: rules
              mountPath: /etc/prometheus/rules/
            {{- end }}
            {{- if .Values.prometheus.vault.enabled }}
            - name: vault-ca
              mountPath: /vault/tls
            - name: vault-metrics-token
              mountPath: /var/run/secrets/vault-metrics
            {{- end }}
          resources:
            {{- toYaml .Values.prometheus.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: {{ include "schnappy.fullname" . }}-prometheus-config
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "schnappy.fullname" . }}-prometheus
        {{- if eq (.Values.alertmanager.enabled | toString) "true" }}
        - name: rules
          configMap:
            name: {{ include "schnappy.fullname" . }}-prometheus-rules
        {{- end }}
        {{- if .Values.prometheus.vault.enabled }}
        - name: vault-ca
          secret:
            secretName: vault-ca-monitor
        - name: vault-metrics-token
          secret:
            secretName: vault-metrics-secret
            items:
              - key: token
                path: token
        {{- end }}
{{- end }}
