{{- if .Values.gateway.enabled }}
{{- $fn := include "schnappy.fullname" . }}
{{- $gwName := .Values.gateway.name }}
{{- $gwNamespace := .Values.gateway.namespace }}
{{- if .Values.gateway.hosts.grafana }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fn }}-grafana-route
  namespace: {{ .Release.Namespace }}
spec:
  hostnames:
    - {{ .Values.gateway.hosts.grafana | quote }}
  parentRefs:
    - name: {{ $gwName }}
      namespace: {{ $gwNamespace }}
      sectionName: https
  rules:
    - matches:
        - path: { type: PathPrefix, value: / }
      backendRefs:
        - name: {{ $fn }}-grafana
          port: 3000
{{- end }}
{{- if .Values.gateway.hosts.logs }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fn }}-kibana-route
  namespace: {{ .Release.Namespace }}
spec:
  hostnames:
    - {{ .Values.gateway.hosts.logs | quote }}
  parentRefs:
    - name: {{ $gwName }}
      namespace: {{ $gwNamespace }}
      sectionName: https
  rules:
    - matches:
        - path: { type: PathPrefix, value: / }
      backendRefs:
        - name: {{ $fn }}-kibana
          port: 5601
{{- end }}
{{- if .Values.gateway.hosts.reports }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fn }}-reports-route
  namespace: {{ .Release.Namespace }}
spec:
  hostnames:
    - {{ .Values.gateway.hosts.reports | quote }}
  parentRefs:
    - name: {{ $gwName }}
      namespace: {{ $gwNamespace }}
      sectionName: https
  rules:
    - matches:
        - path: { type: PathPrefix, value: / }
      backendRefs:
        - name: {{ $fn }}-reports
          port: 8080
{{- end }}
{{- end }}
