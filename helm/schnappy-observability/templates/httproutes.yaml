{{- if .Values.gateway.enabled }}
{{- $fn := include "schnappy.fullname" . }}
{{- $gwName := .Values.gateway.name }}
{{- $gwNamespace := .Values.gateway.namespace }}
{{- if .Values.gateway.hosts.grafana }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fn }}-grafana-route
  namespace: {{ .Release.Namespace }}
spec:
  hostnames:
    - {{ .Values.gateway.hosts.grafana | quote }}
  parentRefs:
    - name: {{ $gwName }}
      namespace: {{ $gwNamespace }}
      sectionName: https
  rules:
    - matches:
        - path: { type: PathPrefix, value: / }
      backendRefs:
        - name: {{ $fn }}-grafana
          port: 3000
{{- end }}
{{- /* Plan 065: Kibana retired. Logs now live in ClickHouse, queried via
       the ClickHouse-Logs Grafana datasource at the same grafana host.
       The `gateway.hosts.logs` value is unused — left declared in
       values.yaml for chart-API compatibility. */ -}}
{{- if .Values.gateway.hosts.reports }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fn }}-reports-route
  namespace: {{ .Release.Namespace }}
spec:
  hostnames:
    - {{ .Values.gateway.hosts.reports | quote }}
  parentRefs:
    - name: {{ $gwName }}
      namespace: {{ $gwNamespace }}
      sectionName: https
  rules:
    - matches:
        - path: { type: PathPrefix, value: / }
      backendRefs:
        - name: {{ $fn }}-reports
          port: 8080
{{- end }}
{{- if .Values.gateway.hosts.alerts }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fn }}-alertmanager-route
  namespace: {{ .Release.Namespace }}
spec:
  hostnames:
    - {{ .Values.gateway.hosts.alerts | quote }}
  parentRefs:
    - name: {{ $gwName }}
      namespace: {{ $gwNamespace }}
      sectionName: https
  rules:
    - matches:
        - path: { type: PathPrefix, value: / }
      backendRefs:
        - name: {{ $fn }}-alertmanager
          port: 9093
{{- end }}
{{- end }}
