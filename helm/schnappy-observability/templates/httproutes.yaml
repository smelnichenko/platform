{{- if .Values.gateway.enabled }}
{{- $fn := include "schnappy.fullname" . }}
{{- $gwName := .Values.gateway.name }}
{{- $gwNamespace := .Values.gateway.namespace }}
{{- if .Values.gateway.hosts.grafana }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fn }}-grafana-route
  namespace: {{ .Release.Namespace }}
spec:
  hostnames:
    - {{ .Values.gateway.hosts.grafana | quote }}
  parentRefs:
    - name: {{ $gwName }}
      namespace: {{ $gwNamespace }}
      sectionName: https
  rules:
    - matches:
        - path: { type: PathPrefix, value: / }
      backendRefs:
        - name: {{ $fn }}-grafana
          port: 3000
{{- end }}
{{- if and .Values.gateway.hosts.logs .Values.gateway.hosts.grafana }}
---
# Plan 065: Kibana retired. Logs now live in ClickHouse, queried via
# the Grafana ClickHouse-Logs datasource. Keep logs.pmon.dev alive as
# a 301 redirect to grafana/explore so old bookmarks + the public-URL
# blackbox probe don't 404. (Gateway API only allows 301/302; 308
# would be ideal but isn't supported.)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fn }}-logs-redirect
  namespace: {{ .Release.Namespace }}
spec:
  hostnames:
    - {{ .Values.gateway.hosts.logs | quote }}
  parentRefs:
    - name: {{ $gwName }}
      namespace: {{ $gwNamespace }}
      sectionName: https
  rules:
    - matches:
        - { path: { type: PathPrefix, value: / } }
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            hostname: {{ .Values.gateway.hosts.grafana | quote }}
            path:
              type: ReplaceFullPath
              replaceFullPath: /explore?left=%7B%22datasource%22:%22clickhouse-logs%22%7D
            statusCode: 301
{{- end }}
{{- if .Values.gateway.hosts.reports }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fn }}-reports-route
  namespace: {{ .Release.Namespace }}
spec:
  hostnames:
    - {{ .Values.gateway.hosts.reports | quote }}
  parentRefs:
    - name: {{ $gwName }}
      namespace: {{ $gwNamespace }}
      sectionName: https
  rules:
    - matches:
        - path: { type: PathPrefix, value: / }
      backendRefs:
        - name: {{ $fn }}-reports
          port: 8080
{{- end }}
{{- if .Values.gateway.hosts.alerts }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fn }}-alertmanager-route
  namespace: {{ .Release.Namespace }}
spec:
  hostnames:
    - {{ .Values.gateway.hosts.alerts | quote }}
  parentRefs:
    - name: {{ $gwName }}
      namespace: {{ $gwNamespace }}
      sectionName: https
  rules:
    - matches:
        - path: { type: PathPrefix, value: / }
      backendRefs:
        - name: {{ $fn }}-alertmanager
          port: 9093
{{- end }}
{{- end }}
