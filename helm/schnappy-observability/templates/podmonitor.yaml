{{- if eq (.Values.prometheus.enabled | toString) "true" }}
{{- $fn := include "schnappy.fullname" . }}
# Scrape all Istio-injected pods via merged metrics port 15020.
# Port 15020 is always plaintext (excluded from iptables interception),
# so this works with STRICT mTLS without Prometheus needing a sidecar.
# Istio merges application metrics (from prometheus.io/path annotation)
# with Envoy proxy metrics into a single /stats/prometheus endpoint.
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ $fn }}-istio-pods
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
spec:
  namespaceSelector:
    matchNames: [{{ .Release.Namespace }}]
  selector:
    matchExpressions:
      - key: security.istio.io/tlsMode
        operator: Exists
      - key: app.kubernetes.io/component
        operator: NotIn
        values: [kube-state-metrics]
  podMetricsEndpoints:
    - path: /stats/prometheus
      interval: {{ .Values.prometheus.scrapeInterval | default "15s" }}
      relabelings:
        # Only scrape istio-proxy container (serves merged metrics on 15020)
        - action: keep
          sourceLabels: [__meta_kubernetes_pod_container_name]
          regex: istio-proxy
        # Rewrite address to pod-ip:15020
        - action: replace
          sourceLabels: [__meta_kubernetes_pod_ip, __meta_kubernetes_pod_annotation_prometheus_io_port]
          regex: (.+);(\d+)
          replacement: $1:$2
          targetLabel: __address__
        # Set job label from component (e.g. app → schnappy-app)
        - action: replace
          sourceLabels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
          regex: (.+)
          replacement: schnappy-$1
          targetLabel: job
        # Add component label
        - action: replace
          sourceLabels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
          targetLabel: component
        # Add pod name
        - action: replace
          sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
---
# kube-state-metrics — separate PodMonitor with honor_labels
# KSM's metrics contain pod/namespace labels that must be preserved,
# not overwritten by PodMonitor relabeling.
{{- if eq (.Values.kubeStateMetrics.enabled | toString) "true" }}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ $fn }}-kube-state-metrics
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
spec:
  namespaceSelector:
    matchNames: [{{ .Release.Namespace }}]
  selector:
    matchLabels:
      app.kubernetes.io/component: kube-state-metrics
  podMetricsEndpoints:
    - path: /stats/prometheus
      interval: {{ .Values.prometheus.scrapeInterval | default "15s" }}
      honorLabels: true
      relabelings:
        - action: keep
          sourceLabels: [__meta_kubernetes_pod_container_name]
          regex: istio-proxy
        - action: replace
          sourceLabels: [__meta_kubernetes_pod_ip, __meta_kubernetes_pod_annotation_prometheus_io_port]
          regex: (.+);(\d+)
          replacement: $1:$2
          targetLabel: __address__
{{- end }}
{{- end }}
