{{- if .Values.grafana.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "schnappy.fullname" . }}-grafana-datasources
  labels:
    {{- include "schnappy.grafana.labels" . | nindent 4 }}
data:
  datasources.yml: |
    apiVersion: 1
    deleteDatasources:
      - name: Prometheus
        orgId: 1
      - name: VictoriaMetrics
        orgId: 1
    datasources:
      - name: Mimir
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://{{ include "schnappy.fullname" . }}-mimir:9009/prometheus
        isDefault: true
        editable: false
        jsonData:
          prometheusType: Mimir
          {{- if eq (.Values.tempo.enabled | toString) "true" }}
          exemplarTraceIdDestinations:
            - name: trace_id
              datasourceUid: tempo
          {{- end }}
      {{- if eq (.Values.clickhouse.enabled | toString) "true" }}
      - name: ClickHouse-Logs
        type: grafana-clickhouse-datasource
        uid: clickhouse-logs
        access: proxy
        url: http://{{ include "schnappy.clickhouse.serviceName" . }}:8123
        editable: false
        jsonData:
          defaultDatabase: logs
          username: schnappy
          protocol: http
          # Click trace_id in a log row → jump to the trace in Tempo.
          {{- if eq (.Values.tempo.enabled | toString) "true" }}
          derivedFields:
            - name: TraceID
              matcherRegex: '"trace_id":"([a-f0-9]+)"'
              url: '$${__value.raw}'
              datasourceUid: tempo
              urlDisplayLabel: 'View trace'
          {{- end }}
        secureJsonData:
          password: ${CLICKHOUSE_PASSWORD}
      {{- end }}
      {{- if eq (.Values.tempo.enabled | toString) "true" }}
      - name: Tempo
        type: tempo
        uid: tempo
        access: proxy
        url: http://{{ include "schnappy.fullname" . }}-tempo:3200
        editable: false
        jsonData:
          tracesToMetrics:
            datasourceUid: prometheus
            spanStartTimeShift: "-1h"
            spanEndTimeShift: "1h"
            tags:
              - key: service.name
                value: job
          serviceMap:
            datasourceUid: prometheus
          nodeGraph:
            enabled: true
          search:
            hide: false
          traceQuery:
            timeShiftEnabled: true
            spanStartTimeShift: "-1h"
            spanEndTimeShift: "1h"
          # Click a span → see correlated log lines (filter on trace_id).
          {{- if eq (.Values.clickhouse.enabled | toString) "true" }}
          tracesToLogsV2:
            datasourceUid: clickhouse-logs
            spanStartTimeShift: "-1m"
            spanEndTimeShift:   "1m"
            filterByTraceID: true
            filterBySpanID:  false
            customQuery: true
            query: |
              SELECT timestamp, level, namespace, pod, message
              FROM logs.podlogs
              WHERE trace_id = '$${__span.traceID}'
                AND timestamp BETWEEN $$__fromTime AND $$__toTime
              ORDER BY timestamp ASC
              LIMIT 500
          {{- end }}
      {{- end }}
{{- end }}
