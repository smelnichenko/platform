{{- if .Values.grafana.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "schnappy.fullname" . }}-grafana-datasources
  labels:
    {{- include "schnappy.grafana.labels" . | nindent 4 }}
data:
  datasources.yml: |
    apiVersion: 1
    deleteDatasources:
      - name: Prometheus
        orgId: 1
      - name: VictoriaMetrics
        orgId: 1
    datasources:
      - name: Mimir
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://{{ include "schnappy.fullname" . }}-mimir:9009/prometheus
        isDefault: true
        editable: false
        jsonData:
          prometheusType: Mimir
          {{- if eq (.Values.tempo.enabled | toString) "true" }}
          exemplarTraceIdDestinations:
            - name: trace_id
              datasourceUid: tempo
          {{- end }}
      {{- if eq (.Values.tempo.enabled | toString) "true" }}
      - name: Tempo
        type: tempo
        uid: tempo
        access: proxy
        url: http://{{ include "schnappy.fullname" . }}-tempo:3200
        editable: false
        jsonData:
          tracesToMetrics:
            datasourceUid: prometheus
            spanStartTimeShift: "-1h"
            spanEndTimeShift: "1h"
            tags:
              - key: service.name
                value: job
          serviceMap:
            datasourceUid: prometheus
          nodeGraph:
            enabled: true
          search:
            hide: false
          traceQuery:
            timeShiftEnabled: true
            spanStartTimeShift: "-1h"
            spanEndTimeShift: "1h"
      {{- end }}
{{- end }}
