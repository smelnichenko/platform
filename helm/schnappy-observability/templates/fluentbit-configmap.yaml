{{- if eq (.Values.fluentbit.enabled | toString) "true" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "schnappy.fullname" . }}-fluentbit-config
  labels:
    {{- include "schnappy.fluentbit.labels" . | nindent 4 }}
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush             5
        Log_Level         warn
        Parsers_File      /fluent-bit/etc/parsers.conf
        storage.path      /fluent-bit/db/
        storage.sync      normal
        storage.checksum  off

    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*.log
        Parser            cri
        DB                /fluent-bit/db/tail.db
        Mem_Buf_Limit     64MB
        storage.type      filesystem
        Skip_Long_Lines   On
        Refresh_Interval  10
        Rotate_Wait       5
        Exclude_Path      /var/log/containers/*k6-*

    [FILTER]
        Name              kubernetes
        Match             kube.*
        Kube_URL          https://kubernetes.default.svc:443
        Kube_CA_File      /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File   /var/run/secrets/kubernetes.io/serviceaccount/token
        Merge_Log         On
        Merge_Log_Key     log_parsed
        K8S-Logging.Parser On
        Annotations       Off
        Labels            On
        Buffer_Size       1024KB

    # Map kubernetes.* nested object → top-level fields the CH schema
    # expects (namespace, pod, container, node). Without this lift,
    # CH receives JSONEachRow with no matching columns and silently
    # writes empty defaults.
    [FILTER]
        Name              nest
        Match             kube.*
        Operation         lift
        Nested_under      kubernetes
        Add_prefix        k8s_

    [FILTER]
        Name              modify
        Match             kube.*
        # Field renames so JSONEachRow keys match CH column names.
        Rename            log                 message
        Rename            k8s_namespace_name  namespace
        Rename            k8s_pod_name        pod
        Rename            k8s_container_name  container
        Rename            k8s_host            node
        # Drop the rest of the kubernetes block (container_image,
        # docker_id, pod_id, labels object, etc.) — not in schema.
        Remove_wildcard   k8s_

    [FILTER]
        Name              grep
        Match             kube.*
        Exclude           $kubernetes['container_name'] fluent-bit

    # Lift `log_parsed.{traceId,spanId}` (set by the kubernetes filter
    # when the container log line is JSON) onto the top-level record
    # so the ClickHouse output can map them to columns.
    [FILTER]
        Name              nest
        Match             kube.*
        Operation         lift
        Nested_under      log_parsed
        Add_prefix        log_parsed_

    [FILTER]
        Name              modify
        Match             kube.*
        Rename            log_parsed_traceId trace_id
        Rename            log_parsed_spanId  span_id
        # Spring Boot / structured-JSON apps emit `level` in their
        # log line; surface it as a column. Plain-text container
        # logs leave this empty (Grafana shows "unknown").
        Rename            log_parsed_level   level
        # Anything else from the parsed JSON goes back into log_parsed_*
        # keys — drop them; they're noise for the column-only schema.
        Remove_wildcard   log_parsed_

    # Plain-text logs (klog, Spring Boot text format, generic) don't
    # have a parsed JSON .level field. Extract it heuristically from
    # the message so Grafana can colour-code by severity for the
    # ~99.98% of logs that aren't JSON.
    [FILTER]
        Name              lua
        Match             kube.*
        script            /fluent-bit/etc/extract_level.lua
        call              extract_level

    {{- if eq (.Values.clickhouse.enabled | toString) "true" }}
    # ClickHouse — canonical log store + analytics. The `http` plugin
    # posts JSONEachRow which the ClickHouse HTTP interface accepts
    # when the URI carries an INSERT query. Filesystem-backed retry
    # from [SERVICE] inherits to outputs.
    [OUTPUT]
        Name              http
        Match             kube.*
        Host              {{ include "schnappy.clickhouse.serviceName" . }}.{{ .Release.Namespace }}.svc
        Port              8123
        URI               /?database=logs&date_time_input_format=best_effort&query=INSERT+INTO+logs.podlogs+FORMAT+JSONEachRow
        Format            json_lines
        json_date_key     timestamp
        json_date_format  iso8601
        http_user         schnappy
        http_passwd       ${CLICKHOUSE_PASSWORD}
        tls               Off
        Retry_Limit       5
        Workers           2
    {{- end }}

  parsers.conf: |
    [PARSER]
        Name        cri
        Format      regex
        Regex       ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<_p>[^ ]*) (?<log>.*)$
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z

  extract_level.lua: |
    -- Heuristic level extraction for plain-text container logs.
    -- Order matters: most specific patterns first.
    --
    -- Coverage targets in this cluster:
    --   1. JSON apps (Spring Boot logback)         -> already populated
    --   2. logfmt 'level=foo' (Argo CD, containerd)
    --   3. Envoy access logs '[ts] "METHOD path HTTP/x" STATUS ...'
    --      -> HTTP status code drives the level (2/3xx=info, 4xx=warn, 5xx=error)
    --   4. klog 'IMMDD HH:MM:SS ...'
    --   5. Generic uppercase token (Spring Boot text, [INFO], etc.)
    function extract_level(tag, ts, record)
      if record["level"] and record["level"] ~= "" then
        return 0, ts, record
      end
      local msg = record["message"]
      if not msg or msg == "" then
        return 0, ts, record
      end
      local lvl = nil

      -- 2. logfmt: level=info / level="warn"
      local lf = msg:match("level=\"?(%a+)")
      if lf then
        local low = lf:lower()
        if low == "info" or low == "warn" or low == "warning" or low == "error"
           or low == "debug" or low == "trace" or low == "fatal" or low == "critical" then
          lvl = low == "warning" and "warn" or (low == "critical" and "fatal" or low)
        end
      end

      -- 3. Envoy access log: [ts] "METHOD path HTTP/x.y" STATUS_CODE ...
      -- The status code is the 4th whitespace-separated token after the closing quote.
      if not lvl then
        local status = msg:match("^%[[^%]]+%]%s+\"[^\"]+\"%s+(%d%d%d)%s")
        if status then
          local s = tonumber(status)
          if     s >= 500 then lvl = "error"
          elseif s >= 400 then lvl = "warn"
          else                 lvl = "info"   -- 2xx, 3xx
          end
        end
      end

      -- 4. klog: I0426 11:22:57.853001 ...
      if not lvl then
        local k = msg:match("^([IWEF])%d%d%d%d%s%d%d:%d%d:%d%d")
        if     k == "I" then lvl = "info"
        elseif k == "W" then lvl = "warn"
        elseif k == "E" then lvl = "error"
        elseif k == "F" then lvl = "fatal"
        end
      end

      -- 5. Uppercase token in first 120 chars
      if not lvl then
        local head = msg:sub(1, 120)
        if     head:find("FATAL") or head:find("CRITICAL") then lvl = "fatal"
        elseif head:find("ERROR") or head:find("ERR ")     then lvl = "error"
        elseif head:find("WARN")                            then lvl = "warn"
        elseif head:find("INFO")                            then lvl = "info"
        elseif head:find("DEBUG")                           then lvl = "debug"
        elseif head:find("TRACE")                           then lvl = "trace"
        end
      end

      if lvl then
        record["level"] = lvl
        return 1, ts, record
      end
      return 0, ts, record
    end
{{- end }}
