{{- if .Values.victoriametrics.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "schnappy.victoriametrics.serviceName" . }}
  labels:
    {{- include "schnappy.victoriametrics.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8428
      targetPort: 8428
      protocol: TCP
      name: http
    {{- if .Values.victoriametrics.graphiteEnabled }}
    - port: 2003
      targetPort: 2003
      protocol: TCP
      name: graphite
    {{- end }}
  selector:
    {{- include "schnappy.victoriametrics.selectorLabels" . | nindent 4 }}
{{- end }}
