{{- if .Values.grafana.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "schnappy.fullname" . }}-grafana
  labels:
    {{- include "schnappy.grafana.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "schnappy.grafana.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "schnappy.grafana.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/part-of: schnappy
      annotations:
        # Grafana joins the mesh — required so it can reach
        # ClickHouse (STRICT mTLS in schnappy-infra). Without an
        # istio-proxy sidecar, plain HTTP gets RST'd at the CH
        # sidecar, breaking the ClickHouse-Logs datasource.
        backup.velero.io/backup-volumes: data
        checksum/datasources: {{ include (print $.Template.BasePath "/grafana-datasources-configmap.yaml") . | sha256sum }}
        checksum/dashboards: {{ include (print $.Template.BasePath "/grafana-dashboards-configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "schnappy.fullname" . }}-grafana
      securityContext:
        runAsNonRoot: true
        runAsUser: 472
        runAsGroup: 472
        fsGroup: 472
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: grafana
          image: {{ .Values.grafana.image }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.grafana.secretName" . }}
                  key: admin-user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.grafana.secretName" . }}
                  key: admin-password
            - name: GF_PLUGINS_ENABLE_ALPHA
              value: "false"
            - name: GF_PLUGINS_PLUGIN_ADMIN_ENABLED
              value: "false"
            {{- if and (eq (.Values.clickhouse.enabled | toString) "true") (eq (.Values.clickhouse.installGrafanaPlugin | toString) "true") }}
            - name: GF_INSTALL_PLUGINS
              value: grafana-clickhouse-datasource
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.clickhouse.secretName" . }}
                  key: CLICKHOUSE_PASSWORD
            {{- end }}
            - name: GF_ANALYTICS_CHECK_FOR_UPDATES
              value: "false"
            - name: GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES
              value: "false"
            {{- if eq (.Values.grafana.oauth.enabled | toString) "true" }}
            - name: GF_AUTH_GENERIC_OAUTH_ENABLED
              value: "true"
            - name: GF_AUTH_GENERIC_OAUTH_NAME
              value: {{ .Values.grafana.oauth.name | default "Forgejo" | quote }}
            - name: GF_AUTH_GENERIC_OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.grafana.secretName" . }}
                  key: oauth-client-id
            - name: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.grafana.secretName" . }}
                  key: oauth-client-secret
            - name: GF_AUTH_GENERIC_OAUTH_SCOPES
              value: {{ .Values.grafana.oauth.scopes | default "openid profile email" | quote }}
            - name: GF_AUTH_GENERIC_OAUTH_AUTH_URL
              value: {{ .Values.grafana.oauth.authUrl | quote }}
            - name: GF_AUTH_GENERIC_OAUTH_TOKEN_URL
              value: {{ .Values.grafana.oauth.tokenUrl | quote }}
            - name: GF_AUTH_GENERIC_OAUTH_API_URL
              value: {{ .Values.grafana.oauth.apiUrl | quote }}
            - name: GF_AUTH_GENERIC_OAUTH_AUTO_LOGIN
              value: {{ .Values.grafana.oauth.autoLogin | default false | toString | quote }}
            - name: GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP
              value: "true"
            - name: GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH
              value: "contains(realm_access.roles[*], 'admin') && 'Admin' || 'Editor'"
            - name: GF_SERVER_ROOT_URL
              value: "https://{{ .Values.grafana.host | default .Values.grafana.ingress.host }}"
            {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: storage
              mountPath: /var/lib/grafana
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
          resources:
            {{- toYaml .Values.grafana.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: tmp
          emptyDir: {}
        - name: storage
          persistentVolumeClaim:
            claimName: {{ include "schnappy.fullname" . }}-grafana
        - name: datasources
          configMap:
            name: {{ include "schnappy.fullname" . }}-grafana-datasources
        - name: dashboard-provider
          configMap:
            name: {{ include "schnappy.fullname" . }}-grafana-dashboard-provider
        - name: dashboards
          configMap:
            name: {{ include "schnappy.fullname" . }}-grafana-dashboards
{{- end }}
