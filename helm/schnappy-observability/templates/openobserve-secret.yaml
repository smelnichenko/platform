{{- if and .Values.openobserve.enabled (not .Values.openobserve.externalSecret.enabled) }}
# Inline Secret. Production deploys must set externalSecret.enabled=true
# so credentials come from Vault — this template stays out then.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "schnappy.openobserve.secretName" . }}
  labels:
    {{- include "schnappy.openobserve.labels" . | nindent 4 }}
type: Opaque
stringData:
  ZO_ROOT_USER_EMAIL: {{ .Values.openobserve.rootUserEmail | quote }}
  ZO_ROOT_USER_PASSWORD: {{ required "openobserve.rootUserPassword required when externalSecret.enabled=false" .Values.openobserve.rootUserPassword | quote }}
{{- end }}
