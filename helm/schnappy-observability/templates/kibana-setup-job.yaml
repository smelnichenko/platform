{{- if eq (.Values.elk.enabled | toString) "true" }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "schnappy.fullname" . }}-kibana-setup
  labels:
    {{- include "schnappy.kibana.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 10
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        {{- include "schnappy.kibana.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: kibana-setup
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "schnappy.fullname" . }}-kibana
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: setup-kibana-user
          image: curlimages/curl:8.18.0
          command:
            - sh
            - -c
            - |
              echo "Waiting for Elasticsearch..."
              until curl -sf -u "elastic:${ELASTIC_PASSWORD}" "http://{{ include "schnappy.elasticsearch.serviceName" . }}:9200/_cluster/health" >/dev/null 2>&1; do
                echo "ES not ready, retrying in 5s..."
                sleep 5
              done
              echo "Setting kibana_system password..."
              curl -sf -X POST -u "elastic:${ELASTIC_PASSWORD}" \
                -H "Content-Type: application/json" \
                "http://{{ include "schnappy.elasticsearch.serviceName" . }}:9200/_security/user/kibana_system/_password" \
                -d "{\"password\":\"${KIBANA_PASSWORD}\"}"
              echo ""
              echo "kibana_system password set."
              # Signal istio-proxy sidecar to exit (required for Job completion)
              curl -sf -X POST http://localhost:15020/quitquitquit || true
          env:
            - name: ELASTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.elasticsearch.secretName" . }}
                  key: ELASTICSEARCH_PASSWORD
            - name: KIBANA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.elasticsearch.secretName" . }}
                  key: KIBANA_PASSWORD
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
{{- end }}
