{{- if and .Values.prometheus.enabled (eq (.Values.alertmanager.enabled | toString) "true") -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "schnappy.fullname" . }}-alertmanager-config
  labels:
    {{- include "schnappy.alertmanager.labels" . | nindent 4 }}
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
      smtp_smarthost: '{{ .Values.alertmanager.smtp.host | default "smtp.resend.com" }}:{{ .Values.alertmanager.smtp.port | default "587" }}'
      smtp_from: '{{ .Values.alertmanager.alertEmailFrom }}'
      smtp_auth_username: '{{ .Values.alertmanager.smtp.username | default "resend" }}'
      smtp_auth_password_file: /etc/alertmanager/secrets/SMTP_PASSWORD
      smtp_require_tls: true
    route:
      receiver: resend-webhook
      group_by: ['alertname', 'namespace', 'pod']
      group_wait: {{ .Values.alertmanager.groupWait }}
      group_interval: {{ .Values.alertmanager.groupInterval }}
      repeat_interval: {{ .Values.alertmanager.repeatInterval }}
      routes:
        - match:
            alertname: AppDown
          receiver: email-direct
          continue: true
        - match:
            severity: critical
          repeat_interval: 1h
        - match:
            alertname: Watchdog
          receiver: 'null'
    receivers:
      - name: 'null'
      - name: resend-webhook
        webhook_configs:
          - url: 'http://{{ include "schnappy.monitor.serviceName" . }}:8080/api/webhooks/alertmanager'
            send_resolved: true
            http_config:
              bearer_token_file: /etc/alertmanager/secrets/ALERTMANAGER_WEBHOOK_SECRET
      - name: email-direct
        email_configs:
          - to: '{{ .Values.alertmanager.alertEmailTo }}'
            send_resolved: true
            headers:
              Subject: '{{`{{ template "email.default.subject" . }}`}}'
    inhibit_rules:
      - source_match:
          severity: critical
        target_match:
          severity: warning
        equal: ['alertname', 'namespace']
{{- end }}
