{{- if and .Values.prometheus.enabled (eq (.Values.alertmanager.enabled | toString) "true") -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "schnappy.fullname" . }}-alertmanager-config
  labels:
    {{- include "schnappy.alertmanager.labels" . | nindent 4 }}
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
      smtp_smarthost: '{{ .Values.alertmanager.smtp.host | default "smtp.resend.com" }}:{{ .Values.alertmanager.smtp.port | default "587" }}'
      smtp_from: '{{ .Values.alertmanager.alertEmailFrom }}'
      smtp_auth_username: '{{ .Values.alertmanager.smtp.username | default "resend" }}'
      smtp_auth_password_file: /etc/alertmanager/secrets/SMTP_PASSWORD
      smtp_require_tls: true
    route:
      receiver: email
      group_by: ['alertname', 'namespace', 'pod']
      group_wait: {{ .Values.alertmanager.groupWait }}
      group_interval: {{ .Values.alertmanager.groupInterval }}
      repeat_interval: {{ .Values.alertmanager.repeatInterval }}
      routes:
        - match:
            severity: critical
          repeat_interval: 1h
        - match:
            alertname: Watchdog
          receiver: 'null'
    receivers:
      - name: 'null'
      - name: email
        email_configs:
          - to: '{{ .Values.alertmanager.alertEmailTo }}'
            send_resolved: true
            headers:
              Subject: '{{`{{ if eq .Status "firing" }}🔥{{ else }}✅{{ end }} [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}`}}'
            html: '{{`{{ range .Alerts }}
            <div style="font-family:monospace;margin-bottom:16px;padding:12px;border:1px solid #ddd;border-radius:4px;{{ if eq .Status "firing" }}border-left:4px solid #d32f2f{{ else }}border-left:4px solid #388e3c{{ end }}">
              <strong>{{ .Labels.alertname }}</strong> — {{ .Labels.severity }}<br>
              <small>{{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}</small><br><br>
              {{ .Annotations.summary }}<br>
              <small style="color:#888">namespace={{ .Labels.namespace }} job={{ .Labels.job }}</small>
            </div>
            {{ end }}`}}'
    inhibit_rules:
      - source_match:
          severity: critical
        target_match:
          severity: warning
        equal: ['alertname', 'namespace']
{{- end }}
