{{- if and .Values.grafana.enabled (not .Values.grafana.existingSecret) -}}
{{- if not .Values.grafana.adminPassword }}
{{- fail "grafana.adminPassword is required. Set via --set grafana.adminPassword=XXX or use grafana.existingSecret" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "schnappy.grafana.secretName" . }}
  labels:
    {{- include "schnappy.grafana.labels" . | nindent 4 }}
type: Opaque
stringData:
  admin-user: {{ .Values.grafana.adminUser | quote }}
  admin-password: {{ .Values.grafana.adminPassword | quote }}
{{- end }}
