{{- if eq (.Values.keycloak.enabled | toString) "true" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "schnappy.keycloak.serviceName" . }}
  labels:
    {{- include "schnappy.keycloak.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "schnappy.keycloak.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "schnappy.keycloak.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: realm-init
          image: {{ .Values.keycloak.image }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              for f in /realm-templates/*.json; do
                sed -e "s|SMTP_PASSWORD_PLACEHOLDER|$KC_SMTP_PASSWORD|g" \
                    "$f" > "/opt/keycloak/data/import/$(basename $f)"
              done
          env:
            - name: KC_SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.mail.secretName" . }}
                  key: MAIL_PASSWORD
          volumeMounts:
            - name: realm-templates
              mountPath: /realm-templates
              readOnly: true
            - name: realm-import
              mountPath: /opt/keycloak/data/import
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      containers:
        - name: keycloak
          image: {{ .Values.keycloak.image }}
          args:
            - start
            - --import-realm
          env:
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: "jdbc:postgresql://{{ include "schnappy.postgres.serviceName" . }}:5432/keycloak"
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.postgres.secretName" . }}
                  key: POSTGRES_USER
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.postgres.secretName" . }}
                  key: POSTGRES_PASSWORD
            - name: KC_HOSTNAME
              value: {{ .Values.keycloak.hostname | quote }}
            - name: KC_PROXY_HEADERS
              value: xforwarded
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KC_METRICS_ENABLED
              value: "true"
            - name: KEYCLOAK_ADMIN
              value: {{ .Values.keycloak.adminUser | quote }}
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.keycloak.secretName" . }}
                  key: KEYCLOAK_ADMIN_PASSWORD
            - name: KC_SPI_THEME_WELCOME_THEME
              value: keycloak
            - name: KC_SPI_THEME_DEFAULT
              value: schnappy
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health/ready
              port: 9000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.keycloak.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: realm-import
              mountPath: /opt/keycloak/data/import
              readOnly: true
      volumes:
        - name: realm-templates
          configMap:
            name: {{ include "schnappy.keycloak.serviceName" . }}-realm
        - name: realm-import
          emptyDir: {}
{{- end }}
