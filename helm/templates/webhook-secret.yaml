{{- if and (eq (.Values.webhook.enabled | toString) "true") (not .Values.webhook.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "monitor.webhook.secretName" . }}
  labels:
    {{- include "monitor.app.labels" . | nindent 4 }}
type: Opaque
stringData:
  RESEND_WEBHOOK_SECRET: {{ .Values.webhook.signingSecret | quote }}
  RESEND_API_KEY: {{ .Values.webhook.apiKey | quote }}
{{- end }}
