{{- if eq (.Values.elk.enabled | toString) "true" }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "monitor.fullname" . }}-fluentbit
  labels:
    {{- include "monitor.fluentbit.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "monitor.fullname" . }}-fluentbit
  labels:
    {{- include "monitor.fluentbit.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources:
      - namespaces
      - pods
      - nodes
    verbs: ["get", "watch", "list"]
  - apiGroups: ["apps"]
    resources:
      - replicasets
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "monitor.fullname" . }}-fluentbit
  labels:
    {{- include "monitor.fluentbit.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "monitor.fullname" . }}-fluentbit
subjects:
  - kind: ServiceAccount
    name: {{ include "monitor.fullname" . }}-fluentbit
    namespace: {{ .Release.Namespace }}
{{- end }}
