{{- if eq (.Values.chessService.enabled | toString) "true" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "schnappy.chess.serviceName" . }}
  labels:
    {{- include "schnappy.chess.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.chessService.replicas }}
  selector:
    matchLabels:
      {{- include "schnappy.chess.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "schnappy.chess.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: chess
          image: "{{ .Values.chessService.image.repository }}:{{ .Values.chessService.image.tag }}"
          imagePullPolicy: {{ .Values.chessService.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          env:
            - name: JAVA_OPTS
              value: {{ .Values.chessService.javaOpts | default "-Xmx512m" | quote }}
            - name: DB_HOST
              value: {{ include "schnappy.postgres.serviceName" . }}
            - name: DB_NAME
              value: "monitor_chess"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.postgres.secretName" . }}
                  key: POSTGRES_USER
                  optional: true
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.postgres.secretName" . }}
                  key: POSTGRES_PASSWORD
            - name: REDIS_HOST
              value: {{ include "schnappy.redis.serviceName" . }}
            {{- if or .Values.redis.password .Values.redis.existingSecret }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.redis.secretName" . }}
                  key: REDIS_PASSWORD
            {{- end }}
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "{{ include "schnappy.kafka.serviceName" . }}:9092"
          resources:
            {{- toYaml .Values.chessService.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /api/actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/actuator/health/readiness
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
