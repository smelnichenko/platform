{{- if .Values.prometheus.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "schnappy.fullname" . }}-prometheus-config
  labels:
    {{- include "schnappy.prometheus.labels" . | nindent 4 }}
data:
  prometheus.yml: |
    global:
      scrape_interval: {{ .Values.prometheus.scrapeInterval }}
      evaluation_interval: {{ .Values.prometheus.scrapeInterval }}

    {{- if eq (.Values.alertmanager.enabled | toString) "true" }}
    alerting:
      alertmanagers:
        - static_configs:
            - targets: ['{{ include "schnappy.alertmanager.serviceName" . }}:9093']
    rule_files:
      - '/etc/prometheus/rules/*.yml'
    {{- end }}

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      - job_name: 'schnappy-app'
        metrics_path: '/api/actuator/prometheus'
        static_configs:
          - targets: ['{{ include "schnappy.monitor.serviceName" . }}:{{ .Values.app.service.port }}']
{{- if .Values.prometheus.vault.enabled }}
      - job_name: 'vault'
        metrics_path: '/v1/sys/metrics'
        params:
          format: ['prometheus']
        scheme: https
        tls_config:
          ca_file: /vault/tls/ca.crt
        bearer_token_file: /var/run/secrets/vault-metrics/token
        static_configs:
          - targets: ['vault.vault.svc:8200']
{{- end }}
      {{- if eq (.Values.kubeStateMetrics.enabled | toString) "true" }}
      - job_name: 'kube-state-metrics'
        static_configs:
          - targets: ['{{ include "schnappy.kubeStateMetrics.serviceName" . }}:8080']
      {{- end }}
      {{- if eq (.Values.prometheus.woodpecker.enabled | toString) "true" }}
      - job_name: 'woodpecker'
        static_configs:
          - targets: ['woodpecker-server.woodpecker.svc:80']
      {{- end }}
      {{- if eq (.Values.prometheus.forgejo.enabled | toString) "true" }}
      - job_name: 'forgejo'
        metrics_path: '/metrics'
        static_configs:
          - targets: ['forgejo-http.forgejo.svc:3000']
      {{- end }}
{{- end }}
