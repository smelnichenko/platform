{{- if eq (.Values.keycloak.enabled | toString) "true" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "schnappy.fullname" . }}-keycloak-theme
  labels:
    {{- include "schnappy.keycloak.labels" . | nindent 4 }}
data:
  theme.properties: |
    parent=keycloak
    import=common/keycloak
    styles=css/login.css css/schnappy.css
    locales=en
  schnappy.css: |
    /* Schnappy Keycloak Theme */
    html body.login-pf {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%) !important;
      background-image: none !important;
      background-size: cover !important;
      min-height: 100vh;
    }
    .login-pf-page,
    .login-pf body {
      background: none !important;
      background-image: none !important;
    }
    .card-pf {
      border-radius: 12px !important;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3) !important;
      border: none !important;
    }
    .login-pf-page-header #kc-header-wrapper,
    #kc-header-wrapper {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif !important;
      font-size: 1.8rem !important;
      font-weight: 300 !important;
      letter-spacing: 0.15em !important;
      text-transform: uppercase !important;
      color: #e0e0e0 !important;
      padding-bottom: 20px !important;
    }
    input[type="submit"],
    .pf-c-button.pf-m-primary,
    #kc-login,
    .btn-primary {
      background-color: #2563eb !important;
      border-color: #2563eb !important;
      border-radius: 6px !important;
      font-weight: 500 !important;
      padding: 10px 16px !important;
    }
    input[type="submit"]:hover,
    .pf-c-button.pf-m-primary:hover,
    #kc-login:hover,
    .btn-primary:hover {
      background-color: #1d4ed8 !important;
      border-color: #1d4ed8 !important;
    }
    .card-pf a { color: #2563eb !important; }
    .card-pf a:hover { color: #1d4ed8 !important; }
    .pf-c-form-control,
    input[type="text"],
    input[type="password"],
    input[type="email"] {
      border-radius: 6px !important;
      border: 1px solid #d1d5db !important;
      padding: 10px 12px !important;
    }
    .pf-c-form-control:focus,
    input:focus {
      border-color: #2563eb !important;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2) !important;
    }
    .alert-error, .pf-m-danger {
      border-radius: 6px !important;
      background-color: #fef2f2 !important;
      border-color: #fecaca !important;
      color: #991b1b !important;
    }
    #kc-info-wrapper { display: none !important; }
    .login-pf-header h1, #kc-page-title {
      font-weight: 400 !important;
      color: #333 !important;
    }
{{- end }}
