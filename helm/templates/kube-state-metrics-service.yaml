{{- if and .Values.prometheus.enabled (eq (.Values.kubeStateMetrics.enabled | toString) "true") -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "monitor.kubeStateMetrics.serviceName" . }}
  labels:
    {{- include "monitor.kubeStateMetrics.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: metrics
  selector:
    {{- include "monitor.kubeStateMetrics.selectorLabels" . | nindent 4 }}
{{- end }}
