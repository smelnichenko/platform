{{- if eq (.Values.keycloak.enabled | toString) "true" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "schnappy.keycloak.serviceName" . }}
  labels:
    {{- include "schnappy.keycloak.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "schnappy.keycloak.selectorLabels" . | nindent 4 }}
{{- end }}
