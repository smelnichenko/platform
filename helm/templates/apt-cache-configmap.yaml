{{- if eq (.Values.aptCache.enabled | toString) "true" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "monitor.fullname" . }}-apt-cache
  labels:
    {{- include "monitor.aptCache.labels" . | nindent 4 }}
data:
  zzz_custom.conf: |
    CacheDir: /var/cache/apt-cacher-ng
    Port: 3142
    BindAddress: 0.0.0.0
    ExTreshold: 30
    PassThroughPattern: .*
{{- end }}
