{{- if eq (.Values.admin.enabled | toString) "true" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "monitor.admin.serviceName" . }}
  labels:
    {{- include "monitor.admin.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.admin.replicas }}
  selector:
    matchLabels:
      {{- include "monitor.admin.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "monitor.admin.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: admin
          image: "{{ .Values.admin.image.repository }}:{{ .Values.admin.image.tag }}"
          imagePullPolicy: {{ .Values.admin.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          env:
            - name: JAVA_OPTS
              value: {{ .Values.admin.javaOpts | default "-Xmx512m" | quote }}
            - name: DB_HOST
              value: {{ include "monitor.postgres.serviceName" . }}
            - name: DB_NAME
              value: "monitor_admin"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "monitor.postgres.secretName" . }}
                  key: username
                  optional: true
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "monitor.postgres.secretName" . }}
                  key: password
            - name: REDIS_HOST
              value: {{ include "monitor.redis.serviceName" . }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "monitor.auth.secretName" . }}
                  key: jwt-secret
            - name: TOKEN_EXPIRATION
              value: {{ .Values.auth.tokenExpiration | default "1h" | quote }}
            - name: REGISTRATION_ENABLED
              value: {{ .Values.auth.registrationEnabled | default true | toString | quote }}
            - name: SECURE_COOKIES
              value: {{ .Values.auth.secureCookies | default true | toString | quote }}
            - name: REGISTRATION_APPROVAL_MODE
              value: {{ .Values.auth.registrationApproval.mode | default "ai" | quote }}
            - name: REGISTRATION_APPROVAL_CRITERIA
              value: {{ .Values.auth.registrationApproval.criteria | default "" | quote }}
            - name: REGISTRATION_APPROVAL_DEFAULT_GROUP
              value: {{ .Values.auth.registrationApproval.defaultGroup | default "Users" | quote }}
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "{{ include "monitor.kafka.serviceName" . }}:9092"
            {{- if eq (.Values.mail.enabled | toString) "true" }}
            - name: MAIL_ENABLED
              value: "true"
            - name: MAIL_FROM
              value: {{ .Values.mail.fromAddress | default "noreply@example.com" | quote }}
            - name: APP_URL
              value: {{ .Values.mail.appUrl | default "http://localhost:3000" | quote }}
            - name: SPRING_MAIL_HOST
              value: {{ .Values.mail.host | default "smtp.gmail.com" | quote }}
            - name: SPRING_MAIL_PORT
              value: {{ .Values.mail.port | default "587" | quote }}
            - name: SPRING_MAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "monitor.mail.secretName" . }}
                  key: username
            - name: SPRING_MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "monitor.mail.secretName" . }}
                  key: password
            {{- end }}
            {{- if eq (.Values.ai.enabled | toString) "true" }}
            - name: AI_ENABLED
              value: "true"
            - name: AI_MODEL
              value: {{ .Values.ai.model | default "claude-sonnet-4-5-20250929" | quote }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "monitor.ai.secretName" . }}
                  key: api-key
            {{- end }}
            {{- if eq (.Values.captcha.enabled | toString) "true" }}
            - name: CAPTCHA_ENABLED
              value: "true"
            {{- end }}
          resources:
            {{- toYaml .Values.admin.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
