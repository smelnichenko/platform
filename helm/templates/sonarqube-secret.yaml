{{- if and (eq (.Values.sonarqube.enabled | toString) "true") (not .Values.sonarqube.existingSecret) }}
{{- if not .Values.sonarqube.postgres.password }}
{{- fail "sonarqube.postgres.password is required. Set via --set sonarqube.postgres.password=XXX or use sonarqube.existingSecret" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "schnappy.sonarqube.secretName" . }}
  labels:
    {{- include "schnappy.sonarqube.labels" . | nindent 4 }}
type: Opaque
stringData:
  SONARQUBE_POSTGRES_PASSWORD: {{ .Values.sonarqube.postgres.password | quote }}
  {{- if .Values.sonarqube.adminPassword }}
  SONARQUBE_ADMIN_PASSWORD: {{ .Values.sonarqube.adminPassword | quote }}
  {{- end }}
  {{- if .Values.sonarqube.token }}
  SONARQUBE_TOKEN: {{ .Values.sonarqube.token | quote }}
  {{- end }}
{{- end }}
