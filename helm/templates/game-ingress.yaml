{{- if and .Values.game.enabled .Values.app.ingress.enabled -}}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "monitor.fullname" . }}-game-strip
  labels:
    {{- include "monitor.game.labels" . | nindent 4 }}
spec:
  stripPrefix:
    prefixes:
      - /game
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "monitor.fullname" . }}-game
  labels:
    {{- include "monitor.game.labels" . | nindent 4 }}
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: {{ .Release.Namespace }}-{{ include "monitor.fullname" . }}-game-strip@kubernetescrd
    {{- if and .Values.app.ingress.tls .Values.app.ingress.tls.enabled }}
    cert-manager.io/cluster-issuer: {{ .Values.app.ingress.tls.clusterIssuer | default "letsencrypt-prod" }}
    {{- end }}
spec:
  {{- if .Values.app.ingress.className }}
  ingressClassName: {{ .Values.app.ingress.className }}
  {{- end }}
  rules:
    - host: {{ .Values.app.ingress.host }}
      http:
        paths:
          - path: /game
            pathType: Prefix
            backend:
              service:
                name: {{ include "monitor.game.serviceName" . }}
                port:
                  number: {{ .Values.game.service.port }}
  {{- if and .Values.app.ingress.tls .Values.app.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.app.ingress.host }}
      secretName: {{ .Values.app.ingress.tls.secretName | default (printf "%s-tls" (include "monitor.fullname" .)) }}
  {{- end }}
{{- end }}
