{{- $root := . -}}
{{- if and .Values.games .Values.app.ingress.enabled -}}
{{- range .Values.games }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "schnappy.fullname" $root }}-{{ .name }}
  labels:
    {{- include "schnappy.labels" $root | nindent 4 }}
    app.kubernetes.io/component: {{ .name }}
  annotations:
    {{- if and $root.Values.app.ingress.tls $root.Values.app.ingress.tls.enabled }}
    cert-manager.io/cluster-issuer: {{ $root.Values.app.ingress.tls.clusterIssuer | default "letsencrypt-prod" }}
    {{- end }}
spec:
  {{- if $root.Values.app.ingress.className }}
  ingressClassName: {{ $root.Values.app.ingress.className }}
  {{- end }}
  rules:
    - host: {{ $root.Values.app.ingress.host }}
      http:
        paths:
          - path: /{{ .path | default .name }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "schnappy.fullname" $root }}-{{ .name }}
                port:
                  number: {{ .port | default $root.Values.gameDefaults.port }}
  {{- if and $root.Values.app.ingress.tls $root.Values.app.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ $root.Values.app.ingress.host }}
      secretName: {{ $root.Values.app.ingress.tls.secretName | default (printf "%s-tls" (include "schnappy.fullname" $root)) }}
  {{- end }}
{{- end }}
{{- end }}
