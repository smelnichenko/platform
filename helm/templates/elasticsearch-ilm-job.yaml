{{- if eq (.Values.elk.enabled | toString) "true" }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "monitor.fullname" . }}-es-ilm-setup-{{ .Release.Revision }}
  labels:
    {{- include "monitor.elasticsearch.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-upgrade,post-install
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 5
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        {{- include "monitor.esIlmJob.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: ilm-setup
          image: curlimages/curl:8.11.0
          env:
            - name: ES_URL
              value: "http://{{ include "monitor.elasticsearch.serviceName" . }}.{{ .Release.Namespace }}.svc:9200"
            - name: ES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "monitor.elasticsearch.secretName" . }}
                  key: ELASTICSEARCH_PASSWORD
          command:
            - /bin/sh
            - -c
            - |
              set -e

              # Wait for Elasticsearch to be ready
              until curl -sf -u "elastic:${ES_PASSWORD}" "${ES_URL}/_cluster/health?wait_for_status=yellow&timeout=30s"; do
                echo "Waiting for Elasticsearch..."
                sleep 5
              done
              echo ""

              # Create ILM policy for pod logs ({{ .Values.elk.elasticsearch.retention.days }}d retention)
              curl -sf -u "elastic:${ES_PASSWORD}" -X PUT "${ES_URL}/_ilm/policy/logs-{{ .Values.elk.elasticsearch.retention.days }}d-retention" \
                -H 'Content-Type: application/json' -d '
              {
                "policy": {
                  "phases": {
                    "hot": {
                      "actions": {
                        "rollover": {
                          "max_age": "1d",
                          "max_primary_shard_size": "5gb"
                        }
                      }
                    },
                    "delete": {
                      "min_age": "{{ .Values.elk.elasticsearch.retention.days }}d",
                      "actions": { "delete": {} }
                    }
                  }
                }
              }'
              echo ""
              echo "Created pod logs ILM policy ({{ .Values.elk.elasticsearch.retention.days }}d retention)"

              # Create index template for filebeat-* (pod logs)
              curl -sf -u "elastic:${ES_PASSWORD}" -X PUT "${ES_URL}/_index_template/filebeat" \
                -H 'Content-Type: application/json' -d '
              {
                "index_patterns": ["filebeat-*"],
                "template": {
                  "settings": {
                    "number_of_shards": 1,
                    "number_of_replicas": 0,
                    "index.lifecycle.name": "logs-{{ .Values.elk.elasticsearch.retention.days }}d-retention"
                  }
                }
              }'
              echo ""
              echo "Created filebeat-* index template"

{{- if eq (.Values.elk.ciLogs.enabled | toString) "true" }}
              # Create ILM policy for CI logs ({{ .Values.elk.ciLogs.retention.days }}d retention)
              curl -sf -u "elastic:${ES_PASSWORD}" -X PUT "${ES_URL}/_ilm/policy/ci-logs-{{ .Values.elk.ciLogs.retention.days }}d-retention" \
                -H 'Content-Type: application/json' -d '
              {
                "policy": {
                  "phases": {
                    "hot": {
                      "actions": {
                        "rollover": {
                          "max_age": "1d",
                          "max_primary_shard_size": "1gb"
                        }
                      }
                    },
                    "delete": {
                      "min_age": "{{ .Values.elk.ciLogs.retention.days }}d",
                      "actions": { "delete": {} }
                    }
                  }
                }
              }'
              echo ""
              echo "Created CI logs ILM policy ({{ .Values.elk.ciLogs.retention.days }}d retention)"

              # Create index template for ci-logs-*
              curl -sf -u "elastic:${ES_PASSWORD}" -X PUT "${ES_URL}/_index_template/ci-logs" \
                -H 'Content-Type: application/json' -d '
              {
                "index_patterns": ["ci-logs-*"],
                "template": {
                  "settings": {
                    "number_of_shards": 1,
                    "number_of_replicas": 0,
                    "index.lifecycle.name": "ci-logs-{{ .Values.elk.ciLogs.retention.days }}d-retention"
                  }
                }
              }'
              echo ""
              echo "Created ci-logs-* index template"
{{- end }}

              echo "ILM setup complete"
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
{{- end }}
