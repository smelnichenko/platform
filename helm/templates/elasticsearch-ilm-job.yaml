{{- if eq (.Values.elk.enabled | toString) "true" }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "monitor.fullname" . }}-es-ilm-setup-{{ .Release.Revision }}
  labels:
    {{- include "monitor.elasticsearch.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-upgrade,post-install
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 5
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        {{- include "monitor.esIlmJob.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: ilm-setup
          image: curlimages/curl:8.11.0
          env:
            - name: ES_URL
              value: "http://{{ include "monitor.elasticsearch.serviceName" . }}.{{ .Release.Namespace }}.svc:9200"
            - name: ES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "monitor.elasticsearch.secretName" . }}
                  key: ELASTICSEARCH_PASSWORD
          command:
            - /bin/sh
            - -c
            - |
              FAIL=0
              es_curl() { curl -s -u "elastic:${ES_PASSWORD}" "$@"; }

              # Wait for Elasticsearch to be ready
              until es_curl -f "${ES_URL}/_cluster/health?wait_for_status=yellow&timeout=30s" >/dev/null; do
                echo "Waiting for Elasticsearch..."
                sleep 5
              done
              echo "Elasticsearch ready"

              # Create ILM policy for pod logs ({{ .Values.elk.elasticsearch.retention.days }}d retention)
              RESP=$(es_curl -X PUT "${ES_URL}/_ilm/policy/logs-{{ .Values.elk.elasticsearch.retention.days }}d-retention" \
                -H 'Content-Type: application/json' -d '{
                "policy": {
                  "phases": {
                    "hot": { "actions": { "rollover": { "max_age": "1d", "max_primary_shard_size": "5gb" } } },
                    "delete": { "min_age": "{{ .Values.elk.elasticsearch.retention.days }}d", "actions": { "delete": {} } }
                  }
                }
              }')
              echo "ILM logs-{{ .Values.elk.elasticsearch.retention.days }}d-retention: ${RESP}"

              # Clean up old Filebeat data streams and templates (replaced by Fluent-bit)
              es_curl -X DELETE "${ES_URL}/_data_stream/filebeat-*" >/dev/null 2>&1 || true
              es_curl -X DELETE "${ES_URL}/_index_template/filebeat-8.17.4" >/dev/null 2>&1 || true
              es_curl -X DELETE "${ES_URL}/_index_template/filebeat" >/dev/null 2>&1 || true

              # Create index template for podlogs-* (pod logs)
              RESP=$(es_curl -X PUT "${ES_URL}/_index_template/fluentbit-pods" \
                -H 'Content-Type: application/json' -d '{
                "index_patterns": ["podlogs-*"],
                "priority": 200,
                "template": {
                  "settings": {
                    "number_of_shards": 1,
                    "number_of_replicas": 0,
                    "index.lifecycle.name": "logs-{{ .Values.elk.elasticsearch.retention.days }}d-retention"
                  }
                }
              }')
              echo "Index template fluentbit-pods: ${RESP}"
              echo "${RESP}" | grep -q '"acknowledged":true' || FAIL=1

{{- if eq (.Values.elk.ciLogs.enabled | toString) "true" }}
              # Create ILM policy for CI logs ({{ .Values.elk.ciLogs.retention.days }}d retention)
              RESP=$(es_curl -X PUT "${ES_URL}/_ilm/policy/ci-logs-{{ .Values.elk.ciLogs.retention.days }}d-retention" \
                -H 'Content-Type: application/json' -d '{
                "policy": {
                  "phases": {
                    "hot": { "actions": { "rollover": { "max_age": "1d", "max_primary_shard_size": "1gb" } } },
                    "delete": { "min_age": "{{ .Values.elk.ciLogs.retention.days }}d", "actions": { "delete": {} } }
                  }
                }
              }')
              echo "ILM ci-logs-{{ .Values.elk.ciLogs.retention.days }}d-retention: ${RESP}"

              # Create index template for ci-logs-*
              RESP=$(es_curl -X PUT "${ES_URL}/_index_template/fluentbit-ci" \
                -H 'Content-Type: application/json' -d '{
                "index_patterns": ["ci-logs-*"],
                "priority": 200,
                "template": {
                  "settings": {
                    "number_of_shards": 1,
                    "number_of_replicas": 0,
                    "index.lifecycle.name": "ci-logs-{{ .Values.elk.ciLogs.retention.days }}d-retention"
                  }
                }
              }')
              echo "Index template fluentbit-ci: ${RESP}"
              echo "${RESP}" | grep -q '"acknowledged":true' || FAIL=1
{{- end }}

              if [ "$FAIL" = "0" ]; then
                echo "ILM setup complete"
              else
                echo "ILM setup had errors — check output above"
                exit 1
              fi
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
{{- end }}
