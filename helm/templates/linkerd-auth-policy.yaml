{{- if and (eq (.Values.linkerd.enabled | toString) "true") (eq (.Values.linkerd.authorizationPolicy | toString) "true") }}
# Linkerd Server + ServerAuthorization CRDs
# Enforce which services can talk to which using mTLS identity (ServiceAccounts)
---
# App (core backend) — only gateway can reach it
apiVersion: policy.linkerd.io/v1beta3
kind: Server
metadata:
  name: {{ include "schnappy.monitor.serviceName" . }}
  labels:
    {{- include "schnappy.monitor.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "schnappy.monitor.selectorLabels" . | nindent 6 }}
  port: 8080
---
apiVersion: policy.linkerd.io/v1beta3
kind: ServerAuthorization
metadata:
  name: {{ include "schnappy.monitor.serviceName" . }}-allow
  labels:
    {{- include "schnappy.monitor.labels" . | nindent 4 }}
spec:
  server:
    name: {{ include "schnappy.monitor.serviceName" . }}
  client:
    meshTLS:
      serviceAccounts:
        - name: default
          namespace: {{ .Release.Namespace }}
    {{- if eq (.Values.gateway.enabled | toString) "true" }}
    # Allow gateway to reach core
    # (gateway runs as default SA in monitor namespace)
    {{- end }}
    # Allow Prometheus scraping
    {{- if .Values.prometheus.enabled }}
    unauthenticated: true
    {{- end }}
{{- if eq (.Values.admin.enabled | toString) "true" }}
