{{- if eq (.Values.gateway.enabled | toString) "true" }}
---
# Gateway — only Traefik (ingress) can reach it
apiVersion: policy.linkerd.io/v1beta3
kind: Server
metadata:
  name: {{ include "schnappy.gateway.serviceName" . }}
  labels:
    {{- include "schnappy.gateway.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "schnappy.gateway.selectorLabels" . | nindent 6 }}
  port: 8080
---
apiVersion: policy.linkerd.io/v1beta3
kind: ServerAuthorization
metadata:
  name: {{ include "schnappy.gateway.serviceName" . }}-allow
  labels:
    {{- include "schnappy.gateway.labels" . | nindent 4 }}
spec:
  server:
    name: {{ include "schnappy.gateway.serviceName" . }}
  client:
    # Traefik is not meshed — allow unauthenticated for ingress traffic
    unauthenticated: true
{{- end }}
