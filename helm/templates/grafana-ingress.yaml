{{- if and .Values.grafana.enabled .Values.grafana.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "schnappy.fullname" . }}-grafana
  labels:
    {{- include "schnappy.grafana.labels" . | nindent 4 }}
  {{- if and .Values.grafana.ingress.tls .Values.grafana.ingress.tls.enabled }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.grafana.ingress.tls.clusterIssuer | default "letsencrypt-prod" }}
  {{- end }}
spec:
  {{- if .Values.grafana.ingress.className }}
  ingressClassName: {{ .Values.grafana.ingress.className }}
  {{- end }}
  {{- if and .Values.grafana.ingress.tls .Values.grafana.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.grafana.ingress.host }}
      {{- if .Values.grafana.ingress.tls.secretName }}
      secretName: {{ .Values.grafana.ingress.tls.secretName }}
      {{- end }}
  {{- end }}
  rules:
    - {{ if .Values.grafana.ingress.host }}host: {{ .Values.grafana.ingress.host }}{{ end }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "schnappy.fullname" . }}-grafana
                port:
                  number: {{ .Values.grafana.service.port }}
{{- end }}
