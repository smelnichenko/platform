{{- if eq (.Values.kafka.enabled | toString) "true" }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "monitor.kafka.serviceName" . }}-topics
  labels:
    {{- include "monitor.kafka.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka-job
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      restartPolicy: OnFailure
      containers:
        - name: kafka-topics
          image: {{ .Values.kafka.image }}
          command:
            - sh
            - -c
            - |
              echo "Waiting for Kafka to be ready..."
              until /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server {{ include "monitor.kafka.serviceName" . }}:9092 >/dev/null 2>&1; do
                echo "Kafka not ready, retrying in 5s..."
                sleep 5
              done
              echo "Kafka is ready. Creating topics..."
              {{- range .Values.kafka.topics }}
              /opt/kafka/bin/kafka-topics.sh --bootstrap-server {{ include "monitor.kafka.serviceName" $ }}:9092 --create --if-not-exists --topic {{ .name }} --partitions {{ .partitions }} --replication-factor {{ .replicationFactor }}
              {{- end }}
              echo "Topics created successfully."
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
{{- end }}
