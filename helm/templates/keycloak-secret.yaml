{{- if and (eq (.Values.keycloak.enabled | toString) "true") (not .Values.keycloak.existingSecret) }}
{{- if not .Values.keycloak.dbPassword }}
{{- fail "keycloak.dbPassword is required. Set via --set keycloak.dbPassword=XXX or use keycloak.existingSecret" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "schnappy.keycloak.secretName" . }}
  labels:
    {{- include "schnappy.keycloak.labels" . | nindent 4 }}
type: Opaque
stringData:
  KEYCLOAK_DB_PASSWORD: {{ .Values.keycloak.dbPassword | quote }}
  {{- if .Values.keycloak.adminPassword }}
  KEYCLOAK_ADMIN_PASSWORD: {{ .Values.keycloak.adminPassword | quote }}
  {{- end }}
{{- end }}
