{{- if .Values.vault.secretsEnabled }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "schnappy.auth.secretName" . }}
  labels:
    {{- include "schnappy.monitor.labels" . | nindent 4 }}
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: {{ include "schnappy.auth.secretName" . }}
  data:
    - secretKey: JWT_SECRET
      remoteRef:
        key: secret/data/schnappy/auth
        property: jwt_secret
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "schnappy.postgres.secretName" . }}
  labels:
    {{- include "schnappy.postgres.labels" . | nindent 4 }}
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: {{ include "schnappy.postgres.secretName" . }}
  data:
    - secretKey: POSTGRES_DB
      remoteRef:
        key: secret/data/schnappy/postgres
        property: database
    - secretKey: POSTGRES_USER
      remoteRef:
        key: secret/data/schnappy/postgres
        property: username
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: secret/data/schnappy/postgres
        property: password
