{{- if .Values.vault.secretsEnabled }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "monitor.auth.secretName" . }}
  labels:
    {{- include "monitor.app.labels" . | nindent 4 }}
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: {{ include "monitor.auth.secretName" . }}
  data:
    - secretKey: JWT_SECRET
      remoteRef:
        key: secret/data/monitor/auth
        property: jwt_secret
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "monitor.postgres.secretName" . }}
  labels:
    {{- include "monitor.postgres.labels" . | nindent 4 }}
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: {{ include "monitor.postgres.secretName" . }}
  data:
    - secretKey: POSTGRES_DB
      remoteRef:
        key: secret/data/monitor/postgres
        property: database
    - secretKey: POSTGRES_USER
      remoteRef:
        key: secret/data/monitor/postgres
        property: username
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: secret/data/monitor/postgres
        property: password
