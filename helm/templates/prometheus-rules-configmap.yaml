{{- if and .Values.prometheus.enabled (eq (.Values.alertmanager.enabled | toString) "true") -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "monitor.fullname" . }}-prometheus-rules
  labels:
    {{- include "monitor.prometheus.labels" . | nindent 4 }}
data:
  infrastructure.yml: |
    groups:
      - name: infrastructure
        rules:
          - alert: PodRestartingFrequently
            expr: increase(kube_pod_container_status_restarts_total[1h]) > 3
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ "{{" }} $labels.namespace {{ "}}" }}/{{ "{{" }} $labels.pod {{ "}}" }} restarting frequently"
              description: "Pod has restarted {{ "{{" }} $value {{ "}}" }} times in the last hour."
          - alert: ContainerOOMKilled
            expr: kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
            labels:
              severity: critical
            annotations:
              summary: "Container {{ "{{" }} $labels.container {{ "}}" }} in {{ "{{" }} $labels.namespace {{ "}}" }}/{{ "{{" }} $labels.pod {{ "}}" }} was OOM killed"
              description: "Container was terminated due to out of memory."
          - alert: PodCrashLoopBackOff
            expr: kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"} == 1
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ "{{" }} $labels.namespace {{ "}}" }}/{{ "{{" }} $labels.pod {{ "}}" }} in CrashLoopBackOff"
              description: "Pod has been in CrashLoopBackOff for more than 5 minutes."
          - alert: PodNotReady
            expr: kube_pod_status_ready{condition="true"} == 0
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ "{{" }} $labels.namespace {{ "}}" }}/{{ "{{" }} $labels.pod {{ "}}" }} not ready"
              description: "Pod has been not ready for more than 10 minutes."
          - alert: Watchdog
            expr: vector(1)
            labels:
              severity: none
            annotations:
              summary: "Watchdog alert (always firing)"
              description: "This is a dead man's switch alert. If this alert is NOT firing, the alerting pipeline is broken."

  resources.yml: |
    groups:
      - name: resources
        rules:
          - alert: ContainerMemoryHigh
            expr: container_memory_working_set_bytes / container_spec_memory_limit_bytes > 0.85
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Container {{ "{{" }} $labels.namespace {{ "}}" }}/{{ "{{" }} $labels.pod {{ "}}" }}/{{ "{{" }} $labels.container {{ "}}" }} memory usage high"
              description: "Container memory usage is above 85% of limit ({{ "{{" }} $value | humanizePercentage {{ "}}" }})."
          - alert: ContainerCPUHigh
            expr: rate(container_cpu_usage_seconds_total[5m]) / container_spec_cpu_quota * container_spec_cpu_period > 0.9
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: "Container {{ "{{" }} $labels.namespace {{ "}}" }}/{{ "{{" }} $labels.pod {{ "}}" }}/{{ "{{" }} $labels.container {{ "}}" }} CPU usage high"
              description: "Container CPU usage is above 90% of limit."
          - alert: PVCUsageHigh
            expr: kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes > 0.8
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "PVC {{ "{{" }} $labels.namespace {{ "}}" }}/{{ "{{" }} $labels.persistentvolumeclaim {{ "}}" }} usage high"
              description: "PVC usage is above 80% ({{ "{{" }} $value | humanizePercentage {{ "}}" }})."
          - alert: PVCUsageCritical
            expr: kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes > 0.9
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "PVC {{ "{{" }} $labels.namespace {{ "}}" }}/{{ "{{" }} $labels.persistentvolumeclaim {{ "}}" }} usage critical"
              description: "PVC usage is above 90% ({{ "{{" }} $value | humanizePercentage {{ "}}" }})."

  application.yml: |
    groups:
      - name: application
        rules:
          - alert: HighHTTPErrorRate
            expr: sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) / sum(rate(http_server_requests_seconds_count[5m])) > 0.05
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "High HTTP 5xx error rate"
              description: "More than 5% of HTTP requests are returning 5xx errors ({{ "{{" }} $value | humanizePercentage {{ "}}" }})."
          - alert: HighRequestLatency
            expr: histogram_quantile(0.99, sum(rate(http_server_requests_seconds_bucket[5m])) by (le)) > 5
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "High request latency (p99 > 5s)"
              description: "99th percentile request latency is above 5 seconds ({{ "{{" }} $value | humanizeDuration {{ "}}" }})."
          - alert: AppDown
            expr: up{job="monitor-app"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Monitor app is down"
              description: "The monitor application has been unreachable for more than 2 minutes."
          - alert: HikariPoolExhausted
            expr: hikaricp_connections_active / hikaricp_connections_max > 0.8
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "HikariCP connection pool nearly exhausted"
              description: "HikariCP active connections are above 80% of max ({{ "{{" }} $value | humanizePercentage {{ "}}" }})."
          - alert: JVMHeapHigh
            expr: jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"} > 0.85
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "JVM heap usage high"
              description: "JVM heap usage is above 85% ({{ "{{" }} $value | humanizePercentage {{ "}}" }})."

  kafka.yml: |
    groups:
      - name: kafka
        rules:
          - alert: KafkaBrokerDown
            expr: kube_pod_status_ready{condition="true", pod=~".*kafka.*"} == 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Kafka broker {{ "{{" }} $labels.pod {{ "}}" }} is down"
              description: "Kafka broker pod has been not ready for more than 5 minutes."

  database.yml: |
    groups:
      - name: database
        rules:
          - alert: PostgreSQLDown
            expr: kube_pod_status_ready{condition="true", pod=~".*postgres.*"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "PostgreSQL {{ "{{" }} $labels.pod {{ "}}" }} is down"
              description: "PostgreSQL pod has been not ready for more than 2 minutes."
          - alert: DatabaseConnectionPoolExhausted
            expr: hikaricp_connections_active / hikaricp_connections_max > 0.9
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Database connection pool nearly exhausted"
              description: "HikariCP active connections are above 90% of max ({{ "{{" }} $value | humanizePercentage {{ "}}" }})."
          - alert: DatabaseConnectionsPending
            expr: hikaricp_connections_pending > 5
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Database connections pending"
              description: "More than 5 database connections are pending ({{ "{{" }} $value {{ "}}" }})."
          - alert: ScyllaDBDown
            expr: kube_pod_status_ready{condition="true", pod=~".*scylla.*"} == 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "ScyllaDB {{ "{{" }} $labels.pod {{ "}}" }} is down"
              description: "ScyllaDB pod has been not ready for more than 5 minutes."

  certificates.yml: |
    groups:
      - name: certificates
        rules:
          - alert: CertExpiringIn30Days
            expr: certmanager_certificate_expiration_timestamp_seconds - time() < 30 * 24 * 3600
            for: 1h
            labels:
              severity: warning
            annotations:
              summary: "Certificate {{ "{{" }} $labels.namespace {{ "}}" }}/{{ "{{" }} $labels.name {{ "}}" }} expiring in less than 30 days"
              description: "Certificate expires in {{ "{{" }} $value | humanizeDuration {{ "}}" }}."
          - alert: CertExpiringIn7Days
            expr: certmanager_certificate_expiration_timestamp_seconds - time() < 7 * 24 * 3600
            for: 30m
            labels:
              severity: critical
            annotations:
              summary: "Certificate {{ "{{" }} $labels.namespace {{ "}}" }}/{{ "{{" }} $labels.name {{ "}}" }} expiring in less than 7 days"
              description: "Certificate expires in {{ "{{" }} $value | humanizeDuration {{ "}}" }}."

  backups.yml: |
    groups:
      - name: backups
        rules:
          - alert: PostgresBackupFailed
            expr: kube_job_status_failed{job_name=~".*postgres-backup.*"} > 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "PostgreSQL backup job failed"
              description: "The PostgreSQL backup CronJob has failed."
          - alert: PostgresBackupMissed
            expr: time() - kube_job_status_completion_time{job_name=~".*postgres-backup.*"} > 26 * 3600
            for: 1h
            labels:
              severity: warning
            annotations:
              summary: "PostgreSQL backup missed"
              description: "No successful PostgreSQL backup in the last 26 hours."

  elk.yml: |
    groups:
      - name: elk
        rules:
          - alert: ElasticsearchDown
            expr: kube_pod_status_ready{condition="true", pod=~".*elasticsearch.*"} == 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Elasticsearch {{ "{{" }} $labels.pod {{ "}}" }} is down"
              description: "Elasticsearch pod has been not ready for more than 5 minutes."
          - alert: FluentbitDown
            expr: kube_pod_status_ready{condition="true", pod=~".*fluentbit.*"} == 0
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Fluent-bit {{ "{{" }} $labels.pod {{ "}}" }} is down"
              description: "Fluent-bit pod has been not ready for more than 10 minutes."
          - alert: KibanaDown
            expr: kube_pod_status_ready{condition="true", pod=~".*kibana.*"} == 0
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Kibana {{ "{{" }} $labels.pod {{ "}}" }} is down"
              description: "Kibana pod has been not ready for more than 10 minutes."
{{- end }}
