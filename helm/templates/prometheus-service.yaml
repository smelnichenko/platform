{{- if .Values.prometheus.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "schnappy.prometheus.serviceName" . }}
  labels:
    {{- include "schnappy.prometheus.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: 9090
      protocol: TCP
      name: http
  selector:
    {{- include "schnappy.prometheus.selectorLabels" . | nindent 4 }}
{{- end }}
