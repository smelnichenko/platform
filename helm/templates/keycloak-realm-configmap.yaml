{{- if eq (.Values.keycloak.enabled | toString) "true" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "schnappy.keycloak.serviceName" . }}-realm
  labels:
    {{- include "schnappy.keycloak.labels" . | nindent 4 }}
data:
  schnappy-realm.json: |
    {
      "realm": "schnappy",
      "enabled": true,
      "registrationAllowed": true,
      "resetPasswordAllowed": true,
      "loginTheme": "schnappy",
      "displayName": "schnappy",
      "displayNameHtml": "<span style=\"font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-weight:300;letter-spacing:0.15em;text-transform:uppercase;color:#a0a0a0;font-size:1.8rem\">schnappy</span>",
      "smtpServer": {
        "host": {{ .Values.mail.host | quote }},
        "port": {{ .Values.mail.port | default "587" | quote }},
        "from": {{ .Values.keycloak.mail.from | default .Values.mail.fromAddress | quote }},
        "fromDisplayName": {{ .Values.keycloak.mail.fromDisplayName | default "schnappy" | quote }},
        "replyTo": "",
        "auth": "true",
        "user": {{ .Values.mail.username | default "resend" | quote }},
        "password": "SMTP_PASSWORD_PLACEHOLDER",
        "ssl": "false",
        "starttls": "true"
      },
      "clients": [
        {{- $comma := false }}
        {{- if eq (.Values.keycloak.clients.app.enabled | toString) "true" }}
        {
          "clientId": "app",
          "enabled": true,
          "publicClient": true,
          "redirectUris": [{{ .Values.keycloak.clients.app.redirectUri | quote }}],
          "webOrigins": ["+"],
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": false,
          "protocol": "openid-connect"
        }
        {{- $comma = true }}
        {{- end }}
        {{- if eq (.Values.keycloak.clients.forgejo.enabled | toString) "true" }}
        {{- if $comma }},{{ end }}
        {
          "clientId": "forgejo",
          "enabled": true,
          "clientAuthenticatorType": "client-secret",
          "secret": "FORGEJO_CLIENT_SECRET_PLACEHOLDER",
          "redirectUris": [{{ .Values.keycloak.clients.forgejo.redirectUri | quote }}],
          "webOrigins": ["+"],
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": true,
          "protocol": "openid-connect"
        }
        {{- $comma = true }}
        {{- end }}
        {{- if eq (.Values.keycloak.clients.grafana.enabled | toString) "true" }}
        {{- if $comma }},{{ end }}
        {
          "clientId": "grafana",
          "enabled": true,
          "clientAuthenticatorType": "client-secret",
          "secret": "GRAFANA_CLIENT_SECRET_PLACEHOLDER",
          "redirectUris": [{{ .Values.keycloak.clients.grafana.redirectUri | quote }}],
          "webOrigins": ["+"],
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": false,
          "protocol": "openid-connect"
        }
        {{- end }}
      ]
    }
{{- end }}
