  labels:
    {{- include "monitor.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "monitor.postgres.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "monitor.app.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5432
  egress:
    # DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# PostgreSQL backup CronJob network policy
# Backup runs pg_dump via kubectl exec (no direct postgres connection)
# Only needs Kubernetes API access (port 6443)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "monitor.fullname" . }}-postgres-backup
  labels:
    {{- include "monitor.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "monitor.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: postgres-backup
  policyTypes:
    - Ingress
    - Egress
  egress:
    # DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Kubernetes API (kubectl get/exec)
    # ClusterIP service listens on 443, DNAT to 6443 — allow both
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
---
{{- end }}
