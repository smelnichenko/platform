{{- if .Values.grafana.enabled }}
# Grafana network policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "schnappy.fullname" . }}-grafana
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "schnappy.grafana.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 3000
  egress:
    # DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Grafana → Prometheus (datasource)
    {{- if .Values.prometheus.enabled }}
    - to:
        - podSelector:
            matchLabels:
              {{- include "schnappy.prometheus.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 9090
    {{- end }}
    # Grafana → Forgejo (OAuth2 SSO)
    {{- if eq (.Values.grafana.oauth.enabled | toString) "true" }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: forgejo
      ports:
        - protocol: TCP
          port: 3000
    {{- end }}
{{- end }}
