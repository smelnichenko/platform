{{- if .Values.prometheus.enabled }}
# Prometheus network policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "schnappy.fullname" . }}-prometheus
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "schnappy.prometheus.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- if .Values.grafana.enabled }}
    - from:
        - podSelector:
            matchLabels:
              {{- include "schnappy.grafana.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 9090
    {{- end }}
  egress:
    # DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Prometheus → App (scrape)
    - to:
        - podSelector:
            matchLabels:
              {{- include "schnappy.monitor.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8080
    # Prometheus → Vault (scrape via service DNS)
    {{- if .Values.prometheus.vault.enabled }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vault
      ports:
        - protocol: TCP
          port: 8200
    {{- end }}
    # Prometheus → Woodpecker (scrape)
    {{- if eq (.Values.prometheus.woodpecker.enabled | toString) "true" }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: woodpecker
      ports:
        - protocol: TCP
          port: 80
    {{- end }}
    # Prometheus → Forgejo (scrape)
    {{- if eq (.Values.prometheus.forgejo.enabled | toString) "true" }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: forgejo
      ports:
        - protocol: TCP
          port: 3000
    {{- end }}
    # Prometheus → Alertmanager
    {{- if eq (.Values.alertmanager.enabled | toString) "true" }}
    - to:
        - podSelector:
            matchLabels:
              {{- include "schnappy.alertmanager.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 9093
    {{- end }}
    # Prometheus → kube-state-metrics (scrape)
    {{- if eq (.Values.kubeStateMetrics.enabled | toString) "true" }}
    - to:
        - podSelector:
            matchLabels:
              {{- include "schnappy.kubeStateMetrics.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8080
    {{- end }}
---
{{- end }}
{{- if and .Values.prometheus.enabled (eq (.Values.alertmanager.enabled | toString) "true") }}
# Alertmanager network policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "schnappy.fullname" . }}-alertmanager
  labels:
