kind: NetworkPolicy
metadata:
  name: {{ include "schnappy.fullname" . }}-kafka
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "schnappy.kafka.selectorLabels" . | nindent 6 }}
