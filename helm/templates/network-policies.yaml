{{- if .Values.prometheus.enabled }}
# Prometheus network policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "monitor.fullname" . }}-prometheus
  labels:
    {{- include "monitor.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "monitor.prometheus.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- if .Values.grafana.enabled }}
    - from:
        - podSelector:
            matchLabels:
              {{- include "monitor.grafana.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 9090
    {{- end }}
  egress:
    # DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Prometheus → App (scrape)
    - to:
        - podSelector:
            matchLabels:
              {{- include "monitor.app.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8080
    # Prometheus → Vault (scrape via service DNS)
    {{- if .Values.prometheus.vault.enabled }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vault
      ports:
        - protocol: TCP
          port: 8200
    {{- end }}
---
{{- end }}
