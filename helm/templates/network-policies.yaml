            matchLabels:
              {{- include "schnappy.kafka.selectorLabels" . | nindent 14 }}
        {{- if eq (.Values.admin.enabled | toString) "true" }}
        - podSelector:
            matchLabels:
              {{- include "schnappy.admin.selectorLabels" . | nindent 14 }}
