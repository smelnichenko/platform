# Stateful data stores chart
nameOverride: schnappy

vault:
  secretsEnabled: false
  secretPathPrefix: "secret/data/schnappy"

networkPolicies:
  enabled: true

# PostgreSQL
postgres:
  enabled: true
  image: postgres:17-alpine
  database: monitor
  username: monitor
  password: ""
  existingSecret: ""
  # Per-service databases: each gets own user and credentials
  databases:
    - name: admin
    - name: chat
    - name: chess
  sharedBuffers: "512MB"
  effectiveCacheSize: "1536MB"
  workMem: "16MB"
  maintenanceWorkMem: "128MB"
  maxParallelWorkersPerGather: 2
  maxParallelWorkers: 8
  maxWorkerProcesses: 8
  effectiveIoConcurrency: 1
  randomPageCost: "4.0"
  resources:
    requests: { memory: "512Mi", cpu: "100m" }
    limits: { memory: "2Gi", cpu: "1000m" }
  storage:
    size: 1Gi
    storageClass: ""

# Valkey (volatile cache; replaces Redis — Plan 064)
# Two modes:
#   operator.enabled=false  → hand-rolled Deployment + Service + Secret (this chart owns it)
#   operator.enabled=true   → Valkey CR consumed by hyperspike/valkey-operator
# In both modes apps resolve `<release>-valkey.<ns>.svc` and use VALKEY_PASSWORD.
valkey:
  enabled: true
  image: valkey/valkey:8.1-alpine
  password: ""
  existingSecret: ""
  resources:
    requests: { memory: "64Mi", cpu: "25m" }
    limits: { memory: "256Mi", cpu: "200m" }
  # Operator-managed mode (Plan 064 default in prod once vagrant gate is green).
  operator:
    enabled: false
    nodes: 1        # standalone; >=3 for cluster mode
    replicas: 0     # per-node replicas; 0 = single instance
    storage: ""     # empty = no PVC (cache is throwaway); set to e.g. "1Gi" for persistence
    storageClass: ""

# Kafka (KRaft mode)
kafka:
  enabled: true
  image: apache/kafka:4.2.0
  replicas: 1
  clusterId: ""
  existingSecret: ""
  javaOpts: "-Xmx1g -Xms1g"
  # Plan 068 — when enabled, the Kafka cluster gains an extra
  # SCRAM-SHA-512 listener on :9094, the userOperator runs, and the
  # KafkaUser CRs in templates/kafka-users.yaml emit their per-service
  # creds (Strimzi auto-generates Secrets named like the KafkaUser).
  scram:
    enabled: false
  retention:
    hours: 168
    bytes: "10737418240"
  topics:
    - name: chat.messages
      partitions: 12
      replicationFactor: 1
    - name: chat.events
      partitions: 6
      replicationFactor: 1
    - name: chat.notifications
      partitions: 3
      replicationFactor: 1
    - name: chess.moves
      partitions: 6
      replicationFactor: 1
    - name: user.events
      partitions: 3
      replicationFactor: 1
  resources:
    requests: { memory: "1Gi", cpu: "250m" }
    limits: { memory: "2Gi", cpu: "2000m" }
  storage:
    size: 10Gi
    storageClass: ""

# ScyllaDB (chat message storage)
scylla:
  enabled: true
  image: scylladb/scylla:6.2
  replicas: 1
  args:
    - "--smp=2"
    - "--memory=2G"
    - "--overprovisioned=1"
    - "--developer-mode=1"
  resources:
    requests: { memory: "2Gi", cpu: "500m" }
    limits: { memory: "4Gi", cpu: "4000m" }
  storage:
    size: 20Gi
    storageClass: ""

# MinIO (email attachment storage)
minio:
  enabled: false
  image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
  accessKey: ""
  secretKey: ""
  existingSecret: ""
  bucket: "email-attachments"
  resources:
    requests: { memory: "256Mi", cpu: "100m" }
    limits: { memory: "1Gi", cpu: "1000m" }
  storage:
    size: 20Gi
    storageClass: ""

# apt-cacher-ng (apt caching proxy for Docker builds)
aptCache:
  enabled: true
  image: git.pmon.dev/schnappy/apt-cacher-ng:1.0
  resources:
    requests: { memory: "32Mi", cpu: "25m" }
    limits: { memory: "128Mi", cpu: "200m" }
  storage:
    size: 5Gi
    storageClass: ""

# Strimzi Kafka operator (replaces custom kafka StatefulSet)
strimzi:
  enabled: false

# CloudNativePG operator (replaces custom postgres Deployment)
# ScyllaDB Operator (replaces manual scylla StatefulSet)
scyllaOperator:
  enabled: false
  repository: docker.io/scylladb/scylla
  version: "6.2"
  agentVersion: "3.9.0"
  developerMode: true
  backups: []
  # Plan 069 — operator-managed backup + repair via ScyllaDB Manager.
  # scyllaManager.enabled gates the ClusterRegistration + Task CRs;
  # the actual Manager component is installed by setup-kubeadm.yml
  # (`install_scylla_manager: true` on prod, false on vagrant).
  scyllaManager:
    enabled: false
    backup:
      enabled: false
      cron: "0 3 * * *"      # daily 03:00 UTC
      retention: 7           # keep 7 daily snapshots
      # Scylla Manager location format: [dc:]<provider>:<bucket>
      # The bucket itself is created in MinIO; subpaths aren't part of
      # the location string.
      location: "s3:schnappy-backups"
    repair:
      enabled: true
      cron: "0 4 * * 0"      # Sunday 04:00 UTC
      intensity: 1.0
      parallel: 1
      # k8s resource.Quantity format (Ki/Mi/Gi), not 1GiB.
      smallTableThreshold: "1Gi"

cnpg:
  enabled: false
  import: false
  backup: false
  backupEndpoint: ""
  backupSecret: ""
  # When true, the chart emits a small single-instance Cluster (no
  # backup, no HA, small PVC) suitable for vagrant tests + per-PR
  # preview namespaces. Per-service users still come from the same
  # `schnappy-postgres-<svc>` Secrets so app env-var refs don't differ
  # between modes.
  ephemeral: false
  ephemeralStorageSize: 100Mi
  ephemeralImage: ghcr.io/cloudnative-pg/postgresql:17
