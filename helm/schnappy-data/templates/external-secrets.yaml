{{- end }}
{{- if eq (.Values.minio.enabled | toString) "true" }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "schnappy.minio.secretName" . }}
  labels:
    {{- include "schnappy.minio.labels" . | nindent 4 }}
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: {{ include "schnappy.minio.secretName" . }}
  data:
    - secretKey: MINIO_ROOT_USER
      remoteRef:
        key: {{ .Values.vault.secretPathPrefix }}/minio
        property: access_key
    - secretKey: MINIO_ROOT_PASSWORD
      remoteRef:
