{{- if .Values.vault.secretsEnabled }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "schnappy.postgres.secretName" . }}
  labels:
    {{- include "schnappy.postgres.labels" . | nindent 4 }}
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: {{ include "schnappy.postgres.secretName" . }}
  data:
    - secretKey: POSTGRES_DB
      remoteRef:
        key: {{ .Values.vault.secretPathPrefix }}/postgres
        property: database
    - secretKey: POSTGRES_USER
      remoteRef:
        key: {{ .Values.vault.secretPathPrefix }}/postgres
        property: username
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: {{ .Values.vault.secretPathPrefix }}/postgres
        property: password
{{- range .Values.postgres.databases }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "schnappy.fullname" $ }}-postgres-{{ .name }}
  labels:
    {{- include "schnappy.postgres.labels" $ | nindent 4 }}
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: {{ include "schnappy.fullname" $ }}-postgres-{{ .name }}
  data:
    - secretKey: DB_NAME
      remoteRef:
        key: {{ $.Values.vault.secretPathPrefix }}/postgres-{{ .name }}
        property: database
    - secretKey: DB_USERNAME
      remoteRef:
        key: {{ $.Values.vault.secretPathPrefix }}/postgres-{{ .name }}
        property: username
    - secretKey: DB_PASSWORD
      remoteRef:
        key: {{ $.Values.vault.secretPathPrefix }}/postgres-{{ .name }}
        property: password
{{- end }}
{{- if or .Values.valkey.password .Values.valkey.existingSecret }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "schnappy.valkey.secretName" . }}
  labels:
    {{- include "schnappy.valkey.labels" . | nindent 4 }}
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: {{ include "schnappy.valkey.secretName" . }}
  data:
    - secretKey: VALKEY_PASSWORD
      remoteRef:
