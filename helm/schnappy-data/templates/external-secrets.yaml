{{- if eq (.Values.strimzi.enabled | toString) "true" }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "schnappy.kafka.secretName" . }}
  labels:
    {{- include "schnappy.kafka.labels" . | nindent 4 }}
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: {{ include "schnappy.kafka.secretName" . }}
  data:
    - secretKey: KAFKA_CLUSTER_ID
      remoteRef:
        key: {{ .Values.vault.secretPathPrefix }}/kafka
        property: cluster_id
{{- end }}
{{- end }}
