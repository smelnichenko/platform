{{- if .Values.vault.secretsEnabled }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "schnappy.postgres.secretName" . }}
  labels:
    {{- include "schnappy.postgres.labels" . | nindent 4 }}
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: {{ include "schnappy.postgres.secretName" . }}
  data:
    - secretKey: POSTGRES_DB
      remoteRef:
        key: secret/data/schnappy/postgres
        property: database
    - secretKey: POSTGRES_USER
      remoteRef:
        key: secret/data/schnappy/postgres
        property: username
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: secret/data/schnappy/postgres
        property: password
{{- if or .Values.redis.password .Values.redis.existingSecret }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "schnappy.redis.secretName" . }}
  labels:
    {{- include "schnappy.redis.labels" . | nindent 4 }}
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: {{ include "schnappy.redis.secretName" . }}
  data:
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: secret/data/schnappy/redis
        property: password
{{- end }}
{{- if eq (.Values.minio.enabled | toString) "true" }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "schnappy.minio.secretName" . }}
  labels:
    {{- include "schnappy.minio.labels" . | nindent 4 }}
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: {{ include "schnappy.minio.secretName" . }}
  data:
    - secretKey: MINIO_ROOT_USER
      remoteRef:
        key: secret/data/schnappy/minio
        property: access_key
    - secretKey: MINIO_ROOT_PASSWORD
      remoteRef:
        key: secret/data/schnappy/minio
        property: secret_key
{{- end }}
{{- end }}
