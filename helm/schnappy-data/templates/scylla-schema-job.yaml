{{- if or (and (eq (.Values.scylla.enabled | toString) "true") (gt (int .Values.scylla.replicas) 0)) (eq (.Values.scyllaOperator.enabled | toString) "true") }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "schnappy.scylla.serviceName" . }}-schema
  labels:
    {{- include "schnappy.scylla.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 10
  template:
    metadata:
      annotations:
        sidecar.istio.io/inject: "false"
      labels:
        app.kubernetes.io/name: scylla-job
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "schnappy.fullname" . }}-scylla
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: scylla-schema
          image: {{ .Values.scylla.image }}
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 500m, memory: 256Mi }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          command: ["sh", "-c"]
          args:
            - |
              echo "Waiting for ScyllaDB to be ready..."
              until cqlsh {{ include "schnappy.scylla.serviceName" . }} 9042 -e "SELECT now() FROM system.local" 2>/dev/null; do
                echo "ScyllaDB not ready, retrying in 5s..."
                sleep 5
              done
              echo "ScyllaDB is ready. Applying schema..."
              cqlsh {{ include "schnappy.scylla.serviceName" . }} 9042 <<'EOF'
              CREATE KEYSPACE IF NOT EXISTS chat WITH replication = {'class': 'SimpleStrategy', 'replication_factor': 1};

              CREATE TABLE IF NOT EXISTS chat.messages_by_channel (
                  channel_id bigint,
                  bucket text,
                  message_id timeuuid,
                  user_uuid uuid,
                  username text,
                  content text,
                  parent_message_id text,
                  edited boolean,
                  deleted boolean,
                  hash text,
                  prev_hash text,
                  key_version int,
                  message_type text,
                  metadata text,
                  PRIMARY KEY ((channel_id, bucket), message_id)
              ) WITH CLUSTERING ORDER BY (message_id DESC)
                AND gc_grace_seconds = 864000;

              CREATE TABLE IF NOT EXISTS chat.messages_by_user_v2 (
                  user_uuid uuid,
                  message_id timeuuid,
                  channel_id bigint,
                  bucket text,
                  content text,
                  PRIMARY KEY (user_uuid, message_id)
              ) WITH CLUSTERING ORDER BY (message_id DESC);

              CREATE TABLE IF NOT EXISTS chat.message_edits (
                  channel_id bigint,
                  bucket text,
                  message_id timeuuid,
                  edit_id timeuuid,
                  user_uuid uuid,
                  content text,
                  hash text,
                  key_version int,
                  PRIMARY KEY ((channel_id, bucket, message_id), edit_id)
              ) WITH CLUSTERING ORDER BY (edit_id DESC);

              CREATE TABLE IF NOT EXISTS chat.chain_heads (
                  channel_id bigint,
                  hash text,
                  message_id timeuuid,
                  PRIMARY KEY (channel_id)
              );

              CREATE TABLE IF NOT EXISTS chat.reactions_by_message (
                  channel_id bigint,
                  bucket text,
                  message_id timeuuid,
                  emoji text,
                  user_uuid uuid,
                  username text,
                  PRIMARY KEY ((channel_id, bucket, message_id), emoji, user_uuid)
              );

              CREATE TABLE IF NOT EXISTS chat.attachments_by_message (
                  channel_id bigint,
                  bucket text,
                  message_id timeuuid,
                  attachment_id timeuuid,
                  url text,
                  filename text,
                  content_type text,
                  size_bytes bigint,
                  PRIMARY KEY ((channel_id, bucket, message_id), attachment_id)
              );
              EOF
              echo "Migrating user_id to user_uuid if needed..."
              cqlsh {{ include "schnappy.scylla.serviceName" . }} 9042 -e "ALTER TABLE chat.messages_by_channel ADD user_uuid uuid;" 2>/dev/null || true
              cqlsh {{ include "schnappy.scylla.serviceName" . }} 9042 -e "ALTER TABLE chat.message_edits ADD user_uuid uuid;" 2>/dev/null || true
              echo "Schema applied successfully."
              echo "Done."
      restartPolicy: OnFailure
{{- end }}
