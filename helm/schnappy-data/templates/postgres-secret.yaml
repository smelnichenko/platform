{{- if and .Values.postgres.enabled (not .Values.postgres.existingSecret) -}}
{{- if not .Values.postgres.password }}
{{- fail "postgres.password is required. Set via --set postgres.password=XXX or use postgres.existingSecret" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "schnappy.postgres.secretName" . }}
  labels:
    {{- include "schnappy.postgres.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_DB: {{ .Values.postgres.database | quote }}
  POSTGRES_USER: {{ .Values.postgres.username | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
{{- end }}
