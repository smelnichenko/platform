{{- if eq (.Values.cnpg.enabled | toString) "true" }}
{{- $ephemeral := eq (.Values.cnpg.ephemeral | default false | toString) "true" }}
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ include "schnappy.postgres.serviceName" . }}
  labels:
    {{- include "schnappy.postgres.labels" . | nindent 4 }}
spec:
  instances: 1
  imageName: {{ if $ephemeral }}{{ .Values.cnpg.ephemeralImage | quote }}{{ else }}ghcr.io/cloudnative-pg/postgresql:17{{ end }}
  {{- if not $ephemeral }}
  priorityClassName: data-critical
  {{- end }}

  enableSuperuserAccess: true
  superuserSecret:
    name: {{ include "schnappy.postgres.serviceName" . }}-superuser

  postgresql:
    parameters:
      {{- if $ephemeral }}
      shared_buffers: "64MB"
      effective_cache_size: "192MB"
      work_mem: "4MB"
      maintenance_work_mem: "32MB"
      max_parallel_workers_per_gather: "0"
      max_parallel_workers: "2"
      max_worker_processes: "4"
      {{- else }}
      shared_buffers: {{ .Values.postgres.sharedBuffers | default "512MB" | quote }}
      effective_cache_size: {{ .Values.postgres.effectiveCacheSize | default "1536MB" | quote }}
      work_mem: {{ .Values.postgres.workMem | default "16MB" | quote }}
      maintenance_work_mem: {{ .Values.postgres.maintenanceWorkMem | default "128MB" | quote }}
      max_parallel_workers_per_gather: {{ .Values.postgres.maxParallelWorkersPerGather | default 2 | quote }}
      max_parallel_workers: {{ .Values.postgres.maxParallelWorkers | default 8 | quote }}
      max_worker_processes: {{ .Values.postgres.maxWorkerProcesses | default 8 | quote }}
      effective_io_concurrency: {{ .Values.postgres.effectiveIoConcurrency | default 1 | quote }}
      random_page_cost: {{ .Values.postgres.randomPageCost | default "4.0" | quote }}
      {{- end }}

  bootstrap:
    {{- if .Values.cnpg.recovery }}
    recovery:
      source: backup-source
    {{- else if .Values.cnpg.import }}
    initdb:
      database: {{ .Values.postgres.database | default "monitor" }}
      owner: postgres
      secret:
        name: {{ include "schnappy.postgres.serviceName" . }}-superuser
      import:
        type: monolith
        databases:
          - {{ .Values.postgres.database | default "monitor" }}
          {{- range .Values.postgres.databases }}
          - {{ .name }}
          {{- end }}
        roles:
          - postgres
        source:
          externalCluster: old-postgres
    {{- else }}
    initdb:
      database: {{ .Values.postgres.database | default "monitor" }}
      owner: {{ .Values.postgres.username | default "monitor" }}
      secret:
        name: {{ include "schnappy.postgres.serviceName" . }}-app
      postInitSQL:
        - GRANT ALL ON SCHEMA public TO {{ .Values.postgres.username | default "monitor" }};
        {{- range .Values.postgres.databases }}
        - CREATE DATABASE {{ .name }};
        {{- end }}
    {{- end }}

  {{- if .Values.cnpg.recovery }}
  externalClusters:
    - name: backup-source
      barmanObjectStore:
        destinationPath: {{ .Values.cnpg.backupDestination | default "s3://postgres-backups/" }}
        endpointURL: {{ .Values.cnpg.backupEndpoint }}
        serverName: {{ .Values.cnpg.recoveryServerName | default (include "schnappy.postgres.serviceName" .) }}
        s3Credentials:
          accessKeyId:
            name: {{ .Values.cnpg.backupSecret }}
            key: MINIO_ROOT_USER
          secretAccessKey:
            name: {{ .Values.cnpg.backupSecret }}
            key: MINIO_ROOT_PASSWORD
        wal:
          maxParallel: 4
  {{- else if .Values.cnpg.import }}
  externalClusters:
    - name: old-postgres
      connectionParameters:
        host: {{ include "schnappy.postgres.serviceName" . }}
        user: postgres
        dbname: postgres
        port: "5432"
        sslmode: disable
      password:
        name: {{ include "schnappy.postgres.secretName" . }}
        key: POSTGRES_PASSWORD
  {{- end }}

  storage:
    size: {{ if $ephemeral }}{{ .Values.cnpg.ephemeralStorageSize | quote }}{{ else }}{{ .Values.postgres.storage.size | default "20Gi" }}{{ end }}
    {{- if .Values.postgres.storage.storageClass }}
    storageClass: {{ .Values.postgres.storage.storageClass }}
    {{- end }}

  resources:
    {{- if $ephemeral }}
    requests: { cpu: "50m", memory: "256Mi" }
    limits:   { cpu: "500m", memory: "512Mi" }
    {{- else }}
    {{- toYaml .Values.postgres.resources | nindent 4 }}
    {{- end }}

  {{- if not $ephemeral }}
  inheritedMetadata:
    annotations:
      backup.velero.io/backup-volumes: pgdata
      traffic.sidecar.istio.io/excludeOutboundPorts: "9000"
  {{- end }}

  {{- if and .Values.cnpg.backup (not $ephemeral) }}
  backup:
    barmanObjectStore:
      destinationPath: {{ .Values.cnpg.backupDestination | default "s3://postgres-backups/" }}
      endpointURL: {{ .Values.cnpg.backupEndpoint }}
      {{- if .Values.cnpg.backupServerName }}
      serverName: {{ .Values.cnpg.backupServerName }}
      {{- end }}
      s3Credentials:
        accessKeyId:
          name: {{ .Values.cnpg.backupSecret }}
          key: MINIO_ROOT_USER
        secretAccessKey:
          name: {{ .Values.cnpg.backupSecret }}
          key: MINIO_ROOT_PASSWORD
      wal:
        compression: gzip
      data:
        compression: gzip
  {{- end }}
{{- end }}
