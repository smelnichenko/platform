{{- if and (eq (.Values.scyllaOperator.enabled | toString) "true") (eq (.Values.scyllaOperator.scyllaManager.enabled | toString) "true") }}
{{- $dcRef := printf "%s-scylla" (include "schnappy.fullname" .) }}
# Plan 069 — schedule daily backup + weekly repair tasks via ScyllaDB
# Manager. Manager itself runs in scylla-manager ns (installed by
# setup-kubeadm.yml).
#
# Note: scylla-operator auto-creates a ScyllaDBManagerClusterRegistration
# for every ScyllaDBDatacenter when Manager is installed. Don't ship
# our own — it just gets auto-deleted as a duplicate. The Tasks below
# reference the auto-managed ScyllaDBDatacenter directly.
{{- if eq (.Values.scyllaOperator.scyllaManager.backup.enabled | toString) "true" }}
---
apiVersion: scylla.scylladb.com/v1alpha1
kind: ScyllaDBManagerTask
metadata:
  name: {{ include "schnappy.fullname" . }}-daily-backup
  labels:
    {{- include "schnappy.scylla.labels" . | nindent 4 }}
spec:
  scyllaDBClusterRef:
    kind: ScyllaDBDatacenter
    name: {{ $dcRef }}
  type: Backup
  backup:
    location:
      - {{ .Values.scyllaOperator.scyllaManager.backup.location | quote }}
    retention: {{ .Values.scyllaOperator.scyllaManager.backup.retention }}
    cron: {{ .Values.scyllaOperator.scyllaManager.backup.cron | quote }}
{{- end }}
{{- if eq (.Values.scyllaOperator.scyllaManager.repair.enabled | toString) "true" }}
---
apiVersion: scylla.scylladb.com/v1alpha1
kind: ScyllaDBManagerTask
metadata:
  name: {{ include "schnappy.fullname" . }}-weekly-repair
  labels:
    {{- include "schnappy.scylla.labels" . | nindent 4 }}
spec:
  scyllaDBClusterRef:
    kind: ScyllaDBDatacenter
    name: {{ $dcRef }}
  type: Repair
  repair:
    intensity: {{ .Values.scyllaOperator.scyllaManager.repair.intensity }}
    parallel: {{ .Values.scyllaOperator.scyllaManager.repair.parallel }}
    cron: {{ .Values.scyllaOperator.scyllaManager.repair.cron | quote }}
    smallTableThreshold: {{ .Values.scyllaOperator.scyllaManager.repair.smallTableThreshold | quote }}
{{- end }}
{{- end }}
