{{- if .Values.postgres.enabled -}}
# pg_dump CronJob: runs at 1:30 AM UTC (30 min before Velero's 2 AM backup)
# Uses kubectl exec to run pg_dump inside the postgres pod, avoiding NP race conditions
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "schnappy.fullname" . }}-postgres-backup
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "schnappy.fullname" . }}-postgres-backup
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "schnappy.fullname" . }}-postgres-backup
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "schnappy.fullname" . }}-postgres-backup
subjects:
  - kind: ServiceAccount
    name: {{ include "schnappy.fullname" . }}-postgres-backup
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "schnappy.fullname" . }}-postgres-backup
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
spec:
  schedule: "30 1 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 600
      template:
        metadata:
          annotations:
            sidecar.istio.io/inject: "false"
          labels:
            app.kubernetes.io/name: {{ include "schnappy.name" . }}
            app.kubernetes.io/instance: {{ .Release.Name }}
            app.kubernetes.io/component: postgres-backup
        spec:
          serviceAccountName: {{ include "schnappy.fullname" . }}-postgres-backup
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          restartPolicy: Never
          containers:
            - name: pg-backup
              image: bitnami/kubectl:latest
              imagePullPolicy: Never
              command: ["sh", "-c"]
              args:
                - |
                  set -e
                  POD=$(kubectl get pod -l app.kubernetes.io/component=postgres,app.kubernetes.io/instance={{ .Release.Name }} -o jsonpath='{.items[0].metadata.name}')
                  echo "Found postgres pod: $POD"

                  BACKUP_DIR=/var/lib/postgresql/data/backup
                  DUMP_FILE="$BACKUP_DIR/monitor-$(date +%Y%m%d).dump"

                  echo "Starting pg_dump to $DUMP_FILE..."
                  kubectl exec "$POD" -c postgres -- sh -c "
                    mkdir -p $BACKUP_DIR
                    pg_dump -U \$POSTGRES_USER -d \$POSTGRES_DB -Fc -f $DUMP_FILE
                    echo \"Dump complete: \$(ls -lh $DUMP_FILE | awk '{print \$5}')\"
                    ls -t $BACKUP_DIR/monitor-*.dump 2>/dev/null | tail -n +4 | xargs -r rm -v
                    echo 'Backups retained:'
                    ls -lh $BACKUP_DIR/monitor-*.dump
                  "
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              resources:
                requests:
                  cpu: 50m
                  memory: 32Mi
                limits:
                  cpu: 200m
                  memory: 64Mi
{{- end }}
