{{- if eq (.Values.strimzi.enabled | toString) "true" }}
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: kafka
  labels:
    strimzi.io/cluster: {{ include "schnappy.fullname" . }}
    {{- include "schnappy.labels" . | nindent 4 }}
spec:
  replicas: 1
  roles:
    - controller
    - broker
  storage:
    type: persistent-claim
    size: {{ .Values.kafka.storage.size }}
    {{- if .Values.kafka.storage.storageClass }}
    class: {{ .Values.kafka.storage.storageClass }}
    {{- end }}
  resources:
    {{- toYaml .Values.kafka.resources | nindent 4 }}
  jvmOptions:
    -Xms: 1024m
    -Xmx: 1024m
  template:
    pod:
      priorityClassName: data-critical
      metadata:
        annotations:
          backup.velero.io/backup-volumes: data-0
          traffic.sidecar.istio.io/excludeInboundPorts: "9090,9091,9093,8443"
---
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: {{ include "schnappy.fullname" . }}
  labels:
    {{- include "schnappy.kafka.labels" . | nindent 4 }}
  annotations:
    strimzi.io/kraft: enabled
    strimzi.io/node-pools: enabled
    {{- if .Values.kafka.clusterId }}
    strimzi.io/kraft-cluster-id: {{ .Values.kafka.clusterId | quote }}
    {{- else }}
    {{- $secret := (lookup "v1" "Secret" .Release.Namespace (include "schnappy.kafka.secretName" .)) }}
    {{- if $secret }}
    strimzi.io/kraft-cluster-id: {{ index $secret.data "KAFKA_CLUSTER_ID" | b64dec | quote }}
    {{- end }}
    {{- end }}
spec:
  kafka:
    version: 4.2.0
    {{- if eq (.Values.kafka.scram.enabled | toString) "true" }}
    authorization:
      type: simple
      superUsers:
        # The cluster-internal SCRAM admin used by KafkaConnect /
        # operator-managed components. Other users are granted least-
        # privilege ACLs via KafkaUser CRs.
        - "schnappy-kafka-admin"
    {{- end }}
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      {{- if eq (.Values.kafka.scram.enabled | toString) "true" }}
      - name: scram
        port: 9094
        type: internal
        tls: false
        authentication:
          type: scram-sha-512
      {{- end }}
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      log.retention.hours: {{ .Values.kafka.retention.hours }}
      log.retention.bytes: {{ .Values.kafka.retention.bytes | toString }}
      default.replication.factor: 1
      min.insync.replicas: 1
  entityOperator:
    topicOperator:
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
    {{- if eq (.Values.kafka.scram.enabled | toString) "true" }}
    # Plan 068 — userOperator reconciles KafkaUser CRs into SCRAM
    # creds + topic ACLs.
    userOperator:
      resources:
        requests: { cpu: 50m, memory: 128Mi }
        limits:   { cpu: 500m, memory: 384Mi }
    {{- end }}
    template:
      pod:
        metadata:
          annotations:
            sidecar.istio.io/inject: "false"
{{- end }}
