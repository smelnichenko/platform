{{- if .Values.networkPolicies.enabled -}}
{{- if .Values.postgres.enabled }}
---
# PostgreSQL network policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "schnappy.fullname" . }}-postgres
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "schnappy.postgres.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "schnappy.monitor.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5432
    - from:
        - podSelector:
            matchLabels:
              {{- include "schnappy.admin.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5432
    - from:
        - podSelector:
            matchLabels:
              {{- include "schnappy.chat.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5432
    - from:
        - podSelector:
            matchLabels:
              {{- include "schnappy.chess.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5432
    - from:
        - podSelector:
            matchLabels:
              {{- include "schnappy.keycloak.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5432
  egress:
    # DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# PostgreSQL backup CronJob network policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "schnappy.fullname" . }}-postgres-backup
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "schnappy.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: postgres-backup
  policyTypes:
    - Ingress
    - Egress
  egress:
    # DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Kubernetes API (kubectl get/exec)
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
---
{{- end }}
