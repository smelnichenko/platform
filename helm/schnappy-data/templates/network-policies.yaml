{{- if eq (.Values.minio.enabled | toString) "true" }}
# MinIO network policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "schnappy.fullname" . }}-minio
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "schnappy.minio.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "schnappy.monitor.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 9000
    # Hyperfoil report upload
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: schnappy
              app.kubernetes.io/component: hyperfoil-load
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: schnappy
              app.kubernetes.io/component: hyperfoil-stress
      ports:
        - protocol: TCP
          port: 9000
    # Reports server (Nginx proxy)
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: schnappy
              app.kubernetes.io/component: reports
      ports:
        - protocol: TCP
          port: 9000
    # Mimir (long-term metrics storage)
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: schnappy
              app.kubernetes.io/component: mimir
      ports:
        - protocol: TCP
          port: 9000
    # Tempo (trace storage)
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: schnappy
              app.kubernetes.io/component: tempo
      ports:
        - protocol: TCP
          port: 9000
  egress:
    # DNS only
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
{{- end }}
{{- if eq (.Values.kafka.enabled | toString) "true" }}
# Kafka network policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "schnappy.fullname" . }}-kafka
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "schnappy.kafka.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "schnappy.monitor.selectorLabels" . | nindent 14 }}
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: kafka-job
        - podSelector:
            matchLabels:
              {{- include "schnappy.kafka.selectorLabels" . | nindent 14 }}
        - podSelector:
            matchLabels:
              {{- include "schnappy.admin.selectorLabels" . | nindent 14 }}
        - podSelector:
            matchLabels:
              {{- include "schnappy.chat.selectorLabels" . | nindent 14 }}
        - podSelector:
            matchLabels:
              {{- include "schnappy.chess.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 9092
  egress:
    # DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Kafka self (KRaft controller + broker via advertised listeners)
    - to:
        - podSelector:
            matchLabels:
              {{- include "schnappy.kafka.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 9092
        - protocol: TCP
          port: 9093
---
# Kafka topics job network policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "schnappy.fullname" . }}-kafka-job
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: kafka-job
  policyTypes:
    - Ingress
    - Egress
  egress:
    # DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Kafka broker
    - to:
        - podSelector:
            matchLabels:
              {{- include "schnappy.kafka.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 9092
{{- end }}
{{- if eq (.Values.strimzi.enabled | toString) "true" }}
---
# Strimzi Kafka broker network policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "schnappy.fullname" . }}-strimzi-kafka
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      strimzi.io/cluster: schnappy
      strimzi.io/kind: Kafka
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "schnappy.monitor.selectorLabels" . | nindent 14 }}
        - podSelector:
            matchLabels:
              {{- include "schnappy.admin.selectorLabels" . | nindent 14 }}
        - podSelector:
            matchLabels:
              {{- include "schnappy.chat.selectorLabels" . | nindent 14 }}
        - podSelector:
            matchLabels:
              {{- include "schnappy.chess.selectorLabels" . | nindent 14 }}
        # Strimzi Entity Operator
        - podSelector:
            matchLabels:
              strimzi.io/cluster: schnappy
              strimzi.io/kind: entity-operator
        # Strimzi broker self (KRaft)
        - podSelector:
            matchLabels:
              strimzi.io/cluster: schnappy
              strimzi.io/kind: Kafka
      ports:
        - protocol: TCP
          port: 9092
    # Strimzi operator (cross-namespace) — control plane + metrics
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: strimzi
      ports:
        - protocol: TCP
          port: 9090
        - protocol: TCP
          port: 9091
        - protocol: TCP
          port: 9092
        - protocol: TCP
          port: 9093
        - protocol: TCP
          port: 8443
        - protocol: TCP
          port: 9404
  egress:
    # DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # KRaft controller + broker self (all internal ports)
    - to:
        - podSelector:
            matchLabels:
              strimzi.io/cluster: schnappy
              strimzi.io/kind: Kafka
      ports:
        - protocol: TCP
          port: 9090
        - protocol: TCP
          port: 9091
        - protocol: TCP
          port: 9092
        - protocol: TCP
          port: 9093
---
# Strimzi Entity Operator network policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "schnappy.fullname" . }}-strimzi-entity-operator
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      strimzi.io/cluster: schnappy
      strimzi.io/kind: entity-operator
  policyTypes:
    - Ingress
    - Egress
  egress:
    # DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Kafka broker (client + internal control)
    - to:
        - podSelector:
            matchLabels:
              strimzi.io/cluster: schnappy
              strimzi.io/kind: Kafka
      ports:
        - protocol: TCP
          port: 9091
        - protocol: TCP
          port: 9092
    # Kubernetes API (topic management)
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
{{- end }}
