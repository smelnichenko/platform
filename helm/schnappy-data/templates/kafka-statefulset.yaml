apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "schnappy.kafka.serviceName" . }}
  labels:
    {{- include "schnappy.kafka.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "schnappy.kafka.serviceName" . }}
  replicas: {{ .Values.kafka.replicas }}
  selector:
    matchLabels:
      {{- include "schnappy.kafka.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "schnappy.kafka.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/part-of: schnappy
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: kafka
          image: {{ .Values.kafka.image }}
          env:
            - name: KAFKA_NODE_ID
              value: "0"
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://:9092,CONTROLLER://:9093"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://{{ include "schnappy.kafka.serviceName" . }}:9092"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "0@localhost:9093"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_LOG_RETENTION_HOURS
              value: {{ .Values.kafka.retention.hours | quote }}
            - name: KAFKA_LOG_RETENTION_BYTES
              value: {{ .Values.kafka.retention.bytes | toString | quote }}
            - name: KAFKA_LOG_DIRS
              value: "/var/lib/kafka/data"
            - name: CLUSTER_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.kafka.secretName" . }}
                  key: KAFKA_CLUSTER_ID
            - name: KAFKA_HEAP_OPTS
              value: {{ .Values.kafka.javaOpts | quote }}
          ports:
            - containerPort: 9092
              name: client
              protocol: TCP
            - containerPort: 9093
              name: controller
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /var/lib/kafka/data
            - name: tmp
              mountPath: /tmp
            - name: logs
              mountPath: /opt/kafka/logs
            - name: config
              mountPath: /opt/kafka/config
          resources:
            {{- toYaml .Values.kafka.resources | nindent 12 }}
          livenessProbe:
            tcpSocket:
              port: client
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: client
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: logs
          emptyDir: {}
        - name: config
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.kafka.storage.storageClass }}
        storageClassName: {{ .Values.kafka.storage.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.kafka.storage.size }}
