{{- if and (eq (.Values.cnpg.enabled | toString) "true") .Values.vault.secretsEnabled }}
---
# CNPG superuser secret (postgres user, password from Vault)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: schnappy-postgres-superuser
  labels:
    {{- include "schnappy.postgres.labels" . | nindent 4 }}
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: schnappy-postgres-superuser
    template:
      data:
        username: postgres
        password: "{{ "{{ .password }}" }}"
  data:
    - secretKey: password
      remoteRef:
        key: secret/data/schnappy/postgres
        property: password
---
# CNPG app user secret (monitor user, credentials from Vault)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: schnappy-postgres-app
  labels:
    {{- include "schnappy.postgres.labels" . | nindent 4 }}
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: schnappy-postgres-app
  data:
    - secretKey: username
      remoteRef:
        key: secret/data/schnappy/postgres
        property: username
    - secretKey: password
      remoteRef:
        key: secret/data/schnappy/postgres
        property: password
{{- if .Values.cnpg.backup }}
---
# CNPG backup S3 credentials (Pi MinIO)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.cnpg.backupSecret }}
  labels:
    {{- include "schnappy.postgres.labels" . | nindent 4 }}
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: {{ .Values.cnpg.backupSecret }}
  data:
    - secretKey: MINIO_ROOT_USER
      remoteRef:
        key: secret/data/schnappy/minio-backup
        property: access_key
    - secretKey: MINIO_ROOT_PASSWORD
      remoteRef:
        key: secret/data/schnappy/minio-backup
        property: secret_key
{{- end }}
{{- end }}
