{{- if and (eq (.Values.kafka.enabled | toString) "true") (gt (int .Values.kafka.replicas) 0) }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "schnappy.kafka.serviceName" . }}-topics
  labels:
    {{- include "schnappy.kafka.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka-job
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "schnappy.fullname" . }}-kafka
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      restartPolicy: OnFailure
      containers:
        - name: kafka-topics
          image: {{ .Values.kafka.image }}
          command:
            - sh
            - -c
            - |
              echo "Waiting for Kafka to be ready..."
              until /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server {{ include "schnappy.kafka.serviceName" . }}:9092 >/dev/null 2>&1; do
                echo "Kafka not ready, retrying in 5s..."
                sleep 5
              done
              echo "Kafka is ready. Creating topics..."
              {{- range .Values.kafka.topics }}
              /opt/kafka/bin/kafka-topics.sh --bootstrap-server {{ include "schnappy.kafka.serviceName" $ }}:9092 --create --if-not-exists --topic {{ .name }} --partitions {{ .partitions }} --replication-factor {{ .replicationFactor }}
              {{- end }}
              echo "Topics created successfully."
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
{{- end }}
