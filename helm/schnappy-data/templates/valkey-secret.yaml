{{- if and .Values.valkey.password (not .Values.valkey.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "schnappy.valkey.secretName" . }}
  labels:
    {{- include "schnappy.valkey.labels" . | nindent 4 }}
type: Opaque
stringData:
  VALKEY_PASSWORD: {{ .Values.valkey.password | quote }}
{{- end }}
