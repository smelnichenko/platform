{{- if .Values.valkey.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "schnappy.valkey.serviceName" . }}
  labels:
    {{- include "schnappy.valkey.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "schnappy.valkey.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "schnappy.valkey.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/part-of: schnappy
    spec:
      serviceAccountName: {{ include "schnappy.fullname" . }}-valkey
      automountServiceAccountToken: false
      priorityClassName: data-critical
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: valkey
          image: {{ .Values.valkey.image }}
          args:
            - "--appendonly"
            - "no"
            - "--maxmemory"
            - "128mb"
            - "--maxmemory-policy"
            - "allkeys-lru"
            {{- if or .Values.valkey.password .Values.valkey.existingSecret }}
            - "--requirepass"
            - "$(VALKEY_PASSWORD)"
            {{- end }}
          ports:
            - containerPort: 6379
              protocol: TCP
          {{- if or .Values.valkey.password .Values.valkey.existingSecret }}
          env:
            - name: VALKEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.valkey.secretName" . }}
                  key: VALKEY_PASSWORD
          {{- end }}
          resources:
            {{- toYaml .Values.valkey.resources | nindent 12 }}
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - {{- if or .Values.valkey.password .Values.valkey.existingSecret }} valkey-cli -a "$VALKEY_PASSWORD" ping {{- else }} valkey-cli ping {{- end }}
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - {{- if or .Values.valkey.password .Values.valkey.existingSecret }} valkey-cli -a "$VALKEY_PASSWORD" ping {{- else }} valkey-cli ping {{- end }}
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /data
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
      volumes:
        - name: data
          emptyDir: {}
{{- end }}
