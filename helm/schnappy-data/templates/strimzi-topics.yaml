{{- if eq (.Values.strimzi.enabled | toString) "true" }}
{{- range .Values.kafka.topics }}
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: {{ .name | replace "." "-" }}
  labels:
    strimzi.io/cluster: schnappy
spec:
  topicName: {{ .name }}
  partitions: {{ .partitions }}
  replicas: {{ .replicationFactor }}
  config:
    retention.ms: "{{ mul ($.Values.kafka.retention.hours | int) 3600000 }}"
    retention.bytes: {{ $.Values.kafka.retention.bytes | quote }}
{{- end }}
{{- end }}
