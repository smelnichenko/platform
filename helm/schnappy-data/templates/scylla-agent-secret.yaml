{{- if and (eq (.Values.scyllaOperator.enabled | toString) "true") .Values.vault.secretsEnabled .Values.scyllaOperator.backups }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: scylla-agent-config-secret
  labels:
    {{- include "schnappy.scylla.labels" . | nindent 4 }}
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: scylla-agent-config-secret
    template:
      data:
        scylla-manager-agent.yaml: |
          s3:
            access_key_id: {{ "{{ .access_key }}" }}
            secret_access_key: {{ "{{ .secret_key }}" }}
            provider: Minio
            endpoint: {{ .Values.scyllaOperator.backupEndpoint | default "http://192.168.11.5:9000" }}
            region: us-east-1
  data:
    - secretKey: access_key
      remoteRef:
        key: {{ .Values.vault.secretPathPrefix }}/minio-backup
        property: access_key
    - secretKey: secret_key
      remoteRef:
        key: {{ .Values.vault.secretPathPrefix }}/minio-backup
        property: secret_key
{{- end }}
