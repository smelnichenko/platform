apiVersion: v1
kind: Service
metadata:
  name: {{ include "schnappy.kafka.serviceName" . }}
  labels:
    {{- include "schnappy.kafka.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 9092
      targetPort: client
      protocol: TCP
      name: client
  selector:
    {{- include "schnappy.kafka.selectorLabels" . | nindent 4 }}
