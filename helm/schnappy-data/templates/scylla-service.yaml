{{- if eq (.Values.scylla.enabled | toString) "true" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "schnappy.scylla.serviceName" . }}
  labels:
    {{- include "schnappy.scylla.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 9042
      targetPort: cql
      protocol: TCP
      name: cql
    - port: 7000
      targetPort: inter-node
      protocol: TCP
      name: inter-node
  selector:
    {{- include "schnappy.scylla.selectorLabels" . | nindent 4 }}
{{- end }}
