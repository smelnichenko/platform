{{- if eq (.Values.aptCache.enabled | toString) "true" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "schnappy.fullname" . }}-apt-cache
  labels:
    {{- include "schnappy.aptCache.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 3142
      targetPort: 3142
      protocol: TCP
      name: apt-cache
  selector:
    {{- include "schnappy.aptCache.selectorLabels" . | nindent 4 }}
{{- end }}
