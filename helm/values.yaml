# Monitor Application - Helm Chart Values
#
# SECURITY NOTE: Default passwords below are for development only.
# For production, either:
#   1. Set passwords via --set flags: --set postgres.password=XXX --set grafana.adminPassword=XXX
#   2. Use environment variables in Ansible vars (recommended)
#   3. Use existing secrets: postgres.existingSecret and grafana.existingSecret

# Vault integration — pull secrets via External Secrets Operator
vault:
  secretsEnabled: false  # Create ExternalSecret CRDs to sync secrets from Vault

# Network Policies - restrict pod-to-pod communication
networkPolicies:
  enabled: true

# Frontend configuration
frontend:
  enabled: true
  image:
    repository: git.pmon.dev/schnappy/monitor-frontend
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "200m"
  service:
    type: ClusterIP
    port: 8080

# Application configuration (backend API)
app:
  image:
    repository: git.pmon.dev/schnappy/monitor
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  javaOpts: "-Xmx1536m"
  hikari:
    minimumIdle: 2
    maximumPoolSize: 25
    idleTimeout: 300000
    maxLifetime: 1200000
    connectionTimeout: 20000
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "2500m"
  service:
    type: ClusterIP
    port: 8080
  ingress:
    enabled: true
    # className: nginx for nginx-ingress, traefik for k3s default
    className: traefik
    host: monitor.local
    annotations: {}
    # TLS configuration (optional)
    tls:
      enabled: false
      secretName: ""
      clusterIssuer: "letsencrypt-prod"

# Authentication
auth:
  jwtSecret: ""  # Required. Set via --set auth.jwtSecret=XXX
  existingSecret: ""  # Use existing secret instead of creating one
  tokenExpiration: 1h
  registrationEnabled: true
  secureCookies: true
  registrationApproval:
    mode: ai            # ai, admin, or skip
    criteria: ""        # AI evaluation criteria (empty = default)
    defaultGroup: Users # Group assigned on approval

# Monitor configuration
monitor:
  enabled: true
  http:
    connectTimeout: 10s
    readTimeout: 30s
    userAgent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:134.0) Gecko/20100101 Firefox/134.0"

# Mail configuration (optional, for password reset)
mail:
  enabled: false
  host: smtp.gmail.com
  port: 587
  username: ""
  password: ""
  existingSecret: ""
  fromAddress: "noreply@example.com"
  appUrl: "http://localhost:3000"

# AI configuration (optional)
ai:
  enabled: false
  apiKey: ""
  existingSecret: ""
  model: "claude-sonnet-4-5-20250929"

# Webhook configuration (for Resend inbound email)
webhook:
  enabled: false
  signingSecret: ""
  apiKey: ""
  existingSecret: ""

# MinIO configuration (optional, for email attachment storage)
minio:
  enabled: false
  image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
  accessKey: ""
  secretKey: ""
  existingSecret: ""
  bucket: "email-attachments"
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  storage:
    size: 20Gi
    storageClass: ""

# Redis configuration (volatile cache, no persistence)
redis:
  enabled: true
  image: redis:7-alpine
  password: ""  # Set via --set redis.password=XXX for authentication
  existingSecret: ""
  resources:
    requests:
      memory: "64Mi"
      cpu: "25m"
    limits:
      memory: "256Mi"
      cpu: "200m"

# PostgreSQL configuration
postgres:
  enabled: true
  image: postgres:17-alpine
  database: monitor
  username: postgres
  # WARNING: Change in production! Use --set postgres.password=XXX or existingSecret
  password: ""  # Empty = will fail; must be set explicitly
  # Use existing secret instead of creating one
  existingSecret: ""
  # PostgreSQL tuning
  sharedBuffers: "512MB"
  effectiveCacheSize: "1536MB"
  workMem: "16MB"
  maintenanceWorkMem: "128MB"
  maxParallelWorkersPerGather: 2
  maxParallelWorkers: 8
  maxWorkerProcesses: 8
  effectiveIoConcurrency: 1
  randomPageCost: "4.0"
  resources:
    requests:
      memory: "512Mi"
      cpu: "100m"
    limits:
      memory: "2Gi"
      cpu: "1000m"
  storage:
    size: 1Gi
    storageClass: ""

# Prometheus configuration
prometheus:
  enabled: false
  image: prom/prometheus:latest
  retention: 15d
  scrapeInterval: 15s
  vault:
    enabled: false
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  storage:
    size: 2Gi
    storageClass: ""

# Grafana configuration
grafana:
  enabled: false
  image: grafana/grafana:latest
  adminUser: admin
  # WARNING: Change in production! Use --set grafana.adminPassword=XXX or existingSecret
  adminPassword: ""  # Empty = will fail; must be set explicitly
  # Use existing secret instead of creating one
  existingSecret: ""
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "500m"
  storage:
    size: 1Gi
    storageClass: ""
  service:
    type: ClusterIP
    port: 3000
  ingress:
    enabled: false
    className: ""
    host: ""
    tls:
      enabled: false
      secretName: ""
      clusterIssuer: "letsencrypt-prod"

chat:
  e2eEnabled: false             # Enable end-to-end encryption for chat channels

# Hashcash proof-of-work captcha (uses existing Redis)
captcha:
  enabled: true                 # Enable PoW captcha on auth endpoints

# Kafka (KRaft mode, for chat messaging)
kafka:
  image: apache/kafka:4.2.0
  replicas: 1
  clusterId: ""                 # Generated once, stored in Vault
  existingSecret: ""
  javaOpts: "-Xmx1g -Xms1g"
  retention:
    hours: 168                  # 7 days
    bytes: "10737418240"        # 10GB per topic
  topics:
    - name: chat.messages
      partitions: 12
      replicationFactor: 1
    - name: chat.events
      partitions: 6
      replicationFactor: 1
    - name: chat.notifications
      partitions: 3
      replicationFactor: 1
  resources:
    requests:
      memory: "1Gi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "2000m"
  storage:
    size: 10Gi
    storageClass: ""

# ScyllaDB (chat message storage)
scylla:
  image: scylladb/scylla:6.2
  replicas: 1
  args:
    - "--smp=2"
    - "--memory=2G"
    - "--overprovisioned=1"
    - "--developer-mode=1"
  resources:
    requests:
      memory: "2Gi"
      cpu: "500m"
    limits:
      memory: "4Gi"
      cpu: "4000m"
  storage:
    size: 20Gi
    storageClass: ""

# SonarQube (code quality analysis)
sonarqube:
  enabled: false
  image: sonarqube:26.3.0.120487-community
  javaOpts: "-Xms512m -Xmx512m"
  adminPassword: ""            # SonarQube admin password (set via --set or existingSecret)
  token: ""                   # SonarQube API token for CI analysis
  existingSecret: ""
  postgres:
    password: ""              # SonarQube's dedicated PostgreSQL password
  resources:
    requests:
      memory: "2Gi"
      cpu: "500m"
    limits:
      memory: "4Gi"
      cpu: "4000m"
  storage:
    size: 5Gi
    storageClass: ""
  service:
    type: ClusterIP
    port: 9000
  ingress:
    enabled: false
    className: traefik
    host: "sonar.pmon.dev"
    tls:
      enabled: false
      secretName: ""
      clusterIssuer: "letsencrypt-prod"
  postgresResources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "1000m"
  postgresStorage:
    size: 5Gi
    storageClass: ""

# ELK Stack (Elasticsearch + Kibana + Fluent-bit)
elk:
  enabled: false
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.8
    replicas: 1
    javaOpts: "-Xms1g -Xmx1g"
    password: ""
    existingSecret: ""
    resources:
      requests:
        memory: "2Gi"
        cpu: "500m"
      limits:
        memory: "4Gi"
        cpu: "4000m"
    storage:
      size: 50Gi
      storageClass: ""
    retention:
      days: 30
  kibana:
    image: docker.elastic.co/kibana/kibana:8.19.8
    replicas: 1
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "1000m"
    ingress:
      enabled: false
      className: traefik
      host: "logs.pmon.dev"
      tls:
        enabled: false
        secretName: ""
        clusterIssuer: "letsencrypt-prod"
  fluentbit:
    image: cr.fluentbit.io/fluent/fluent-bit:4.2.3
    resources:
      requests:
        memory: "128Mi"
        cpu: "50m"
      limits:
        memory: "256Mi"
        cpu: "200m"
