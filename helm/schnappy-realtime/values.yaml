nameOverride: schnappy

vault:
  secretsEnabled: false
  secretPathPrefix: "secret/data/schnappy"

networkPolicies:
  enabled: true

# Istio gateway (HTTPRoute parent reference)
gateway:
  enabled: false
  name: ""
  namespace: ""
  hosts:
    realtime: ""   # e.g. rt.pmon.dev

centrifugo:
  enabled: true
  image: centrifugo/centrifugo:v6
  replicas: 2
  resources:
    requests: { cpu: "100m", memory: "128Mi" }
    limits:   { cpu: "1",    memory: "512Mi" }

  # JWKS-based JWT validation against Keycloak
  jwks:
    publicEndpoint: "https://auth.pmon.dev/realms/schnappy/protocol/openid-connect/certs"
    audience: "centrifugo"

  # Vault path for the centrifugo Secret (admin/api/HMAC fallback)
  externalSecret:
    enabled: false
    refreshInterval: 15m

  # Channel namespaces.
  # `protected: true` → subscriptions require an HS256 sub-token from
  # admin (Plan 066 Option C). `allowedUserChannels: "$"` → Centrifugo
  # natively gates by JWT `sub` matching the channel's `#user-id` suffix
  # (no token needed for own-user channels).
  namespaces:
    - name: chess
      protected: true
      presence: true
      historySize: 200
      historyTtl: "168h"   # 7d
      recover: true
      forceRecovery: true
    - name: chat
      protected: true
      presence: true
      historySize: 100
      historyTtl: "720h"   # 30d
      recover: true
      forceRecovery: false
    - name: notifications
      allowedUserChannels: "$"
      presence: false
      historySize: 50
      historyTtl: "168h"
      recover: true
      forceRecovery: false
    - name: presence
      allowedUserChannels: "$"
      presence: false
      historySize: 0
      historyTtl: "0s"
      recover: false
      forceRecovery: false

  # Kafka async-consumer ingest (apps publish to Kafka, Centrifugo fans out).
  kafka:
    enabled: true
    brokers:
      - schnappy-kafka-bootstrap:9092
    consumerGroup: centrifugo
    topics:
      - events.chat.messages
      - events.chess.moves
      - events.notifications

  # Cross-namespace deployment knob. When Centrifugo runs in a separate
  # namespace from Valkey/Kafka (the production layout), set this to the
  # data-layer namespace so the NetworkPolicy egress can reach pods in
  # that namespace and the ESO Secret pulls the Valkey password from
  # Vault rather than expecting it as a same-namespace Secret.
  dataNamespace: ""

  # Valkey engine (Plan 064 — operator-managed Service `schnappy-valkey`).
  # Centrifugo's Redis engine is wire-compatible with Valkey.
  valkey:
    # FQDN works for same-namespace and cross-namespace; override per env.
    address: "schnappy-valkey:6379"
    # Same-namespace mode: read VALKEY_PASSWORD from a separate Secret
    # named below. Cross-namespace: set fromVault=true to source the
    # password via the centrifugo ESO instead.
    fromVault: false
    secretName: schnappy-valkey
    secretKey: VALKEY_PASSWORD

  # Subscription token (Plan 066 Option C). Channel sub-tokens are
  # minted by admin service, signed HS256 with the secret below.
  # Centrifugo verifies on SUBSCRIBE for `protected: true` namespaces.
  subscriptionToken:
    enabled: true
    # Env var name read by Centrifugo's config (rendered into config.yaml
    # as ${CENTRIFUGO_SUB_TOKEN_SECRET}). Populated from the ESO-managed
    # Secret (key `sub_token_secret`).
    envVar: CENTRIFUGO_SUB_TOKEN_SECRET

  # Strimzi-managed KafkaTopic CRs. Set strimzi.enabled=false in vagrant
  # tests that don't run Strimzi to skip topic creation.
  topics:
    create: true
    partitions: 6
    replicas: 1
    retentionHours: 168   # 7d

# Strimzi operator presence — gates KafkaTopic CRs.
strimzi:
  enabled: true
