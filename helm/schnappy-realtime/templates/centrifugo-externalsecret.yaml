{{- if and .Values.centrifugo.enabled .Values.vault.secretsEnabled .Values.centrifugo.externalSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "schnappy.centrifugo.secretName" . }}
  labels:
    {{- include "schnappy.centrifugo.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.centrifugo.externalSecret.refreshInterval | quote }}
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: {{ include "schnappy.centrifugo.secretName" . }}
  # Secret keys match Centrifugo v6's env-var override convention:
  # CENTRIFUGO_<UPPER_SNAKE_OF_DOTTED_PATH>. The Deployment projects
  # these keys directly as env vars — no ${VAR} substitution in YAML.
  data:
    - secretKey: CENTRIFUGO_ADMIN_PASSWORD
      remoteRef:
        key: {{ .Values.vault.secretPathPrefix }}/centrifugo
        property: admin_password
    - secretKey: CENTRIFUGO_ADMIN_SECRET
      remoteRef:
        key: {{ .Values.vault.secretPathPrefix }}/centrifugo
        property: admin_secret
    - secretKey: CENTRIFUGO_HTTP_API_KEY
      remoteRef:
        key: {{ .Values.vault.secretPathPrefix }}/centrifugo
        property: api_key
    {{- if .Values.centrifugo.subscriptionToken.enabled }}
    - secretKey: CENTRIFUGO_CLIENT_SUBSCRIPTION_TOKEN_HMAC_SECRET_KEY
      remoteRef:
        key: {{ .Values.vault.secretPathPrefix }}/centrifugo
        property: sub_token_secret
    {{- end }}
    {{- if .Values.centrifugo.valkey.fromVault }}
    # When Centrifugo runs in a different namespace than Valkey, the
    # data-layer Valkey Secret isn't reachable. Pull the password
    # directly from Vault into Centrifugo's own secret.
    - secretKey: CENTRIFUGO_ENGINE_REDIS_PASSWORD
      remoteRef:
        key: {{ .Values.vault.secretPathPrefix }}/valkey
        property: password
    {{- end }}
{{- end }}
