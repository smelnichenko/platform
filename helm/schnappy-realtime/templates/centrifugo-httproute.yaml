{{- if and .Values.centrifugo.enabled .Values.gateway.enabled .Values.gateway.hosts.realtime }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "schnappy.centrifugo.serviceName" . }}-route
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "schnappy.centrifugo.labels" . | nindent 4 }}
spec:
  hostnames:
    - {{ .Values.gateway.hosts.realtime | quote }}
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
      sectionName: https
  rules:
    - matches:
        - { path: { type: PathPrefix, value: / } }
      backendRefs:
        - { name: {{ include "schnappy.centrifugo.serviceName" . }}, port: 8000 }
{{- end }}
