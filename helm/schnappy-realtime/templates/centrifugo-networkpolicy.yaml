{{- if and .Values.centrifugo.enabled .Values.networkPolicies.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "schnappy.centrifugo.serviceName" . }}
  labels:
    {{- include "schnappy.centrifugo.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "schnappy.centrifugo.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Istio gateway / browser WS clients arrive via Istio sidecar — Istio
    # AuthorizationPolicy enforces who's allowed; NP just opens the port.
    - from: []
      ports:
        - { protocol: TCP, port: 8000 }
  egress:
    - ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
    # → Valkey (engine). When deployed cross-namespace, set
    # `centrifugo.dataNamespace` so the namespaceSelector matches the
    # data layer. Empty value falls back to same-namespace pod-selector.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: valkey
          {{- if .Values.centrifugo.dataNamespace }}
          namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.centrifugo.dataNamespace | quote }}
          {{- end }}
      ports:
        - { protocol: TCP, port: 6379 }
    # → Kafka brokers. Strimzi labels pods differently from a hand-rolled
    # Kafka deployment; pick the right matcher.
    - to:
        - podSelector:
            matchLabels:
              {{- if .Values.strimzi.enabled }}
              strimzi.io/cluster: {{ .Values.strimzi.clusterName | default (include "schnappy.fullname" .) }}
              strimzi.io/kind: Kafka
              {{- else }}
              app.kubernetes.io/component: kafka
              {{- end }}
          {{- if .Values.centrifugo.dataNamespace }}
          namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.centrifugo.dataNamespace | quote }}
          {{- end }}
      ports:
        - { protocol: TCP, port: 9092 }
        - { protocol: TCP, port: 9093 }   # Strimzi tls listener
    # → Keycloak JWKS endpoint (HTTPS to public DNS)
    - to:
        - ipBlock: { cidr: 0.0.0.0/0 }
      ports:
        - { protocol: TCP, port: 443 }
{{- end }}
