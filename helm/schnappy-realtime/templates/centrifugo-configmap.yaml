{{- if .Values.centrifugo.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "schnappy.centrifugo.serviceName" . }}-config
  labels:
    {{- include "schnappy.centrifugo.labels" . | nindent 4 }}
data:
  # Centrifugo v6 does not perform `${VAR}` substitution in the YAML
  # config. It auto-overrides each config key from an env var whose
  # name = `CENTRIFUGO_` + UPPER_SNAKE of the dotted path. Secret-bearing
  # fields are therefore omitted from this YAML and projected via the
  # Deployment's env (see centrifugo-deployment.yaml).
  config.yaml: |
    log_level: info

    admin:
      enabled: true
      # password + secret come from CENTRIFUGO_ADMIN_PASSWORD / _ADMIN_SECRET env

    http_api:
      # key comes from CENTRIFUGO_HTTP_API_KEY env
      enabled: true

    health:
      enabled: true

    prometheus:
      enabled: true

    client:
      # Connection JWT verified against Keycloak's JWKS — same Keycloak
      # access token the SPA already holds.
      token:
        jwks_public_endpoint: {{ .Values.centrifugo.jwks.publicEndpoint | quote }}
        audience: {{ .Values.centrifugo.jwks.audience | quote }}
      {{- if .Values.centrifugo.subscriptionToken.enabled }}
      # Subscription tokens (Plan 066 Option C). Minted per-channel by
      # admin service for `protected: true` namespaces; HS256.
      # hmac_secret_key sourced from CENTRIFUGO_CLIENT_SUBSCRIPTION_TOKEN_HMAC_SECRET_KEY env.
      subscription_token: {}
      {{- end }}

    # Valkey-backed engine (broker + presence + history).
    engine:
      type: redis
      redis:
        address: {{ .Values.centrifugo.valkey.address | quote }}
        # password from CENTRIFUGO_ENGINE_REDIS_PASSWORD env
        use_lists: true
        presence_user_mapping: true

    {{- if .Values.centrifugo.kafka.enabled }}
    consumers:
      # name must match ^[a-zA-Z0-9_]{2,}$ — no hyphens.
      - name: kafka_events
        enabled: true
        type: kafka
        kafka:
          brokers:
            {{- range .Values.centrifugo.kafka.brokers }}
            - {{ . | quote }}
            {{- end }}
          topics:
            {{- range .Values.centrifugo.kafka.topics }}
            - {{ . | quote }}
            {{- end }}
          consumer_group: {{ .Values.centrifugo.kafka.consumerGroup | quote }}
        # Map our envelope's `service` + `subject` into the publication
        # channel and embed the whole envelope as the data payload.
        publication_data_mode:
          enabled: true
          channel_template: "{{ "{{" }} .service {{ "}}" }}:{{ "{{" }} .subject {{ "}}" }}"
          data_template: "{{ "{{" }} . {{ "}}" }}"
    {{- end }}

    channel:
      namespaces:
        {{- range .Values.centrifugo.namespaces }}
        - name: {{ .name | quote }}
          presence: {{ .presence }}
          history_size: {{ .historySize }}
          history_ttl: {{ .historyTtl | quote }}
          {{- if .recover }}
          force_recovery: {{ .forceRecovery }}
          {{- end }}
          {{- if .protected }}
          protected: true
          {{- end }}
          {{- if .allowedUserChannels }}
          allowed_user_channels: {{ .allowedUserChannels | quote }}
          {{- end }}
        {{- end }}
{{- end }}
