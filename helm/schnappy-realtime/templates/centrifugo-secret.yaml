{{- if and .Values.centrifugo.enabled (not .Values.centrifugo.externalSecret.enabled) }}
# Inline Secret for vagrant tests where ESO isn't configured.
# Production uses centrifugo-externalsecret.yaml.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "schnappy.centrifugo.secretName" . }}
  labels:
    {{- include "schnappy.centrifugo.labels" . | nindent 4 }}
type: Opaque
stringData:
  CENTRIFUGO_ADMIN_PASSWORD: {{ .Values.centrifugo.adminPassword | default "vagrant-centrifugo-admin" | quote }}
  CENTRIFUGO_ADMIN_SECRET: {{ .Values.centrifugo.adminSecret | default "vagrant-centrifugo-admin-secret" | quote }}
  CENTRIFUGO_API_KEY: {{ .Values.centrifugo.apiKey | default "vagrant-centrifugo-api-key" | quote }}
{{- end }}
