{{- if and .Values.centrifugo.enabled (not .Values.centrifugo.externalSecret.enabled) }}
# Inline Secret. Used in vagrant tests where ESO isn't configured;
# every prod deploy must set externalSecret.enabled=true so this
# template stays out and the credentials come from Vault.
#
# No defaults: Helm fails fast if a required key isn't set, which is
# better than shipping placeholder credentials that someone forgets
# to override.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "schnappy.centrifugo.secretName" . }}
  labels:
    {{- include "schnappy.centrifugo.labels" . | nindent 4 }}
type: Opaque
stringData:
  CENTRIFUGO_ADMIN_PASSWORD: {{ required "centrifugo.adminPassword required when externalSecret.enabled=false" .Values.centrifugo.adminPassword | quote }}
  CENTRIFUGO_ADMIN_SECRET: {{ required "centrifugo.adminSecret required when externalSecret.enabled=false" .Values.centrifugo.adminSecret | quote }}
  CENTRIFUGO_API_KEY: {{ required "centrifugo.apiKey required when externalSecret.enabled=false" .Values.centrifugo.apiKey | quote }}
{{- end }}
