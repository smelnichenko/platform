{{- /* The centrifugo ServiceAccount is owned by the schnappy-mesh chart
       (it's pre-created so AuthorizationPolicies can reference its
       principal before any workload deploys). This chart only references
       the SA by name. */}}
{{- if .Values.centrifugo.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "schnappy.centrifugo.serviceName" . }}
  labels:
    {{- include "schnappy.centrifugo.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.centrifugo.replicas }}
  selector:
    matchLabels:
      {{- include "schnappy.centrifugo.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/centrifugo-configmap.yaml") . | sha256sum }}
      labels:
        {{- include "schnappy.centrifugo.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/part-of: schnappy
    spec:
      serviceAccountName: {{ include "schnappy.centrifugo.serviceName" . }}
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: centrifugo
          image: {{ .Values.centrifugo.image }}
          # Image has CMD ["centrifugo"] and no ENTRYPOINT — args alone
          # would replace CMD wholesale. Set command explicitly.
          command: ["centrifugo"]
          args:
            - "--config=/etc/centrifugo/config.yaml"
          # Centrifugo v6 reads `engine.redis.password`, `http_api.key`,
          # `admin.password`, `admin.secret`, and `client.subscription_token.hmac_secret_key`
          # from env vars whose names follow CENTRIFUGO_<UPPER_SNAKE_OF_PATH>.
          # That convention is the *only* way to inject secrets — Centrifugo
          # does not expand ${VAR} in the YAML config.
          env:
            # engine.redis.password — sourced from data-layer Valkey secret
            # (same-namespace) or from this chart's ESO-managed secret
            # (cross-namespace via fromVault).
            - name: CENTRIFUGO_ENGINE_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  {{- if .Values.centrifugo.valkey.fromVault }}
                  name: {{ include "schnappy.centrifugo.secretName" . }}
                  key: CENTRIFUGO_ENGINE_REDIS_PASSWORD
                  {{- else }}
                  name: {{ .Values.centrifugo.valkey.secretName }}
                  key: {{ .Values.centrifugo.valkey.secretKey }}
                  {{- end }}
                  optional: true
            - name: CENTRIFUGO_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.centrifugo.secretName" . }}
                  key: CENTRIFUGO_ADMIN_PASSWORD
            - name: CENTRIFUGO_ADMIN_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.centrifugo.secretName" . }}
                  key: CENTRIFUGO_ADMIN_SECRET
            - name: CENTRIFUGO_HTTP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.centrifugo.secretName" . }}
                  key: CENTRIFUGO_HTTP_API_KEY
            {{- if .Values.centrifugo.subscriptionToken.enabled }}
            - name: CENTRIFUGO_CLIENT_SUBSCRIPTION_TOKEN_HMAC_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.centrifugo.secretName" . }}
                  key: CENTRIFUGO_CLIENT_SUBSCRIPTION_TOKEN_HMAC_SECRET_KEY
            {{- end }}
          ports:
            # Centrifugo v6 multiplexes ws/api/admin/health/metrics on
            # one port; default is 8000.
            - { name: http, containerPort: 8000 }
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.centrifugo.resources | nindent 12 }}
          volumeMounts:
            - { name: config, mountPath: /etc/centrifugo, readOnly: true }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
      volumes:
        - name: config
          configMap:
            name: {{ include "schnappy.centrifugo.serviceName" . }}-config
{{- end }}
