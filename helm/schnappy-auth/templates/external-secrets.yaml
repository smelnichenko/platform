{{- if .Values.vault.secretsEnabled }}
{{- if eq (.Values.keycloak.enabled | toString) "true" }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "schnappy.keycloak.secretName" . }}
  labels:
    {{- include "schnappy.keycloak.labels" . | nindent 4 }}
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: {{ include "schnappy.keycloak.secretName" . }}
  data:
    - secretKey: KEYCLOAK_ADMIN_PASSWORD
      remoteRef:
        key: secret/data/schnappy/keycloak
        property: admin_password
    - secretKey: KEYCLOAK_DB_PASSWORD
      remoteRef:
        key: secret/data/schnappy/keycloak
        property: db_password
    {{- if eq (.Values.keycloak.clients.forgejo.enabled | toString) "true" }}
    - secretKey: FORGEJO_CLIENT_SECRET
      remoteRef:
        key: secret/data/schnappy/keycloak
        property: forgejo_client_secret
    {{- end }}
    {{- if eq (.Values.keycloak.clients.adminService.enabled | toString) "true" }}
    - secretKey: ADMIN_SERVICE_CLIENT_SECRET
      remoteRef:
        key: secret/data/schnappy/keycloak
        property: admin_service_client_secret
    {{- end }}
    {{- if eq (.Values.keycloak.clients.argocd.enabled | toString) "true" }}
    - secretKey: ARGOCD_CLIENT_SECRET
      remoteRef:
        key: secret/data/schnappy/keycloak
        property: argocd_client_secret
    {{- end }}
    {{- if eq (.Values.keycloak.clients.k6Smoke.enabled | toString) "true" }}
    - secretKey: K6_SMOKE_CLIENT_SECRET
      remoteRef:
        key: secret/data/schnappy/k6-smoke
        property: client_secret
    {{- end }}
{{- end }}
{{- end }}
