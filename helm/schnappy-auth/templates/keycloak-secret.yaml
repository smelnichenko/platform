{{- if and (eq (.Values.keycloak.enabled | toString) "true") (not .Values.keycloak.existingSecret) }}
{{- if not .Values.keycloak.dbPassword }}
{{- fail "keycloak.dbPassword is required. Set via --set keycloak.dbPassword=XXX or use keycloak.existingSecret" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "schnappy.keycloak.secretName" . }}
  labels:
    {{- include "schnappy.keycloak.labels" . | nindent 4 }}
type: Opaque
stringData:
  KEYCLOAK_DB_PASSWORD: {{ .Values.keycloak.dbPassword | quote }}
  {{- if .Values.keycloak.adminPassword }}
  KEYCLOAK_ADMIN_PASSWORD: {{ .Values.keycloak.adminPassword | quote }}
  {{- end }}
  {{- if eq (.Values.keycloak.clients.adminService.enabled | toString) "true" }}
  {{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace (include "schnappy.keycloak.secretName" .)) }}
  {{- $existingAdminServiceSecret := "" }}
  {{- if $existingSecret }}
    {{- $existingAdminServiceSecret = index $existingSecret.data "ADMIN_SERVICE_CLIENT_SECRET" | default "" | b64dec }}
  {{- end }}
  ADMIN_SERVICE_CLIENT_SECRET: {{ $existingAdminServiceSecret | default (randAlphaNum 32) | quote }}
  {{- end }}
  {{- if eq (.Values.keycloak.clients.argocd.enabled | toString) "true" }}
  {{- $existingSecret2 := (lookup "v1" "Secret" .Release.Namespace (include "schnappy.keycloak.secretName" .)) }}
  {{- $existingArgocdSecret := "" }}
  {{- if $existingSecret2 }}
    {{- $existingArgocdSecret = index $existingSecret2.data "ARGOCD_CLIENT_SECRET" | default "" | b64dec }}
  {{- end }}
  ARGOCD_CLIENT_SECRET: {{ $existingArgocdSecret | default (randAlphaNum 32) | quote }}
  {{- end }}
{{- end }}
