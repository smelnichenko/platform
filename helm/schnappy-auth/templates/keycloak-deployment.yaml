{{- if eq (.Values.keycloak.enabled | toString) "true" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "schnappy.keycloak.serviceName" . }}
  labels:
    {{- include "schnappy.keycloak.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "schnappy.keycloak.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/keycloak-realm-configmap.yaml") . | sha256sum }}
      labels:
        {{- include "schnappy.keycloak.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/part-of: schnappy
    spec:
      serviceAccountName: {{ include "schnappy.fullname" . }}-keycloak
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.37
          command: ['sh', '-c', 'until nc -z {{ include "schnappy.postgres.serviceName" . }} 5432; do echo "Waiting for postgres..."; sleep 2; done']
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
        - name: realm-init
          image: {{ .Values.keycloak.image }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              for f in /realm-templates/*.json; do
                sed -e "s|SMTP_PASSWORD_PLACEHOLDER|$KC_SMTP_PASSWORD|g" \
                    -e "s|FORGEJO_CLIENT_SECRET_PLACEHOLDER|$FORGEJO_CLIENT_SECRET|g" \
                    -e "s|GRAFANA_CLIENT_SECRET_PLACEHOLDER|$GRAFANA_CLIENT_SECRET|g" \
                    -e "s|ADMIN_SERVICE_CLIENT_SECRET_PLACEHOLDER|$ADMIN_SERVICE_CLIENT_SECRET|g" \
                    -e "s|ARGOCD_CLIENT_SECRET_PLACEHOLDER|$ARGOCD_CLIENT_SECRET|g" \
                    -e "s|K6_SMOKE_CLIENT_SECRET_PLACEHOLDER|$K6_SMOKE_CLIENT_SECRET|g" \
                    "$f" > "/opt/keycloak/data/import/$(basename $f)"
              done
          env:
            {{- if eq (.Values.mail.enabled | toString) "true" }}
            - name: KC_SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.mail.secretName" . }}
                  key: MAIL_PASSWORD
            {{- end }}
            {{- if eq (.Values.keycloak.clients.forgejo.enabled | toString) "true" }}
            - name: FORGEJO_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.keycloak.secretName" . }}
                  key: FORGEJO_CLIENT_SECRET
            {{- end }}
            {{- if eq (.Values.keycloak.clients.grafana.enabled | toString) "true" }}
            - name: GRAFANA_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.grafana.secretName" . }}
                  key: oauth-client-secret
            {{- end }}
            {{- if eq (.Values.keycloak.clients.adminService.enabled | toString) "true" }}
            - name: ADMIN_SERVICE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.keycloak.secretName" . }}
                  key: ADMIN_SERVICE_CLIENT_SECRET
            {{- end }}
            {{- if eq (.Values.keycloak.clients.argocd.enabled | toString) "true" }}
            - name: ARGOCD_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.keycloak.secretName" . }}
                  key: ARGOCD_CLIENT_SECRET
            {{- end }}
            {{- if eq (.Values.keycloak.clients.k6Smoke.enabled | toString) "true" }}
            - name: K6_SMOKE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.keycloak.secretName" . }}
                  key: K6_SMOKE_CLIENT_SECRET
            {{- end }}
          volumeMounts:
            - name: realm-templates
              mountPath: /realm-templates
              readOnly: true
            - name: realm-import
              mountPath: /opt/keycloak/data/import
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      containers:
        - name: keycloak
          image: {{ .Values.keycloak.image }}
          args:
            - start
            - --import-realm
          env:
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: "jdbc:postgresql://{{ include "schnappy.postgres.serviceName" . }}:5432/keycloak"
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.postgres.secretName" . }}
                  key: POSTGRES_USER
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.postgres.secretName" . }}
                  key: POSTGRES_PASSWORD
            - name: KC_HOSTNAME
              value: {{ .Values.keycloak.hostname | quote }}
            - name: KC_PROXY_HEADERS
              value: xforwarded
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KC_METRICS_ENABLED
              value: "true"
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: temp-admin
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.keycloak.secretName" . }}
                  key: KEYCLOAK_ADMIN_PASSWORD
            - name: KC_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.keycloak.secretName" . }}
                  key: KEYCLOAK_ADMIN_PASSWORD
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    # Wait for Keycloak to be ready, then replace temp admin with permanent one
                    (for i in $(seq 1 60); do
                      # If permanent admin already works, nothing to do
                      if /opt/keycloak/bin/kcadm.sh config credentials --server http://localhost:8080 --realm master --user {{ .Values.keycloak.adminUser }} --password "$KC_ADMIN_PASSWORD" 2>/dev/null; then
                        exit 0
                      fi
                      # Try temp-admin (first deploy only)
                      if /opt/keycloak/bin/kcadm.sh config credentials --server http://localhost:8080 --realm master --user temp-admin --password "$KC_ADMIN_PASSWORD" 2>/dev/null; then
                        /opt/keycloak/bin/kcadm.sh create users -r master -s username={{ .Values.keycloak.adminUser }} -s enabled=true -s emailVerified=true 2>/dev/null
                        /opt/keycloak/bin/kcadm.sh set-password -r master --username {{ .Values.keycloak.adminUser }} --new-password "$KC_ADMIN_PASSWORD" 2>/dev/null
                        /opt/keycloak/bin/kcadm.sh add-roles -r master --uusername {{ .Values.keycloak.adminUser }} --rolename admin 2>/dev/null
                        TEMP_ID=$(/opt/keycloak/bin/kcadm.sh get users -r master -q username=temp-admin --fields id 2>/dev/null | grep '"id"' | sed 's/.*"\([^"]*\)".*/\1/' | head -1)
                        [ -n "$TEMP_ID" ] && /opt/keycloak/bin/kcadm.sh delete "users/$TEMP_ID" -r master 2>/dev/null
                        exit 0
                      fi
                      sleep 5
                    done) &
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health/ready
              port: 9000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.keycloak.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: realm-import
              mountPath: /opt/keycloak/data/import
              readOnly: true
      volumes:
        - name: realm-templates
          configMap:
            name: {{ include "schnappy.keycloak.serviceName" . }}-realm
        - name: realm-import
          emptyDir: {}
{{- end }}
