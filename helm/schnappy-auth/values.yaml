# Authentication chart (Keycloak SSO)
nameOverride: schnappy

vault:
  secretsEnabled: false

networkPolicies:
  enabled: true

keycloak:
  enabled: false
  image: quay.io/keycloak/keycloak:26.5.6
  adminUser: admin
  adminPassword: ""
  dbPassword: ""
  existingSecret: ""
  hostname: auth.pmon.dev
  mail:
    from: ""
    fromDisplayName: schnappy
  clients:
    app:
      enabled: false
      redirectUri: ""
    forgejo:
      enabled: false
      redirectUri: ""
    grafana:
      enabled: false
      redirectUri: ""
    adminService:
      enabled: false
    k6Smoke:
      enabled: false
    argocd:
      enabled: false
      host: cd.pmon.dev
  resources:
    requests: { cpu: "500m", memory: "512Mi" }
    limits: { cpu: "2000m", memory: "1Gi" }
  ingress:
    enabled: false
    className: traefik
    host: auth.pmon.dev
    tls:
      enabled: false
      clusterIssuer: letsencrypt-dns
      secretName: auth-pmon-dev-tls

# Cross-chart references (for keycloak SMTP config)
mail:
  enabled: false
  existingSecret: ""
  host: smtp.gmail.com
  port: "587"
  username: ""
  fromAddress: "noreply@example.com"
