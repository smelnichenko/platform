nameOverride: schnappy

# Strict mTLS for all pod-to-pod traffic
peerAuthentication:
  enabled: true
  mode: STRICT

# L4 AuthorizationPolicies (enforced by ztunnel)
authorizationPolicies:
  enabled: true

# Istio ingress gateway (replaces Traefik + Envoy Gateway)
gateway:
  enabled: false
  loadBalancerIP: "192.168.11.2"
  tls:
    clusterIssuer: letsencrypt-prod
  hosts:
    app: pmon.dev
    auth: auth.pmon.dev
    grafana: grafana.pmon.dev
    logs: logs.pmon.dev
    reports: reports.pmon.dev
    sonar: sonar.pmon.dev

# JWT validation via Keycloak
jwt:
  enabled: false
  issuer: https://auth.pmon.dev/realms/schnappy
  jwksUri: http://schnappy-keycloak:8080/realms/schnappy/protocol/openid-connect/certs
