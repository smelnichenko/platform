nameOverride: schnappy

scyllaOperator:
  enabled: false

# Strict mTLS for all pod-to-pod traffic
peerAuthentication:
  enabled: true
  mode: STRICT

# AuthorizationPolicies (enforced by sidecar proxy)
authorizationPolicies:
  enabled: true

# Istio ingress gateway
gateway:
  enabled: false
  infraOnly: false
  loadBalancerIP: "192.168.11.2"
  allowedNamespaces: []
  external:
    enabled: false
    gatewayName: ""
    gatewayNamespace: ""
    hostname: ""
  tls:
    clusterIssuer: letsencrypt-prod
  hosts:
    app: pmon.dev
    auth: auth.pmon.dev
    grafana: grafana.pmon.dev
    logs: logs.pmon.dev
    reports: reports.pmon.dev
    sonar: sonar.pmon.dev
    argocd: cd.pmon.dev
    forgejo: git.pmon.dev
    ci: ci.pmon.dev
    hubble: ""

# JWT validation on app routes only (not sonar/ci/git/auth)
jwt:
  enabled: false
  issuer: https://auth.pmon.dev/realms/schnappy
  jwksUri: https://auth.pmon.dev/realms/schnappy/protocol/openid-connect/certs
  passthroughHosts: []
