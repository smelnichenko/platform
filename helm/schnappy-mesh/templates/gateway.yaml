{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ include "schnappy.fullname" . }}-gateway
  namespace: {{ .Release.Namespace }}
spec:
  gatewayClassName: istio
  addresses:
    - type: IPAddress
      value: {{ .Values.gateway.loadBalancerIP | quote }}
  infrastructure:
    labels:
      gateway.istio.io/managed: istio.io-gateway-controller
  listeners:
    # HTTPS — apex domain (*.pmon.dev doesn't match bare pmon.dev)
    - name: https-apex
      hostname: {{ .Values.gateway.hosts.app | quote }}
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: pmon-dev-wildcard-tls
      allowedRoutes:
        namespaces:
          from: Same
    # HTTPS — all subdomains (single wildcard listener prevents
    # HTTP/2 connection coalescing 404s across subdomains)
    - name: https
      hostname: "*.pmon.dev"
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: pmon-dev-wildcard-tls
      allowedRoutes:
        namespaces:
          from: All
    # HTTP → HTTPS redirect
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
{{- end }}
