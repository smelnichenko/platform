{{- if .Values.gateway.enabled }}
{{- $fn := include "schnappy.fullname" . }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ $fn }}-gateway
  namespace: {{ .Release.Namespace }}
  annotations:
    networking.istio.io/service-type: ClusterIP
spec:
  gatewayClassName: istio
  infrastructure:
    labels:
      gateway.istio.io/managed: istio.io-gateway-controller
  listeners:
    # HTTPS — apex domain (*.pmon.dev doesn't match bare pmon.dev)
    - name: https-apex
      hostname: {{ .Values.gateway.hosts.app | quote }}
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: pmon-dev-wildcard-tls
      allowedRoutes:
        namespaces:
          from: Same
    # HTTPS — all subdomains (single wildcard listener prevents
    # HTTP/2 connection coalescing 404s across subdomains)
    - name: https
      hostname: "*.pmon.dev"
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: pmon-dev-wildcard-tls
      allowedRoutes:
        namespaces:
          from: All
    # HTTP → HTTPS redirect
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
---
# Pre-create gateway service with externalIPs so Istio adopts it.
# Istio manages the service but preserves externalIPs we set here.
apiVersion: v1
kind: Service
metadata:
  name: {{ $fn }}-gateway-istio
  namespace: {{ .Release.Namespace }}
  labels:
    gateway.istio.io/managed: istio.io-gateway-controller
  annotations:
    networking.istio.io/service-type: ClusterIP
spec:
  type: ClusterIP
  selector:
    istio.io/gateway-name: {{ $fn }}-gateway
  ports:
    - name: status-port
      port: 15021
      protocol: TCP
      targetPort: 15021
    - name: https-apex
      port: 443
      protocol: TCP
      targetPort: 443
    - name: http
      port: 80
      protocol: TCP
      targetPort: 80
  externalIPs:
    - {{ .Values.gateway.loadBalancerIP | quote }}
{{- end }}
