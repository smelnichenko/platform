{{- if .Values.gateway.enabled }}
{{- $fn := include "schnappy.fullname" . }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $fn }}-gateway-params
  namespace: {{ .Release.Namespace }}
data:
  service: |
    spec:
      externalIPs:
        - {{ .Values.gateway.loadBalancerIP | quote }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ $fn }}-gateway
  namespace: {{ .Release.Namespace }}
  annotations:
    networking.istio.io/service-type: ClusterIP
spec:
  gatewayClassName: istio
  infrastructure:
    labels:
      gateway.istio.io/managed: istio.io-gateway-controller
    parametersRef:
      group: ""
      kind: ConfigMap
      name: {{ $fn }}-gateway-params
  listeners:
    # HTTPS — apex domain (*.pmon.dev doesn't match bare pmon.dev)
    - name: https-apex
      hostname: {{ .Values.gateway.hosts.app | quote }}
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: pmon-dev-wildcard-tls
      allowedRoutes:
        namespaces:
          from: Same
    # HTTPS — all subdomains (single wildcard listener prevents
    # HTTP/2 connection coalescing 404s across subdomains)
    - name: https
      hostname: "*.pmon.dev"
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: pmon-dev-wildcard-tls
      allowedRoutes:
        namespaces:
          from: All
    # HTTP → HTTPS redirect
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
{{- end }}
