{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ include "schnappy.fullname" . }}-gateway
  namespace: {{ .Release.Namespace }}
spec:
  gatewayClassName: istio
  addresses:
    - type: IPAddress
      value: {{ .Values.gateway.loadBalancerIP | quote }}
  infrastructure:
    labels:
      gateway.istio.io/managed: istio.io-gateway-controller
  listeners:
    # HTTPS — main app
    - name: https-app
      hostname: {{ .Values.gateway.hosts.app | quote }}
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: pmon-dev-wildcard-tls
      allowedRoutes:
        namespaces:
          from: Same
    # HTTPS — Grafana
    - name: https-grafana
      hostname: {{ .Values.gateway.hosts.grafana | quote }}
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: pmon-dev-wildcard-tls
      allowedRoutes:
        namespaces:
          from: Same
    # HTTPS — Kibana
    - name: https-logs
      hostname: {{ .Values.gateway.hosts.logs | quote }}
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: pmon-dev-wildcard-tls
      allowedRoutes:
        namespaces:
          from: Same
    # HTTPS — Reports
    - name: https-reports
      hostname: {{ .Values.gateway.hosts.reports | quote }}
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: pmon-dev-wildcard-tls
      allowedRoutes:
        namespaces:
          from: Same
    # HTTPS — SonarQube
    - name: https-sonar
      hostname: {{ .Values.gateway.hosts.sonar | quote }}
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: pmon-dev-wildcard-tls
      allowedRoutes:
        namespaces:
          from: Same
    # HTTPS — Argo CD
    - name: https-argocd
      hostname: {{ .Values.gateway.hosts.argocd | quote }}
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: pmon-dev-wildcard-tls
      allowedRoutes:
        namespaces:
          from: All
    # HTTPS — Woodpecker CI
    - name: https-ci
      hostname: {{ .Values.gateway.hosts.ci | quote }}
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: pmon-dev-wildcard-tls
      allowedRoutes:
        namespaces:
          from: All
    # HTTP → HTTPS redirect
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
{{- end }}
