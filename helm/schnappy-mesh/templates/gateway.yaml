{{- if .Values.gateway.enabled }}
{{- $fn := include "schnappy.fullname" . }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ $fn }}-gateway
  namespace: {{ .Release.Namespace }}
  annotations:
    networking.istio.io/service-type: ClusterIP
spec:
  gatewayClassName: istio
  infrastructure:
    labels:
      gateway.istio.io/managed: istio.io-gateway-controller
  listeners:
    # HTTPS — apex domain (*.pmon.dev doesn't match bare pmon.dev)
    - name: https-apex
      hostname: {{ .Values.gateway.hosts.app | quote }}
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: pmon-dev-wildcard-tls
      allowedRoutes:
        namespaces:
          from: Same
    # HTTPS — all subdomains (single wildcard listener prevents
    # HTTP/2 connection coalescing 404s across subdomains)
    - name: https
      hostname: "*.pmon.dev"
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: pmon-dev-wildcard-tls
      allowedRoutes:
        namespaces:
          from: All
    # HTTP → HTTPS redirect
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
---
# Patch gateway service with externalIPs after Istio creates it
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $fn }}-gateway-patch
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "5"
spec:
  backoffLimit: 5
  template:
    metadata:
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      serviceAccountName: {{ $fn }}-gateway-patch
      restartPolicy: OnFailure
      containers:
        - name: patch
          image: bitnami/kubectl:latest
          resources:
            requests: { cpu: 25m, memory: 32Mi }
            limits: { cpu: 100m, memory: 64Mi }
          command: ["sh", "-c"]
          args:
            - |
              echo "Waiting for gateway service..."
              until kubectl get svc {{ $fn }}-gateway-istio -n {{ .Release.Namespace }} 2>/dev/null; do
                sleep 2
              done
              echo "Patching externalIPs..."
              kubectl patch svc {{ $fn }}-gateway-istio -n {{ .Release.Namespace }} \
                --type merge -p '{"spec":{"externalIPs":["{{ .Values.gateway.loadBalancerIP }}"]}}'
              echo "Done."
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $fn }}-gateway-patch
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $fn }}-gateway-patch
  namespace: {{ .Release.Namespace }}
rules:
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $fn }}-gateway-patch
  namespace: {{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: {{ $fn }}-gateway-patch
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ $fn }}-gateway-patch
  apiGroup: rbac.authorization.k8s.io
{{- end }}
