{{- if and .Values.gateway.enabled (gt (int (.Values.gateway.replicas | default 1)) 1) }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "schnappy.fullname" . }}-gateway
  namespace: {{ .Release.Namespace }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      gateway.networking.k8s.io/gateway-name: {{ include "schnappy.fullname" . }}-gateway
{{- end }}
