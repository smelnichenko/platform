{{- if and .Values.gateway.enabled (not .Values.gateway.infraOnly) }}
{{- $fn := include "schnappy.fullname" . }}
{{- $gw := printf "%s-gateway" $fn }}
---
# Admin service routes
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fn }}-admin-route
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: {{ $gw }}
      sectionName: https-apex
  rules:
    - matches:
        - path: { type: PathPrefix, value: /api/auth }
        - path: { type: PathPrefix, value: /api/captcha }
        - path: { type: PathPrefix, value: /api/user }
        - path: { type: PathPrefix, value: /api/permissions }
        - path: { type: PathPrefix, value: /api/admin }
      backendRefs:
        - name: {{ $fn }}-admin
          port: 8080
---
# Chat service routes
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fn }}-chat-route
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: {{ $gw }}
      sectionName: https-apex
  rules:
    - matches:
        - path: { type: PathPrefix, value: /api/chat }
        - path: { type: PathPrefix, value: /ws/chat }
      backendRefs:
        - name: {{ $fn }}-chat
          port: 8080
---
# Chess service routes
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fn }}-chess-route
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: {{ $gw }}
      sectionName: https-apex
  rules:
    - matches:
        - path: { type: PathPrefix, value: /api/chess }
        - path: { type: PathPrefix, value: /ws/chess }
      backendRefs:
        - name: {{ $fn }}-chess
          port: 8080
---
# Core app (catch-all /api)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fn }}-core-route
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: {{ $gw }}
      sectionName: https-apex
  rules:
    - matches:
        - path: { type: PathPrefix, value: /api }
      backendRefs:
        - name: {{ $fn }}-monitor
          port: 8080
---
# Frontend (catch-all /)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fn }}-site-route
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: {{ $gw }}
      sectionName: https-apex
  rules:
    - matches:
        - path: { type: PathPrefix, value: / }
      backendRefs:
        - name: {{ $fn }}-site
          port: 8080
{{- end }}
