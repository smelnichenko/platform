{{- if .Values.gateway.enabled }}
{{- $fn := include "schnappy.fullname" . }}
{{- $gw := printf "%s-gateway" $fn }}
# HTTP → HTTPS redirect
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fn }}-http-redirect
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: {{ $gw }}
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
---
# Admin service routes
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fn }}-admin-route
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: {{ $gw }}
      sectionName: https-apex
  rules:
    - matches:
        - path: { type: PathPrefix, value: /api/auth }
        - path: { type: PathPrefix, value: /api/captcha }
        - path: { type: PathPrefix, value: /api/user }
        - path: { type: PathPrefix, value: /api/permissions }
        - path: { type: PathPrefix, value: /api/admin }
      backendRefs:
        - name: {{ $fn }}-admin
          port: 8080
---
# Chat service routes
apiVersion: gateway.networking.k8s.io/v1
