{{- if .Values.gateway.enabled }}
{{- $fn := include "schnappy.fullname" . }}
{{- $gw := printf "%s-gateway" $fn }}
# HTTP → HTTPS redirect
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fn }}-http-redirect
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: {{ $gw }}
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
---
# Argo CD
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fn }}-argocd-route
  namespace: argocd
spec:
  hostnames:
    - {{ .Values.gateway.hosts.argocd | quote }}
  parentRefs:
    - name: {{ $gw }}
      namespace: {{ .Release.Namespace }}
      sectionName: https
  rules:
    - matches:
        - path: { type: PathPrefix, value: / }
      backendRefs:
        - name: argocd-server
          port: 80
---
# Woodpecker CI
apiVersion: gateway.networking.k8s.io/v1
