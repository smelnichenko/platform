{{- if and .Values.gateway.enabled (gt (int (.Values.gateway.replicas | default 1)) 1) }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "schnappy.fullname" . }}-gateway
  namespace: {{ .Release.Namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "schnappy.fullname" . }}-gateway-istio
  minReplicas: {{ .Values.gateway.replicas }}
  maxReplicas: {{ .Values.gateway.replicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
{{- end }}
