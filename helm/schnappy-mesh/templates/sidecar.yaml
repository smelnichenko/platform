{{- if eq (.Values.scyllaOperator.enabled | toString) "true" }}
# ScyllaDB pods: only proxy CQL (9042) inbound through Envoy.
# Other ports (7000/7001 inter-node, 10001 agent API) use
# excludeInboundPorts annotation to bypass iptables, but Envoy
# still creates virtualInbound filter chains for them from the
# service definition. This Sidecar resource removes those filter
# chains entirely, stopping Envoy's internal health-check probes
# from hitting the agent's self-signed TLS listener.
apiVersion: networking.istio.io/v1
kind: Sidecar
metadata:
  name: {{ include "schnappy.fullname" . }}-scylla
  namespace: {{ .Release.Namespace }}
spec:
  workloadSelector:
    labels:
      scylla/cluster: {{ include "schnappy.fullname" . }}-scylla
  ingress:
    - port:
        number: 9042
        protocol: TCP
        name: cql
      defaultEndpoint: 127.0.0.1:9042
{{- end }}
