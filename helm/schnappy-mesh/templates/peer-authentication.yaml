{{- if .Values.peerAuthentication.enabled }}
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: {{ include "schnappy.fullname" . }}
  namespace: {{ .Release.Namespace }}
spec:
  mtls:
    mode: {{ .Values.peerAuthentication.mode }}
---
# Mimir accepts plaintext on port 9009 for Prometheus remote_write
# and k6 metrics push from outside the mesh
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: {{ include "schnappy.fullname" . }}-mimir
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: mimir
  mtls:
    mode: {{ .Values.peerAuthentication.mode }}
  portLevelMtls:
    9009:
      mode: PERMISSIVE
---
# Alertmanager accepts plaintext on port 9093 for Prometheus alert POSTs.
#
# Prometheus runs WITHOUT an Istio sidecar by design. Putting it in the
# mesh would require a DestinationRule(tls.mode=DISABLE) for every
# non-injected scrape target — today that's 7+ (external-secrets, argocd
# [3 pods], velero, blackbox-exporter, kube-state-metrics, apiserver,
# prometheus-operator) plus every future non-mesh target.
#
# The sole benefit would be removing this one PeerAuth exception. Net
# trade: 1 exception → 7+ DestinationRules + ~50% resource overhead on
# the Prom pod + an extra Envoy hop per scrape. Keeping the sidecar off
# and scoping mTLS laxity to this one port on this one workload is the
# smaller blast radius.
#
# See also: this was the cause of the 2026-04-20 "silent alerts for
# weeks" incident — fixed in commit bf77e2e.
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: {{ include "schnappy.fullname" . }}-alertmanager
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: alertmanager
  mtls:
    mode: {{ .Values.peerAuthentication.mode }}
  portLevelMtls:
    9093:
      mode: PERMISSIVE
---
# MinIO accepts plaintext on port 9000 for Tempo and Mimir S3 access
# (Tempo has no sidecar — Envoy breaks S3 Signature V4)
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: {{ include "schnappy.fullname" . }}-minio
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: minio
  mtls:
    mode: {{ .Values.peerAuthentication.mode }}
  portLevelMtls:
    9000:
      mode: PERMISSIVE
---
# Elasticsearch accepts plaintext on port 9200 for Fluent Bit log shipping
# (Fluent Bit DaemonSet has no sidecar — needs host log access)
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: {{ include "schnappy.fullname" . }}-elasticsearch
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: elasticsearch
  mtls:
    mode: {{ .Values.peerAuthentication.mode }}
  portLevelMtls:
    9200:
      mode: PERMISSIVE
---
# Kafka accepts plaintext on port 9092 for setup jobs without sidecars
# (Kafka image has no curl/wget for sidecar quitquitquit)
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: {{ include "schnappy.fullname" . }}-kafka
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: kafka
  mtls:
    mode: {{ .Values.peerAuthentication.mode }}
  portLevelMtls:
    9092:
      mode: PERMISSIVE
{{- if ne (.Values.scyllaOperator.enabled | toString) "true" }}
---
# ScyllaDB accepts plaintext on port 9042 for CQL binary protocol
# (only needed when ScyllaDB has an Istio sidecar — operator mode disables it)
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: {{ include "schnappy.fullname" . }}-scylla
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: scylla
  mtls:
    mode: {{ .Values.peerAuthentication.mode }}
  portLevelMtls:
    9042:
      mode: PERMISSIVE
{{- end }}
---
# CNPG operator (no sidecar) connects to instance manager on port 8000
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: {{ include "schnappy.fullname" . }}-cnpg-postgres
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: {{ include "schnappy.fullname" . }}-postgres
  mtls:
    mode: {{ .Values.peerAuthentication.mode }}
  portLevelMtls:
    8000:
      mode: PERMISSIVE
{{- end }}
