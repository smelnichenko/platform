{{- if .Values.peerAuthentication.enabled }}
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: {{ include "schnappy.fullname" . }}
  namespace: {{ .Release.Namespace }}
spec:
  mtls:
    mode: {{ .Values.peerAuthentication.mode }}
---
# Mimir accepts plaintext on port 9009 for Prometheus remote_write
# and k6 metrics push from outside the mesh
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: {{ include "schnappy.fullname" . }}-mimir
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: mimir
  mtls:
    mode: {{ .Values.peerAuthentication.mode }}
  portLevelMtls:
    9009:
      mode: PERMISSIVE
{{- end }}
