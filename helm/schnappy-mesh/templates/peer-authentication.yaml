{{- if .Values.peerAuthentication.enabled }}
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: {{ include "schnappy.fullname" . }}
  namespace: {{ .Release.Namespace }}
spec:
  mtls:
    mode: {{ .Values.peerAuthentication.mode }}
---
# Mimir accepts plaintext on port 9009 for Prometheus remote_write
# and k6 metrics push from outside the mesh
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: {{ include "schnappy.fullname" . }}-mimir
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: mimir
  mtls:
    mode: {{ .Values.peerAuthentication.mode }}
  portLevelMtls:
    9009:
      mode: PERMISSIVE
---
# MinIO has no sidecar — disable mTLS for traffic to MinIO
# so sidecar-injected pods (Tempo, Mimir) can connect with plaintext
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: {{ include "schnappy.fullname" . }}-minio-no-mtls
  namespace: {{ .Release.Namespace }}
spec:
  host: {{ include "schnappy.fullname" . }}-minio.{{ .Release.Namespace }}.svc.cluster.local
  trafficPolicy:
    tls:
      mode: DISABLE
{{- end }}
