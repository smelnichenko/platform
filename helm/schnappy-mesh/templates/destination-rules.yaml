{{- if .Values.gateway.enabled }}
{{- $fn := include "schnappy.fullname" . }}
# Cross-namespace backends: disable mTLS (not in ambient mesh)
---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: {{ $fn }}-forgejo-plaintext
  namespace: {{ .Release.Namespace }}
spec:
  host: forgejo-http.forgejo.svc.cluster.local
  trafficPolicy:
    tls:
      mode: DISABLE
---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: {{ $fn }}-argocd-plaintext
  namespace: {{ .Release.Namespace }}
spec:
  host: argocd-server.argocd.svc.cluster.local
  trafficPolicy:
    tls:
      mode: DISABLE
---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: {{ $fn }}-woodpecker-plaintext
  namespace: {{ .Release.Namespace }}
spec:
  host: woodpecker-server.woodpecker.svc.cluster.local
  trafficPolicy:
    tls:
      mode: DISABLE
{{- end }}
