              - cluster.local/ns/{{ $ns }}/sa/{{ $fn }}-admin
              - cluster.local/ns/{{ $ns }}/sa/{{ $fn }}-chat
              - cluster.local/ns/{{ $ns }}/sa/{{ $fn }}-chess
              - cluster.local/ns/{{ $ns }}/sa/{{ $fn }}-kafka
      to:
        - operation:
