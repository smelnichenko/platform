{{- if .Values.authorizationPolicies.enabled }}
{{- $ns := .Release.Namespace }}
{{- $fn := include "schnappy.fullname" . }}
---
# PostgreSQL — only app services on port 5432
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ $fn }}-postgres
  namespace: {{ $ns }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: postgres
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/{{ $ns }}/sa/{{ $fn }}-monitor
              - cluster.local/ns/{{ $ns }}/sa/{{ $fn }}-admin
              - cluster.local/ns/{{ $ns }}/sa/{{ $fn }}-chat
              - cluster.local/ns/{{ $ns }}/sa/{{ $fn }}-chess
      to:
        - operation:
            ports: ["5432"]
---
# Valkey — only app services on port 6379
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ $fn }}-valkey
  namespace: {{ $ns }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: valkey
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/{{ $ns }}/sa/{{ $fn }}-monitor
              - cluster.local/ns/{{ $ns }}/sa/{{ $fn }}-admin
              - cluster.local/ns/{{ $ns }}/sa/{{ $fn }}-chat
              - cluster.local/ns/{{ $ns }}/sa/{{ $fn }}-chess
              - cluster.local/ns/{{ $ns }}/sa/{{ $fn }}-centrifugo
      to:
        - operation:
            ports: ["6379"]
---
# Kafka — only app services on port 9092/9093
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ $fn }}-kafka
  namespace: {{ $ns }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: kafka
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/{{ $ns }}/sa/{{ $fn }}-monitor
              - cluster.local/ns/{{ $ns }}/sa/{{ $fn }}-admin
              - cluster.local/ns/{{ $ns }}/sa/{{ $fn }}-chat
              - cluster.local/ns/{{ $ns }}/sa/{{ $fn }}-chess
              - cluster.local/ns/{{ $ns }}/sa/{{ $fn }}-centrifugo
              - cluster.local/ns/{{ $ns }}/sa/{{ $fn }}-kafka
      to:
        - operation:
            ports: ["9092", "9093"]
---
# ScyllaDB — only monitor + chat on port 9042/7000
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ $fn }}-scylla
  namespace: {{ $ns }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: scylla
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/{{ $ns }}/sa/{{ $fn }}-monitor
              - cluster.local/ns/{{ $ns }}/sa/{{ $fn }}-chat
              - cluster.local/ns/{{ $ns }}/sa/{{ $fn }}-scylla
      to:
        - operation:
            ports: ["9042", "7000"]
---
# MinIO — monitor + minio (buckets job) on port 9000
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ $fn }}-minio
  namespace: {{ $ns }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: minio
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/{{ $ns }}/sa/{{ $fn }}-monitor
              - cluster.local/ns/{{ $ns }}/sa/{{ $fn }}-minio
      to:
        - operation:
            ports: ["9000"]
---
# Centrifugo — gateway + browser WS clients arrive via the Istio
# ingress; app services may publish via the HTTP API. Trust the Istio
# gateway SA, the four app service SAs, and the schnappy-infra
# Prometheus SA (scrapes /metrics on the same port).
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ $fn }}-centrifugo
  namespace: {{ $ns }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: centrifugo
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/{{ $ns }}/sa/{{ $fn }}-monitor
              - cluster.local/ns/{{ $ns }}/sa/{{ $fn }}-admin
              - cluster.local/ns/{{ $ns }}/sa/{{ $fn }}-chat
              - cluster.local/ns/{{ $ns }}/sa/{{ $fn }}-chess
              - cluster.local/ns/{{ $ns }}/sa/{{ $fn }}-centrifugo
              # Prometheus operator-managed CR runs in schnappy-infra
              # and scrapes /metrics on the same http port.
              - cluster.local/ns/schnappy-infra/sa/schnappy-prometheus
        # Browser → Istio ingress gateway is the public path.
        # Trust-inside-mesh via the gateway's namespace/SA.
        - source:
            namespaces: ["istio-system"]
      to:
        - operation:
            ports: ["8000"]
---
# ClickHouse — fluentbit + grafana on HTTP port 8123
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ $fn }}-clickhouse
  namespace: {{ $ns }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: clickhouse
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/{{ $ns }}/sa/{{ $fn }}-fluentbit
              - cluster.local/ns/{{ $ns }}/sa/{{ $fn }}-grafana
              - cluster.local/ns/{{ $ns }}/sa/{{ $fn }}-clickhouse
      to:
        - operation:
            ports: ["8123", "9000"]
---
# SonarQube PostgreSQL — only sonarqube on port 5432
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ $fn }}-sonarqube-postgres
  namespace: {{ $ns }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: sonarqube-postgres
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/{{ $ns }}/sa/{{ $fn }}-sonarqube
      to:
        - operation:
            ports: ["5432"]
---
# /api/internal/** is admin-only on chat. Spring Security permits the
# path so the cluster principal (mTLS source SA) is the authority;
# this DENY rule rejects every source other than the admin service.
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ $fn }}-chat-internal
  namespace: {{ $ns }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: chat
  action: DENY
  rules:
    - from:
        - source:
            notPrincipals:
              - cluster.local/ns/{{ $ns }}/sa/{{ $fn }}-admin
      to:
        - operation:
            paths: ["/api/internal/*"]
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ $fn }}-chess-internal
  namespace: {{ $ns }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: chess
  action: DENY
  rules:
    - from:
        - source:
            notPrincipals:
              - cluster.local/ns/{{ $ns }}/sa/{{ $fn }}-admin
      to:
        - operation:
            paths: ["/api/internal/*"]
{{- end }}
