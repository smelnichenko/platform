---
# Keycloak — only envoy gateway, admin, monitor on port 8080
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ $fn }}-keycloak
  namespace: {{ $ns }}
spec:
  selector:
