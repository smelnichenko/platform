{{- if .Values.authorizationPolicies.enabled }}
{{- $ns := .Release.Namespace }}
{{- $fn := include "schnappy.fullname" . }}
# Istio ingress gateway → all backend services on port 8080
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ $fn }}-gateway-to-backends
  namespace: {{ $ns }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/part-of: schnappy
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/{{ $ns }}/sa/{{ $fn }}-gateway-istio
      to:
        - operation:
            ports: ["8080", "3000", "5601", "9000"]
---
# PostgreSQL — only app services + keycloak on port 5432
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ $fn }}-postgres
  namespace: {{ $ns }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: postgres
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/{{ $ns }}/sa/{{ $fn }}-monitor
              - cluster.local/ns/{{ $ns }}/sa/{{ $fn }}-admin
              - cluster.local/ns/{{ $ns }}/sa/{{ $fn }}-chat
              - cluster.local/ns/{{ $ns }}/sa/{{ $fn }}-chess
              - cluster.local/ns/{{ $ns }}/sa/{{ $fn }}-keycloak
      to:
        - operation:
            ports: ["5432"]
---
# Redis — only app services on port 6379
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ $fn }}-redis
  namespace: {{ $ns }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: redis
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/{{ $ns }}/sa/{{ $fn }}-monitor
              - cluster.local/ns/{{ $ns }}/sa/{{ $fn }}-admin
              - cluster.local/ns/{{ $ns }}/sa/{{ $fn }}-chat
              - cluster.local/ns/{{ $ns }}/sa/{{ $fn }}-chess
      to:
        - operation:
            ports: ["6379"]
---
# Kafka — only app services on port 9092/9093
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ $fn }}-kafka
  namespace: {{ $ns }}
spec:
  selector:
    matchLabels:
