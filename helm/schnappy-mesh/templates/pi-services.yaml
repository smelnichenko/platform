{{- if .Values.gateway.enabled }}
{{- $fn := include "schnappy.fullname" . }}
# Pi services: proxy through gateway to Pi (192.168.11.5)
# Wildcard DNS *.pmon.dev routes all traffic to the cluster gateway.
# Pi services (Forgejo, Keycloak) need explicit proxy routes.
# Disable mTLS for Pi endpoints (external, no sidecar)
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: {{ $fn }}-pi-forgejo
  namespace: {{ .Release.Namespace }}
spec:
  host: {{ $fn }}-pi-forgejo.{{ .Release.Namespace }}.svc.cluster.local
  trafficPolicy:
    tls:
      mode: DISABLE
---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: {{ $fn }}-pi-keycloak
  namespace: {{ .Release.Namespace }}
spec:
  host: {{ $fn }}-pi-keycloak.{{ .Release.Namespace }}.svc.cluster.local
  trafficPolicy:
    tls:
      mode: DISABLE
---
# Forgejo → Pi:3000
apiVersion: v1
kind: Service
metadata:
  name: {{ $fn }}-pi-forgejo
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: v1
kind: Endpoints
metadata:
  name: {{ $fn }}-pi-forgejo
  namespace: {{ .Release.Namespace }}
subsets:
  - addresses:
      - ip: "192.168.11.5"
    ports:
      - port: 3000
        protocol: TCP
---
# Keycloak → Pi:8080
apiVersion: v1
kind: Service
metadata:
  name: {{ $fn }}-pi-keycloak
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Endpoints
metadata:
  name: {{ $fn }}-pi-keycloak
  namespace: {{ .Release.Namespace }}
subsets:
  - addresses:
      - ip: "192.168.11.5"
    ports:
      - port: 8080
        protocol: TCP
{{- end }}
