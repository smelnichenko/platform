{{- if .Values.gateway.enabled }}
{{- $fn := include "schnappy.fullname" . }}
# Temporary: proxy Pi services through gateway until schnappy.io migration
# Disable mTLS for Pi endpoints (external, no sidecar)
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: {{ $fn }}-pi-forgejo
  namespace: {{ .Release.Namespace }}
spec:
  host: {{ $fn }}-pi-forgejo.{{ .Release.Namespace }}.svc.cluster.local
  trafficPolicy:
    tls:
      mode: DISABLE
---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: {{ $fn }}-pi-keycloak
  namespace: {{ .Release.Namespace }}
spec:
  host: {{ $fn }}-pi-keycloak.{{ .Release.Namespace }}.svc.cluster.local
  trafficPolicy:
    tls:
      mode: DISABLE
---
# Forgejo (git.pmon.dev) → Pi:3000
apiVersion: v1
kind: Service
metadata:
  name: {{ $fn }}-pi-forgejo
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: {{ $fn }}-pi-forgejo-1
  namespace: {{ .Release.Namespace }}
  labels:
    kubernetes.io/service-name: {{ $fn }}-pi-forgejo
addressType: IPv4
ports:
  - port: 3000
    protocol: TCP
endpoints:
  - addresses:
      - "192.168.11.5"
---
# Keycloak (auth.pmon.dev) → Pi:8080
apiVersion: v1
kind: Service
metadata:
  name: {{ $fn }}-pi-keycloak
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: {{ $fn }}-pi-keycloak-1
  namespace: {{ .Release.Namespace }}
  labels:
    kubernetes.io/service-name: {{ $fn }}-pi-keycloak
addressType: IPv4
ports:
  - port: 8080
    protocol: TCP
endpoints:
  - addresses:
      - "192.168.11.5"
{{- end }}
