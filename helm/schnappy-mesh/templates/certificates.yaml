{{- if .Values.gateway.enabled }}
{{- $fn := include "schnappy.fullname" . }}
{{- $issuer := .Values.gateway.tls.clusterIssuer | default "letsencrypt-prod" }}
# Cross-namespace host certificates (not auto-provisioned by cert-manager Gateway API)
{{- range $key, $host := .Values.gateway.hosts }}
{{- $name := $host | replace "." "-" }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ $name }}-tls
  namespace: {{ $.Release.Namespace }}
spec:
  secretName: {{ $name }}-tls
  issuerRef:
    name: letsencrypt-dns
    kind: ClusterIssuer
  dnsNames:
    - {{ $host }}
{{- end }}
{{- end }}
