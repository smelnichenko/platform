{{- $ns := .Release.Namespace }}
{{- $fullname := include "schnappy.fullname" . }}
{{- /* SAs created by other charts (with RBAC): fluentbit, kube-state-metrics, sonarqube-setup */}}
{{- range $sa := list "monitor" "admin" "chat" "chess" "site" "postgres" "redis" "kafka" "scylla" "minio" "keycloak" "elasticsearch" "kibana" "victoriametrics" "alertmanager" "grafana" "reports" "sonarqube" "sonarqube-postgres" "apt-cache" }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $fullname }}-{{ $sa }}
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/part-of: schnappy
    app.kubernetes.io/component: {{ $sa }}
{{- end }}
