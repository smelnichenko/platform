{{- $ns := .Release.Namespace }}
{{- $fullname := include "schnappy.fullname" . }}
{{- /* SAs created by other charts (with RBAC): fluentbit, kube-state-metrics, sonarqube-setup */}}
{{- /* keycloak: only deployed in cluster for Vagrant E2E tests (production Keycloak is bare-metal on Pis), but the SA is always created so the test chart finds it. */}}
{{- range $sa := list "monitor" "admin" "chat" "chess" "site" "game-scp" "postgres" "valkey" "kafka" "scylla" "minio" "clickhouse" "mimir" "alertmanager" "grafana" "reports" "sonarqube" "sonarqube-postgres" "apt-cache" "hyperfoil" "keycloak" }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $fullname }}-{{ $sa }}
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/part-of: schnappy
    app.kubernetes.io/component: {{ $sa }}
{{- end }}
