{{- if .Values.gateway.enabled }}
{{- $fn := include "schnappy.fullname" . }}
# Allow argocd namespace to reference the Gateway in schnappy
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: {{ $fn }}-gateway-ref
  namespace: {{ .Release.Namespace }}
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: argocd
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: woodpecker
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: kube-system
    {{- range .Values.gateway.allowedNamespaces }}
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: {{ . }}
    {{- end }}
  to:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ $fn }}-gateway
{{- end }}
