{{- if .Values.jwt.enabled }}
{{- $fn := include "schnappy.fullname" . }}
# JWT validation on the gateway — validates Keycloak Bearer tokens
apiVersion: security.istio.io/v1
kind: RequestAuthentication
metadata:
  name: {{ $fn }}-jwt
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      gateway.networking.k8s.io/gateway-name: {{ $fn }}-gateway
  jwtRules:
    - issuer: {{ .Values.jwt.issuer }}
      jwksUri: {{ .Values.jwt.jwksUri }}
      forwardOriginalToken: true
      fromHeaders:
        - name: Authorization
          prefix: "Bearer "
      outputClaimToHeaders:
        - header: x-user-uuid
          claim: sub
        - header: x-user-email
          claim: email
        - header: x-user-roles
          claim: realm_access.roles
---
# EnvoyFilter: disable JWT validation on non-app virtual hosts
# Gateway uses wildcard SNI (*.pmon.dev) so filter-chain-level removal
# doesn't work. Instead, disable jwt_authn per virtual host route.
apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: {{ $fn }}-jwt-passthrough
  namespace: {{ .Release.Namespace }}
spec:
  workloadSelector:
    labels:
      gateway.networking.k8s.io/gateway-name: {{ $fn }}-gateway
  configPatches:
    {{- range $host := .Values.jwt.passthroughHosts | default list }}
    - applyTo: VIRTUAL_HOST
      match:
        context: GATEWAY
        routeConfiguration:
          vhost:
            name: {{ $host }}:443
      patch:
        operation: MERGE
        value:
          typed_per_filter_config:
            envoy.filters.http.jwt_authn:
              "@type": type.googleapis.com/envoy.extensions.filters.http.jwt_authn.v3.PerRouteConfig
              disabled: true
    {{- end }}
{{- end }}
