{{- if .Values.jwt.enabled }}
{{- $fn := include "schnappy.fullname" . }}
# JWT validation only on pmon.dev app routes (not sonar/ci/git/auth/grafana/logs)
# Validates Bearer tokens, ignores Basic auth and query params
apiVersion: security.istio.io/v1
kind: RequestAuthentication
metadata:
  name: {{ $fn }}-jwt
  namespace: {{ .Release.Namespace }}
spec:
  targetRefs:
    - kind: HTTPRoute
      group: gateway.networking.k8s.io
      name: {{ $fn }}-core-route
    - kind: HTTPRoute
      group: gateway.networking.k8s.io
      name: {{ $fn }}-admin-route
    - kind: HTTPRoute
      group: gateway.networking.k8s.io
      name: {{ $fn }}-chat-route
    - kind: HTTPRoute
      group: gateway.networking.k8s.io
      name: {{ $fn }}-chess-route
  jwtRules:
    - issuer: {{ .Values.jwt.issuer }}
      jwksUri: {{ .Values.jwt.jwksUri }}
      forwardOriginalToken: true
      fromHeaders:
        - name: Authorization
          prefix: "Bearer "
      outputClaimToHeaders:
        - header: x-user-uuid
          claim: sub
        - header: x-user-email
          claim: email
{{- end }}
