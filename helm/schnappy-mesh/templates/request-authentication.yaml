{{- if .Values.jwt.enabled }}
{{- $fn := include "schnappy.fullname" . }}
# JWT validation on the gateway — validates Bearer tokens only
# Applied to gateway pod via selector. AuthorizationPolicy below
# ensures only app routes require valid JWT.
apiVersion: security.istio.io/v1
kind: RequestAuthentication
metadata:
  name: {{ $fn }}-jwt
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      gateway.networking.k8s.io/gateway-name: {{ $fn }}-gateway
  jwtRules:
    - issuer: {{ .Values.jwt.issuer }}
      jwksUri: {{ .Values.jwt.jwksUri }}
      forwardOriginalToken: true
      fromHeaders:
        - name: Authorization
          prefix: "Bearer "
      outputClaimToHeaders:
        - header: x-user-uuid
          claim: sub
        - header: x-user-email
          claim: email
{{- end }}
