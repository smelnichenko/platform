{{- if and (eq (.Values.sonarqube.enabled | toString) "true") (eq (.Values.sonarqube.setup.enabled | toString) "true") }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "schnappy.fullname" . }}-sonarqube-setup
  labels:
    {{- include "schnappy.sonarqube.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 5
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        {{- include "schnappy.sonarqube.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/part-of: schnappy
        app.kubernetes.io/component: sonarqube-setup
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "schnappy.fullname" . }}-sonarqube-setup
      containers:
        - name: setup
          image: curlimages/curl:8.12.1
          env:
            - name: SQ_URL
              value: "http://{{ include "schnappy.sonarqube.serviceName" . }}:9000"
            - name: SQ_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "schnappy.sonarqube.secretName" . }}
                  key: SONARQUBE_ADMIN_PASSWORD
          command:
            - /bin/sh
            - -c
            - |
              set -e
              FAIL=0

              sq() { curl -s -u "admin:${SQ_ADMIN_PASSWORD}" "$@"; }

              # 1. Wait for SonarQube to be ready
              echo "Waiting for SonarQube..."
              RETRIES=0
              until [ "$RETRIES" -ge 120 ]; do
                STATUS=$(curl -sf "${SQ_URL}/api/system/status" 2>/dev/null | grep -o '"status":"[^"]*"' | cut -d'"' -f4)
                [ "$STATUS" = "UP" ] && break
                RETRIES=$((RETRIES + 1))
                sleep 5
              done
              [ "$STATUS" != "UP" ] && echo "ERROR: SonarQube not ready after 10 minutes" && exit 1
              echo "SonarQube is UP"

              # 2. Change admin password (if still default)
              DEFAULT_CHECK=$(curl -s -u "admin:admin" "${SQ_URL}/api/authentication/validate")
              if echo "$DEFAULT_CHECK" | grep -q '"valid":true'; then
                echo "Changing default admin password..."
                curl -sf -X POST -u "admin:admin" "${SQ_URL}/api/users/change_password" \
                  -d "login=admin&previousPassword=admin&password=${SQ_ADMIN_PASSWORD}"
                echo "Admin password changed"
              else
                echo "Admin password already set"
              fi

              # 3. Generate analysis token (if not exists)
              EXISTING=$(sq "${SQ_URL}/api/user_tokens/search" | grep -c '"name":"ci"' || true)
              if [ "$EXISTING" = "0" ]; then
                echo "Generating analysis token..."
                TOKEN=$(sq -X POST "${SQ_URL}/api/user_tokens/generate" \
                  -d "name=ci&type=GLOBAL_ANALYSIS_TOKEN" | grep -o '"token":"[^"]*"' | cut -d'"' -f4)
                if [ -n "$TOKEN" ]; then
                  echo "Token generated, storing in secret..."
                  # Write token to a file for the sidecar/post-hook to pick up
                  # For now, patch the existing secret
                  TOKEN_B64=$(echo -n "$TOKEN" | base64)
                  cat > /tmp/patch.json << PATCH
              {"data":{"SONARQUBE_TOKEN":"${TOKEN_B64}"}}
              PATCH
                  echo "Token stored (manual update needed for Woodpecker secret)"
                else
                  echo "WARNING: Token generation failed"
                fi
              else
                echo "Analysis token already exists"
              fi

              # 4. Create quality gates
              # Service gate (default, 80% coverage)
              GATE_EXISTS=$(sq "${SQ_URL}/api/qualitygates/list" | grep -c '"name":"Service"' || true)
              if [ "$GATE_EXISTS" = "0" ]; then
                echo "Creating Service quality gate..."
                sq -X POST "${SQ_URL}/api/qualitygates/copy" -d "sourceName=Sonar%20way&name=Service" > /dev/null
                sq -X POST "${SQ_URL}/api/qualitygates/set_as_default" -d "name=Service"
                echo "Service gate created and set as default"
              else
                echo "Service gate already exists"
              fi

              # Frontend gate (70% coverage)
              FE_GATE_EXISTS=$(sq "${SQ_URL}/api/qualitygates/list" | grep -c '"name":"Frontend"' || true)
              if [ "$FE_GATE_EXISTS" = "0" ]; then
                echo "Creating Frontend quality gate..."
                sq -X POST "${SQ_URL}/api/qualitygates/copy" -d "sourceName=Sonar%20way&name=Frontend" > /dev/null
                # Update coverage threshold to 70%
                COV_ID=$(sq "${SQ_URL}/api/qualitygates/show?name=Frontend" | \
                  grep -o '"id":"[^"]*","metric":"new_coverage"' | grep -o '"id":"[^"]*"' | cut -d'"' -f4)
                if [ -n "$COV_ID" ]; then
                  sq -X POST "${SQ_URL}/api/qualitygates/update_condition" \
                    -d "id=${COV_ID}&metric=new_coverage&op=LT&error=70" > /dev/null
                fi
                echo "Frontend gate created (70% coverage)"
              else
                echo "Frontend gate already exists"
              fi

              # 5. Create projects
              {{- range .Values.sonarqube.setup.projects }}
              PROJ_EXISTS=$(sq "${SQ_URL}/api/projects/search?q={{ .key }}" | grep -c '"key":"{{ .key }}"' || true)
              if [ "$PROJ_EXISTS" = "0" ]; then
                sq -X POST "${SQ_URL}/api/projects/create" \
                  -d "project={{ .key }}&name={{ .name | replace " " "%20" }}&visibility=private" > /dev/null
                echo "Created project: {{ .key }}"
              else
                echo "Project exists: {{ .key }}"
              fi
              {{- if .gate }}
              sq -X POST "${SQ_URL}/api/qualitygates/select" \
                -d "gateName={{ .gate }}&projectKey={{ .key }}" > /dev/null 2>&1 || true
              {{- end }}
              {{- end }}

              echo "SonarQube setup complete"
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "schnappy.fullname" . }}-sonarqube-setup
  labels:
    {{- include "schnappy.sonarqube.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
{{- end }}
