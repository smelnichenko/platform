{{- if .Values.vault.secretsEnabled }}
{{- if eq (.Values.sonarqube.enabled | toString) "true" }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "schnappy.sonarqube.secretName" . }}
  labels:
    {{- include "schnappy.sonarqube.labels" . | nindent 4 }}
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: {{ include "schnappy.sonarqube.secretName" . }}
  data:
    - secretKey: SONARQUBE_POSTGRES_PASSWORD
      remoteRef:
        key: {{ .Values.vault.secretPathPrefix }}/sonarqube
        property: postgres_password
    - secretKey: SONARQUBE_ADMIN_PASSWORD
      remoteRef:
        key: {{ .Values.vault.secretPathPrefix }}/sonarqube
        property: admin_password
    - secretKey: SONARQUBE_TOKEN
      remoteRef:
        key: {{ .Values.vault.secretPathPrefix }}/sonarqube
        property: token
{{- end }}
---
# Vault token for SonarQube setup job to write generated tokens back to Vault
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "schnappy.fullname" . }}-vault-token
  labels:
    {{- include "schnappy.sonarqube.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: {{ include "schnappy.fullname" . }}-vault-token
  data:
    - secretKey: token
      remoteRef:
        key: {{ .Values.vault.secretPathPrefix }}/sonarqube-setup
        property: vault_token
{{- end }}
