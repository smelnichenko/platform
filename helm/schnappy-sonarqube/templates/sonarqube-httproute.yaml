{{- if and (eq (.Values.sonarqube.enabled | toString) "true") .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "schnappy.fullname" . }}-sonarqube-route
  namespace: {{ .Release.Namespace }}
spec:
  hostnames:
    - {{ .Values.gateway.hosts.sonar | quote }}
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
      sectionName: https
  rules:
    - matches:
        - path: { type: PathPrefix, value: / }
      backendRefs:
        - name: {{ include "schnappy.sonarqube.serviceName" . }}
          port: {{ .Values.sonarqube.service.port }}
{{- end }}
