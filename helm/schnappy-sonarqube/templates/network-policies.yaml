{{- if and .Values.networkPolicies.enabled (eq (.Values.sonarqube.enabled | toString) "true") }}
# SonarQube network policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "schnappy.fullname" . }}-sonarqube
  labels:
    {{- include "schnappy.sonarqube.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "schnappy.sonarqube.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from ingress controller (Traefik)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 9000
    # Allow from Woodpecker CI pipeline pods (sonar analysis)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: woodpecker
      ports:
        - protocol: TCP
          port: 9000
    {{- if eq (.Values.sonarqube.setup.enabled | toString) "true" }}
    # Allow from setup job
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: sonarqube-setup
      ports:
        - protocol: TCP
          port: 9000
    {{- end }}
  egress:
    # DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # SonarQube → its PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              {{- include "schnappy.sonarqube.postgres.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5432
---
# SonarQube PostgreSQL network policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "schnappy.fullname" . }}-sonarqube-postgres
  labels:
    {{- include "schnappy.sonarqube.postgres.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "schnappy.sonarqube.postgres.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from SonarQube
    - from:
        - podSelector:
            matchLabels:
              {{- include "schnappy.sonarqube.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5432
  egress:
    # DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- if eq (.Values.sonarqube.setup.enabled | toString) "true" }}
---
# SonarQube setup job network policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "schnappy.fullname" . }}-sonarqube-setup
  labels:
    {{- include "schnappy.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "schnappy.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: sonarqube-setup
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    # DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Setup job → SonarQube
    - to:
        - podSelector:
            matchLabels:
              {{- include "schnappy.sonarqube.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 9000
{{- end }}
{{- end }}
